<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - ТРОННЫЙ ЗАЛ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cinzel', serif;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 1400px;
            max-width: 100%;
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 30px;
            padding: 20px;
            border: 3px solid gold;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
        }
        
        .throne-room {
            background-image: url('https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/bg_throne.jpg');
            background-size: cover;
            background-position: center;
            border: 3px solid gold;
            border-radius: 20px;
            min-height: 800px;
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.7);
        }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.7);
            border-bottom: 2px solid gold;
            border-radius: 20px 20px 0 0;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 50;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            color: white;
            font-size: 1.2rem;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .economy { color: #ffd700; }
        .science { color: #00ffff; }
        .army { color: #ff4444; }
        .authority { color: gold; }
        
        .items-bar {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid gold;
        }
        
        .item-icon {
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
            filter: grayscale(1);
            position: relative;
        }
        
        .item-icon.found {
            opacity: 1;
            filter: none;
            animation: pulse 2s infinite;
        }
        
        .item-icon:hover {
            transform: scale(1.2);
        }
        
        .item-icon .tooltip {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            white-space: nowrap;
            display: none;
            z-index: 60;
        }
        
        .item-icon:hover .tooltip {
            display: block;
        }
        
        /* ПЕРСОНАЖИ */
        .character-left {
            position: absolute;
            left: 50px;
            bottom: 0;
            width: 300px;
            z-index: 30;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float 3s infinite;
        }
        
        .character-right {
            position: absolute;
            right: 50px;
            bottom: 0;
            width: 300px;
            z-index: 30;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float 3s infinite;
        }
        
        .character-left img, .character-right img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .character-name {
            color: gold;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid gold;
            display: inline-block;
            margin-top: 5px;
            backdrop-filter: blur(5px);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* ИНТЕРАКТИВНЫЕ ЗОНЫ */
        .hotspot {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 40;
            transition: 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .hotspot.active {
            display: flex;
        }
        
        .hotspot::before {
            content: '🔍';
            font-size: 2rem;
            opacity: 0;
            transition: 0.3s;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            padding: 10px;
            border: 2px solid gold;
        }
        
        .hotspot:hover::before {
            opacity: 1;
            transform: scale(1.1);
        }
        
        /* РАСПОЛОЖЕНИЕ ПРЕДМЕТОВ */
        .hotspot-1 { left: 200px; top: 200px; }
        .hotspot-2 { left: 500px; top: 150px; }
        .hotspot-3 { left: 800px; top: 250px; }
        .hotspot-4 { left: 300px; top: 350px; }
        .hotspot-5 { left: 600px; top: 300px; }
        .hotspot-6 { left: 900px; top: 180px; }
        
        /* ДИАЛОГ */
        .dialogue-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            z-index: 100;
        }
        
        .dialogue-box {
            background: rgba(0,0,0,0.85);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 20px;
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .dialogue-speaker {
            color: gold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-bottom: 2px solid gold;
            padding-bottom: 5px;
        }
        
        .dialogue-text {
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 60px;
            margin-bottom: 15px;
        }
        
        .dialogue-choices {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .choice-btn {
            background: #2a3a4a;
            border: 2px solid gold;
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            color: white;
            font-size: 1rem;
        }
        
        .choice-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.02);
        }
        
        /* МОДАЛЬНОЕ ОКНО ПРЕДМЕТА */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            max-width: 600px;
            background: rgba(0,0,0,0.8);
            border: 4px solid gold;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 40px;
            height: 40px;
            background: gold;
            color: black;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
            z-index: 1100;
        }
        
        .modal-close:hover {
            transform: scale(1.1);
            background: #ffd700;
        }
        
        .modal-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .modal-title {
            color: gold;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        
        .modal-desc {
            color: white;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid gold;
        }
        
        .modal-btn {
            background: gold;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
        }
        
        .modal-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        
        /* МОДАЛЬНОЕ ОКНО ЗАДАНИЯ */
        .quest-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1100;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .quest-modal.active {
            display: flex;
        }
        
        .quest-content {
            max-width: 700px;
            background: rgba(0,0,0,0.8);
            border: 4px solid gold;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .quest-title {
            color: gold;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .quest-text {
            color: white;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid gold;
            text-align: left;
        }
        
        .quest-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .quest-option {
            background: #2a3a4a;
            border: 2px solid gold;
            border-radius: 15px;
            padding: 12px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        
        .quest-option:hover {
            background: gold;
            color: black;
            transform: scale(1.02);
        }
        
        .quest-feedback {
            color: gold;
            font-size: 1.1rem;
            min-height: 30px;
        }
        
        /* КНОПКА ПЕРЕХОДА */
        .location-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: gold;
            color: black;
            border: 2px solid white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
            display: none;
            box-shadow: 0 0 30px gold;
            animation: pulse 2s infinite;
        }
        
        .location-btn.visible {
            display: block;
        }
        
        .location-btn:hover {
            transform: scale(1.05);
        }
        
        /* КНОПКА ЗВУКА */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.8);
            border: 2px solid gold;
            color: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2000;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: gold;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid gold;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 2000;
            background: rgba(0,0,0,0.5);
        }
        
        .back-link:hover {
            background: gold;
            color: black;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 10px gold; }
            50% { box-shadow: 0 0 30px gold; }
            100% { box-shadow: 0 0 10px gold; }
        }
    </style>
</head>
<body>
    <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>
    
    <div class="game-container">
        <a href="index.html" class="back-link">← Назад</a>
        
        <div class="throne-room">
            <!-- Верхняя панель -->
            <div class="top-bar">
                <div class="stats">
                    <div class="stat-item"><span class="economy">💰</span> <span id="statEconomy">50</span></div>
                    <div class="stat-item"><span class="science">📚</span> <span id="statScience">50</span></div>
                    <div class="stat-item"><span class="army">⚔️</span> <span id="statArmy">50</span></div>
                    <div class="stat-item"><span class="authority">👑</span> <span id="statAuthority">50</span></div>
                </div>
                
                <div class="items-bar" id="itemsBar">
                    <span class="item-icon" id="item0" onclick="openQuest(0)">
                        👑❓
                        <span class="tooltip">Корона</span>
                    </span>
                    <span class="item-icon" id="item1" onclick="openQuest(1)">
                        ⚔️❓
                        <span class="tooltip">Меч</span>
                    </span>
                    <span class="item-icon" id="item2" onclick="openQuest(2)">
                        🔮❓
                        <span class="tooltip">Кристалл</span>
                    </span>
                    <span class="item-icon" id="item3" onclick="openQuest(3)">
                        🗺️❓
                        <span class="tooltip">Карта</span>
                    </span>
                    <span class="item-icon" id="item4" onclick="openQuest(4)">
                        📦❓
                        <span class="tooltip">Сундук</span>
                    </span>
                    <span class="item-icon" id="item5" onclick="openQuest(5)">
                        🏆❓
                        <span class="tooltip">Кубок</span>
                    </span>
                </div>
            </div>
            
            <!-- Персонажи -->
            <div class="character-left">
                <img src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/npc_elder.png" alt="Аристарх">
                <div class="character-name">Старейшина Аристарх</div>
            </div>
            
            <div class="character-right" id="playerCharacter">
                <img id="playerImage" src="" alt="Герой">
                <div class="character-name" id="playerName">Правитель</div>
            </div>
            
            <!-- Интерактивные точки -->
            <div class="hotspot hotspot-1" id="hotspot0" onclick="zoomItem(0)"></div>
            <div class="hotspot hotspot-2" id="hotspot1" onclick="zoomItem(1)"></div>
            <div class="hotspot hotspot-3" id="hotspot2" onclick="zoomItem(2)"></div>
            <div class="hotspot hotspot-4" id="hotspot3" onclick="zoomItem(3)"></div>
            <div class="hotspot hotspot-5" id="hotspot4" onclick="zoomItem(4)"></div>
            <div class="hotspot hotspot-6" id="hotspot5" onclick="zoomItem(5)"></div>
            
            <!-- Диалог -->
            <div class="dialogue-area" id="dialogueArea">
                <div class="dialogue-box">
                    <div class="dialogue-speaker" id="dialogueSpeaker">Аристарх</div>
                    <div class="dialogue-text" id="dialogueText"></div>
                    <div class="dialogue-choices" id="dialogueChoices"></div>
                </div>
            </div>
            
            <!-- Кнопка перехода в город -->
            <div class="location-btn" id="cityBtn" onclick="goToCity()">🏰 ОТПРАВИТЬСЯ В ГОРОД</div>
        </div>
    </div>
    
    <!-- Модальное окно предмета -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeItemModal()">✖</div>
            <img class="modal-image" id="itemImage" src="" alt="">
            <div class="modal-title" id="itemTitle"></div>
            <div class="modal-desc" id="itemDesc"></div>
            <button class="modal-btn" id="itemAction" onclick="startQuest()">📜 Начать задание</button>
        </div>
    </div>
    
    <!-- Модальное окно задания -->
    <div class="quest-modal" id="questModal">
        <div class="quest-content">
            <div class="modal-close" onclick="closeQuestModal()">✖</div>
            <div class="quest-title" id="questTitle"></div>
            <div class="quest-text" id="questText"></div>
            <div class="quest-options" id="questOptions"></div>
            <div class="quest-feedback" id="questFeedback"></div>
        </div>
    </div>

    <!-- Аудио -->
    <audio id="bgmThrone" loop preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/bgm_throne.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxDialog" preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/sfx_dialog.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========== ЗАГРУЗКА ПЕРСОНАЖА ==========
        const playerData = JSON.parse(localStorage.getItem('player') || '{}');
        const playerImage = document.getElementById('playerImage');
        const playerName = document.getElementById('playerName');
        const baseUrl = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/';
        
        if (playerData.gender === 'male') {
            if (playerData.style === 'royal') playerImage.src = baseUrl + 'мужской король.png';
            else if (playerData.style === 'warrior') playerImage.src = baseUrl + 'male_warrior.png';
            else if (playerData.style === 'mage') playerImage.src = baseUrl + 'мужское изображение.png';
            else playerImage.src = baseUrl + 'охотник на самцов.png';
            
            playerName.textContent = playerData.style === 'royal' ? 'Король Артур' :
                                     playerData.style === 'warrior' ? 'Генерал' :
                                     playerData.style === 'mage' ? 'Архимаг' : 'Лесной страж';
        } else {
            if (playerData.style === 'royal') playerImage.src = baseUrl + 'female_royal.png';
            else if (playerData.style === 'warrior') playerImage.src = baseUrl + 'female_warrior.png';
            else if (playerData.style === 'mage') playerImage.src = baseUrl + 'female_mage.png';
            else playerImage.src = baseUrl + 'female_hunter.png';
            
            playerName.textContent = playerData.style === 'royal' ? 'Королева Элеонора' :
                                     playerData.style === 'warrior' ? 'Амазонка' :
                                     playerData.style === 'mage' ? 'Волшебница' : 'Лучница';
        }
        
        // ========== СОСТОЯНИЕ ==========
        const gameState = {
            economy: 50,
            science: 50,
            army: 50,
            authority: 50,
            foundItems: [false, false, false, false, false, false],
            questCompleted: [false, false, false, false, false, false],
            currentItem: null,
            currentQuest: 0,
            dialogueStep: 0
        };
        
        // ========== БОЛЬШОЙ СЮЖЕТНЫЙ ДИАЛОГ ==========
        const dialogues = [
            // Шаг 0 - Вступление
            {
                speaker: 'Аристарх',
                text: 'Десять лет... Я каждый день приходил сюда. Ждал. Молился, чтобы ты был жив. И ты здесь. Стоишь.'
            },
            // Шаг 1 - Трагедия
            {
                speaker: 'Аристарх',
                text: 'Твои родители... они не просто умерли. Их убили. Это были свои. Те, кому они доверяли.'
            },
            // Шаг 2 - Воспоминания об отце
            {
                speaker: 'Аристарх',
                text: 'Твой отец был мудрым правителем. Он часто говорил: "Власть — это не право, а ответственность". Ты помнишь его?',
                choices: [
                    { 
                        text: '«Помню его тёплые руки, когда он сажал меня на трон.»',
                        effect: () => { gameState.authority += 5; gameState.economy += 2; },
                        response: 'Он любил тебя больше жизни. Каждое утро он носил тебя на плечах по этому залу.'
                    },
                    { 
                        text: '«Помню его строгий взгляд. Он редко хвалил.»',
                        effect: () => { gameState.army += 5; gameState.authority += 2; },
                        response: 'Он говорил: "Правителя должны бояться враги, а не дети". Но по ночам он плакал, думая о тебе.'
                    },
                    { 
                        text: '«Я почти не помню его. Только запах старой книги и дыма.»',
                        effect: () => { gameState.science += 5; gameState.authority += 2; },
                        response: 'Он всегда работал в библиотеке по ночам. Искал способ защитить город от заговора.'
                    }
                ]
            },
            // Шаг 3 - О матери
            {
                speaker: 'Аристарх',
                text: 'А мать? Она часто пела тебе колыбельные в этом зале. Голос её разносился под сводами...',
                choices: [
                    { 
                        text: '«Помню её голос. Он был как свет.»',
                        effect: () => { gameState.authority += 5; gameState.science += 3; },
                        response: 'Она звала тебя "мой маленький свет". В последний вечер она спела тебе и ушла... навсегда.'
                    },
                    { 
                        text: '«Она учила меня доброте. Раздавала монеты нищим.»',
                        effect: () => { gameState.economy += 5; gameState.authority += 3; },
                        response: 'Она раздавала золото бедным, за что знать её ненавидела. Они считали её слабой. Но она была сильнее всех.'
                    },
                    { 
                        text: '«Я почти не помню её лица. Только тёплые руки.»',
                        effect: () => { gameState.army += 5; gameState.authority -= 2; },
                        response: 'Ты был слишком мал... Прости. Она держала тебя, пока стражники ломились в дверь.'
                    }
                ]
            },
            // Шаг 4 - Кто мог стоять за убийством?
            {
                speaker: 'Аристарх',
                text: 'Знаешь, кто мог стоять за убийством? Советник Мортемир всегда завидовал твоему отцу. Купцы из гильдии хотели захватить власть. Военные роптали.',
                choices: [
                    { 
                        text: '«Советник. Он всегда смотрел на отца с ненавистью.»',
                        effect: () => { gameState.science += 5; gameState.authority += 3; },
                        response: 'Ты прав. Мортемир был главным заговорщиком. Он собирал тайные встречи в подземелье.'
                    },
                    { 
                        text: '«Купцы. Они думают только о золоте.»',
                        effect: () => { gameState.economy += 5; gameState.authority += 2; },
                        response: 'Они дали золото на убийство. Но кто-то ещё был выше них.'
                    },
                    { 
                        text: '«Военные. Отец хотел мира, а они — войны.»',
                        effect: () => { gameState.army += 5; gameState.authority -= 2; },
                        response: 'Среди них были предатели. Но они лишь исполнители, не заказчики.'
                    }
                ]
            },
            // Шаг 5 - Тайна в тронном зале
            {
                speaker: 'Аристарх',
                text: 'В этом зале спрятаны шесть древних предметов. Твой отец оставил их для тебя. Они хранят части правды.',
                choices: [
                    { 
                        text: '«Где они? Я обыщу каждый угол.»',
                        effect: () => { gameState.army += 3; },
                        response: 'Ищи. Корона на троне, меч за колонной, кристалл в нише, карта на столе, сундук в углу, кубок за шторой.'
                    },
                    { 
                        text: '«Почему ты сам не нашёл их за 10 лет?»',
                        effect: () => { gameState.authority -= 2; },
                        response: 'Я пытался. Но они открываются только наследнику крови. Ты — единственный.'
                    },
                    { 
                        text: '«Что в них такого важного?»',
                        effect: () => { gameState.science += 3; },
                        response: 'Имена заговорщиков. Места встреч. Доказательства. И кое-что ещё... тайна твоего рождения.'
                    }
                ]
            },
            // Шаг 6 - Тайна рождения
            {
                speaker: 'Аристарх',
                text: 'Твой отец не был твоим родным отцом. Он взял тебя из приюта, когда ты был младенцем. Твои настоящие родители погибли в тот же день, что и король с королевой. Заговор был против всех.'
            },
            // Шаг 7 - Реакция игрока
            {
                speaker: 'Аристарх',
                text: 'Теперь ты знаешь правду. Как ты к этому относишься?',
                choices: [
                    { 
                        text: '«Он вырастил меня. Он мой отец. Кровь не важна.»',
                        effect: () => { gameState.authority += 10; },
                        response: 'Благородные слова. Он был бы счастлив слышать это.'
                    },
                    { 
                        text: '«Почему ты скрывал это 10 лет?»',
                        effect: () => { gameState.authority -= 5; },
                        response: 'Я боялся, что ты отвернешься от трона. Но теперь ты должен знать.'
                    },
                    { 
                        text: '«Кто мои настоящие родители?»',
                        effect: () => { gameState.science += 5; },
                        response: 'Они были простыми людьми. Слугами во дворце. Они отдали жизнь, спасая тебя.'
                    }
                ]
            },
            // Шаг 8 - Месть или прощение
            {
                speaker: 'Аристарх',
                text: 'Теперь ты должен решить. Что для тебя важнее — месть или правда?',
                choices: [
                    { 
                        text: '«Я хочу, чтобы они заплатили. Каждый.»',
                        effect: () => { gameState.army += 10; gameState.authority -= 5; },
                        response: 'Гнев поведёт тебя по кровавому пути. Но выберешь ли ты его?'
                    },
                    { 
                        text: '«Я хочу знать всё. А потом решу.»',
                        effect: () => { gameState.science += 10; gameState.authority += 5; },
                        response: 'Мудрое решение. Правда освобождает.'
                    },
                    { 
                        text: '«Я хочу восстановить город. Месть подождёт.»',
                        effect: () => { gameState.economy += 10; gameState.authority += 5; },
                        response: 'Достойно истинного правителя.'
                    }
                ]
            },
            // Шаг 9 - Предупреждение
            {
                speaker: 'Аристарх',
                text: 'Но помни: в городе есть те, кто хочет тебя остановить. Капитан Эдвин что-то скрывает. Купец Бертран впустил убийц. Библиотекарь Мира знает больше, чем говорит. Командир Грегор был другом отца, но... можно ли ему верить? Жрица Серена связана обетом. И повсюду шпионы Мортемира.'
            },
            // Шаг 10 - Предметы
            {
                speaker: 'Аристарх',
                text: 'Ищи по всему залу. Трон, колонны, стол, шкаф, сундук, штору. Там ты найдёшь ответы. И помни: некоторые предметы охраняются магией. Будь осторожен.'
            }
        ];
        
        const dialogueArea = document.getElementById('dialogueArea');
        const dialogueText = document.getElementById('dialogueText');
        const dialogueSpeaker = document.getElementById('dialogueSpeaker');
        const dialogueChoices = document.getElementById('dialogueChoices');
        const cityBtn = document.getElementById('cityBtn');
        
        function showDialogue() {
            if (gameState.dialogueStep >= dialogues.length) {
                // Диалог окончен
                dialogueArea.style.display = 'none';
                
                // Показываем точки поиска
                for (let i = 0; i < 6; i++) {
                    document.getElementById(`hotspot${i}`).classList.add('active');
                }
                return;
            }
            
            const step = dialogues[gameState.dialogueStep];
            dialogueSpeaker.textContent = step.speaker;
            dialogueText.textContent = step.text;
            
            if (step.choices) {
                let choicesHtml = '';
                step.choices.forEach((choice, index) => {
                    choicesHtml += `<div class="choice-btn" onclick="makeChoice(${index})">${choice.text}</div>`;
                });
                dialogueChoices.innerHTML = choicesHtml;
            } else {
                dialogueChoices.innerHTML = `<div class="choice-btn" onclick="nextDialogue()">Далее →</div>`;
            }
        }
        
        window.nextDialogue = function() {
            gameState.dialogueStep++;
            showDialogue();
            playSound(sfxDialog);
            updateStats();
        };
        
        window.makeChoice = function(index) {
            const step = dialogues[gameState.dialogueStep];
            const choice = step.choices[index];
            
            // Применяем эффекты
            if (choice.effect) choice.effect();
            
            // Показываем ответ персонажа
            dialogueText.textContent = choice.response;
            dialogueChoices.innerHTML = `<div class="choice-btn" onclick="nextDialogue()">Далее →</div>`;
            
            updateStats();
            playSound(sfxDialog);
        };
        
        // ========== ПРЕДМЕТЫ ==========
        const items = [
            {
                name: 'Корона',
                icon: '👑',
                image: baseUrl + 'item_crown.png',
                desc: 'Старинная корона с рубинами. Внутри выгравировано имя: "Эдгар". Это имя твоего дяди.',
                pos: 'На троне'
            },
            {
                name: 'Меч',
                icon: '⚔️',
                image: baseUrl + 'item_sword.png',
                desc: 'Древний меч с рунами. Руны гласят: "Кровь за кровь". На лезвии засохшая кровь.',
                pos: 'За колонной'
            },
            {
                name: 'Кристалл',
                icon: '🔮',
                image: baseUrl + 'предмет_кристалл.png',
                desc: 'Магический кристалл. Внутри видно лицо... Это Мортемир, теневой советник.',
                pos: 'В нише стены'
            },
            {
                name: 'Карта',
                icon: '🗺️',
                image: baseUrl + 'item_map.jpg',
                desc: 'Старая карта города. Красным отмечены: порт, библиотека, казармы, храм.',
                pos: 'На столе'
            },
            {
                name: 'Сундук',
                icon: '📦',
                image: baseUrl + 'item_chest.png',
                desc: 'Сундук с монетами. На дне свиток с именами: Кассий, Морвуд, Эдгар.',
                pos: 'В углу'
            },
            {
                name: 'Кубок',
                icon: '🏆',
                image: baseUrl + 'item_crown.png',
                desc: 'Золотой кубок с гербом. Внутри послание: "Они придут с моря. Верь только Аристарху".',
                pos: 'За шторой'
            }
        ];
        
        const itemModal = document.getElementById('itemModal');
        const itemImage = document.getElementById('itemImage');
        const itemTitle = document.getElementById('itemTitle');
        const itemDesc = document.getElementById('itemDesc');
        const itemAction = document.getElementById('itemAction');
        
        window.zoomItem = function(index) {
            gameState.currentItem = index;
            const item = items[index];
            
            itemImage.src = item.image;
            itemTitle.textContent = item.name;
            itemDesc.innerHTML = `<strong>${item.name}</strong> (${item.pos})<br>${item.desc}`;
            
            if (gameState.questCompleted[index]) {
                itemAction.style.display = 'none';
            } else {
                itemAction.style.display = 'block';
            }
            
            itemModal.classList.add('active');
        };
        
        window.closeItemModal = function() {
            itemModal.classList.remove('active');
        };
        
        // ========== ЗАДАНИЯ ==========
        const quests = [
            {
                text: '«Именно над этим вопросом задумывается Ю. Алешковский... различные обстоятельства оказывают сильное влияние на эмоциональное состояние человека.»',
                options: [
                    'Речевая (лексическая несочетаемость)',
                    'Грамматическая (ошибка в причастном обороте)',
                    'Речевая (неудачное употребление местоимений)'
                ],
                correct: 2
            },
            {
                text: '«В заключение можно сделать вывод, что в детстве чувства ребёнка к отцу нельзя назвать осмысленными.»',
                options: [
                    'Речевая (лексическая несочетаемость)',
                    'Речевая избыточность',
                    'Орфографическая (ошибка в предлоге)'
                ],
                correct: 1
            },
            {
                text: '«Множество важных вещей могут связывать человека с родиной, таких как семья, друзья и даже обычные рассказы...»',
                options: [
                    'Логическая + орфографическая',
                    'Этическая + логическая',
                    'Грамматическая (ОЧП)'
                ],
                correct: 1
            },
            {
                text: '«...проявляет заботу к своим ученикам, даже в мелочах: спасает щенков, которых родители наказали утопить...»',
                options: [
                    'Грамматическая + пунктуационная',
                    'Одна грамматическая',
                    'Одна пунктуационная'
                ],
                correct: 0
            },
            {
                text: '«Чтобы подтвердить эту мысль, приведу в пример историю Антона Макаренко...»',
                options: [
                    'Грамматическая (однородные члены)',
                    'Речевая (приведу в пример)',
                    'Грамматическая (деепричастный оборот)'
                ],
                correct: 1
            },
            {
                text: '«Герои защищают свою родину и честь, а их поступки достойно уважения и признательности.»',
                options: [
                    'Речевая (паронимы)',
                    'Грамматическая (согласование)',
                    'Логическая + грамматическая'
                ],
                correct: 2
            }
        ];
        
        const questModal = document.getElementById('questModal');
        const questTitle = document.getElementById('questTitle');
        const questText = document.getElementById('questText');
        const questOptions = document.getElementById('questOptions');
        const questFeedback = document.getElementById('questFeedback');
        
        window.startQuest = function() {
            const index = gameState.currentItem;
            if (index === null) return;
            
            if (gameState.questCompleted[index]) {
                alert('Ты уже выполнил это задание!');
                return;
            }
            
            gameState.currentQuest = index;
            const quest = quests[index];
            
            questTitle.textContent = items[index].name;
            questText.textContent = quest.text;
            
            let optionsHtml = '';
            quest.options.forEach((opt, i) => {
                optionsHtml += `<div class="quest-option" onclick="answerQuest(${i})">${opt}</div>`;
            });
            questOptions.innerHTML = optionsHtml;
            questFeedback.textContent = '';
            
            itemModal.classList.remove('active');
            questModal.classList.add('active');
        };
        
        window.answerQuest = function(optionIndex) {
            const quest = quests[gameState.currentQuest];
            
            if (optionIndex === quest.correct) {
                gameState.science += 10;
                gameState.authority += 5;
                questFeedback.textContent = '✅ Верно! +10 Наука, +5 Авторитет';
                
                // Отмечаем предмет как найденный
                const index = gameState.currentQuest;
                gameState.foundItems[index] = true;
                gameState.questCompleted[index] = true;
                
                const itemIcon = document.getElementById(`item${index}`);
                itemIcon.innerHTML = `${items[index].icon}✅`;
                itemIcon.classList.add('found');
                
                // Применяем бонус предмета
                switch(index) {
                    case 0: gameState.authority += 5; gameState.economy += 2; break;
                    case 1: gameState.army += 5; gameState.authority += 2; break;
                    case 2: gameState.science += 5; gameState.authority += 2; break;
                    case 3: gameState.economy += 5; gameState.science += 2; break;
                    case 4: gameState.economy += 5; gameState.army += 2; break;
                    case 5: gameState.authority += 5; gameState.science += 2; break;
                }
            } else {
                gameState.science -= 5;
                gameState.authority -= 2;
                questFeedback.textContent = '❌ Неверно. Наука −5, Авторитет −2';
            }
            
            updateStats();
            
            document.querySelectorAll('.quest-option').forEach(btn => {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.5';
            });
            
            // Проверяем, собрано ли 3 предмета (для кнопки перехода)
            const foundCount = gameState.foundItems.filter(v => v).length;
            if (foundCount >= 3) {
                cityBtn.classList.add('visible');
            }
        };
        
        window.closeQuestModal = function() {
            questModal.classList.remove('active');
        };
        
        // ========== ПЕРЕХОД В ГОРОД ==========
        window.goToCity = function() {
            window.location.href = 'city-map.html';
        };
        
        // ========== UI ==========
        function updateStats() {
            document.getElementById('statEconomy').textContent = gameState.economy;
            document.getElementById('statScience').textContent = gameState.science;
            document.getElementById('statArmy').textContent = gameState.army;
            document.getElementById('statAuthority').textContent = gameState.authority;
        }
        
        function playSound(audio) {
            if (soundEnabled) {
                audio.currentTime = 0;
                audio.play().catch(e => {});
            }
        }
        
        // ========== ЗВУК ==========
        const bgmThrone = document.getElementById('bgmThrone');
        const sfxDialog = document.getElementById('sfxDialog');
        let soundEnabled = true;
        
        window.addEventListener('load', function() {
            bgmThrone.volume = 0.3;
            bgmThrone.play().catch(e => {});
            showDialogue();
        });
        
        window.toggleSound = function() {
            soundEnabled = !soundEnabled;
            const toggle = document.getElementById('soundToggle');
            bgmThrone.volume = soundEnabled ? 0.3 : 0;
            toggle.innerHTML = soundEnabled ? '🔊' : '🔇';
        };
        
        updateStats();
    </script>
</body>
</html>
