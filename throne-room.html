<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - ТРОННЫЙ ЗАЛ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cinzel', serif;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 1400px;
            max-width: 100%;
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 30px;
            padding: 20px;
            border: 3px solid gold;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
        }
        
        .throne-room {
            background-image: url('https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/bg_throne.jpg');
            background-size: cover;
            background-position: center;
            border: 3px solid gold;
            border-radius: 20px;
            min-height: 800px;
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.7);
        }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.7);
            border-bottom: 2px solid gold;
            border-radius: 20px 20px 0 0;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 50;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            color: white;
            font-size: 1.2rem;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .economy { color: #ffd700; }
        .science { color: #00ffff; }
        .army { color: #ff4444; }
        .authority { color: gold; }
        
        .items-bar {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid gold;
        }
        
        .item-icon {
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
            filter: grayscale(1);
            position: relative;
        }
        
        .item-icon.found {
            opacity: 1;
            filter: none;
            animation: pulse 2s infinite;
        }
        
        .item-icon:hover {
            transform: scale(1.2);
        }
        
        .item-icon .tooltip {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            white-space: nowrap;
            display: none;
        }
        
        .item-icon:hover .tooltip {
            display: block;
        }
        
        /* ПЕРСОНАЖИ */
        .character-left {
            position: absolute;
            left: 50px;
            bottom: 0;
            width: 300px;
            z-index: 30;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float 3s infinite;
        }
        
        .character-right {
            position: absolute;
            right: 50px;
            bottom: 0;
            width: 300px;
            z-index: 30;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float 3s infinite;
        }
        
        .character-left img, .character-right img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .character-name {
            color: gold;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid gold;
            display: inline-block;
            margin-top: 5px;
            backdrop-filter: blur(5px);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* ИНТЕРАКТИВНЫЕ ЗОНЫ */
        .hotspot {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 40;
            transition: 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .hotspot.active {
            display: flex;
        }
        
        .hotspot::before {
            content: '🔍';
            font-size: 2rem;
            opacity: 0;
            transition: 0.3s;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            padding: 10px;
            border: 2px solid gold;
        }
        
        .hotspot:hover::before {
            opacity: 1;
            transform: scale(1.1);
        }
        
        /* РАСПОЛОЖЕНИЕ ПРЕДМЕТОВ */
        .hotspot-1 { left: 200px; top: 200px; }
        .hotspot-2 { left: 500px; top: 150px; }
        .hotspot-3 { left: 800px; top: 250px; }
        .hotspot-4 { left: 300px; top: 350px; }
        .hotspot-5 { left: 600px; top: 300px; }
        .hotspot-6 { left: 900px; top: 180px; }
        
        /* ДИАЛОГ */
        .dialogue-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            z-index: 100;
        }
        
        .dialogue-box {
            background: rgba(0,0,0,0.85);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 20px;
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .dialogue-speaker {
            color: gold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-bottom: 2px solid gold;
            padding-bottom: 5px;
        }
        
        .dialogue-text {
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 60px;
            margin-bottom: 15px;
        }
        
        .dialogue-choices {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .choice-btn {
            background: #2a3a4a;
            border: 2px solid gold;
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            color: white;
            font-size: 1rem;
        }
        
        .choice-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.02);
        }
        
        /* МОДАЛЬНОЕ ОКНО */
        .zoom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .zoom-modal.active {
            display: flex;
        }
        
        .zoom-content {
            max-width: 600px;
            background: rgba(0,0,0,0.8);
            border: 4px solid gold;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        
        .zoom-content img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .zoom-desc {
            color: white;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .zoom-btn {
            background: gold;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            margin: 5px;
        }
        
        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(0,0,0,0.7);
            color: gold;
            border: 2px solid gold;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
        }
        
        /* КНОПКА ЗВУКА */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.8);
            border: 2px solid gold;
            color: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2000;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: gold;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid gold;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 2000;
            background: rgba(0,0,0,0.5);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>
    
    <div class="game-container">
        <a href="index.html" class="back-link">← Назад</a>
        
        <div class="throne-room">
            <!-- Верхняя панель -->
            <div class="top-bar">
                <div class="stats">
                    <div class="stat-item"><span class="economy">💰</span> <span id="statEconomy">50</span></div>
                    <div class="stat-item"><span class="science">📚</span> <span id="statScience">50</span></div>
                    <div class="stat-item"><span class="army">⚔️</span> <span id="statArmy">50</span></div>
                    <div class="stat-item"><span class="authority">👑</span> <span id="statAuthority">50</span></div>
                </div>
                
                <div class="items-bar" id="itemsBar">
                    <span class="item-icon" id="item0" onclick="openQuest(0)">
                        👑❓
                        <span class="tooltip">Корона</span>
                    </span>
                    <span class="item-icon" id="item1" onclick="openQuest(1)">
                        ⚔️❓
                        <span class="tooltip">Меч</span>
                    </span>
                    <span class="item-icon" id="item2" onclick="openQuest(2)">
                        🔮❓
                        <span class="tooltip">Кристалл</span>
                    </span>
                    <span class="item-icon" id="item3" onclick="openQuest(3)">
                        🗺️❓
                        <span class="tooltip">Карта</span>
                    </span>
                    <span class="item-icon" id="item4" onclick="openQuest(4)">
                        📦❓
                        <span class="tooltip">Сундук</span>
                    </span>
                    <span class="item-icon" id="item5" onclick="openQuest(5)">
                        🏆❓
                        <span class="tooltip">Кубок</span>
                    </span>
                </div>
            </div>
            
            <!-- Персонажи -->
            <div class="character-left">
                <img src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/npc_elder.png" alt="Аристарх">
                <div class="character-name">Старейшина Аристарх</div>
            </div>
            
            <div class="character-right" id="playerCharacter">
                <img id="playerImage" src="" alt="Герой">
                <div class="character-name" id="playerName">Правитель</div>
            </div>
            
            <!-- Интерактивные точки -->
            <div class="hotspot hotspot-1" id="hotspot0" onclick="zoomItem(0)"></div>
            <div class="hotspot hotspot-2" id="hotspot1" onclick="zoomItem(1)"></div>
            <div class="hotspot hotspot-3" id="hotspot2" onclick="zoomItem(2)"></div>
            <div class="hotspot hotspot-4" id="hotspot3" onclick="zoomItem(3)"></div>
            <div class="hotspot hotspot-5" id="hotspot4" onclick="zoomItem(4)"></div>
            <div class="hotspot hotspot-6" id="hotspot5" onclick="zoomItem(5)"></div>
            
            <!-- Диалог -->
            <div class="dialogue-area" id="dialogueArea">
                <div class="dialogue-box">
                    <div class="dialogue-speaker" id="dialogueSpeaker">Аристарх</div>
                    <div class="dialogue-text" id="dialogueText"></div>
                    <div class="dialogue-choices" id="dialogueChoices"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div class="zoom-modal" id="zoomModal">
        <div class="close-btn" onclick="closeZoom()">✖</div>
        <div class="zoom-content" id="zoomContent">
            <img id="zoomImage" src="" alt="">
            <div class="zoom-desc" id="zoomDesc"></div>
            <button class="zoom-btn" id="zoomBtn" onclick="takeItem()">📦 Взять предмет</button>
        </div>
    </div>

    <!-- Аудио -->
    <audio id="bgmThrone" loop preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/bgm_throne.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxDialog" preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/sfx_dialog.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========== ЗАГРУЗКА ПЕРСОНАЖА ==========
        const playerData = JSON.parse(localStorage.getItem('player') || '{}');
        const playerImage = document.getElementById('playerImage');
        const playerName = document.getElementById('playerName');
        const baseUrl = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/';
        
        if (playerData.gender === 'male') {
            if (playerData.style === 'royal') playerImage.src = baseUrl + 'мужской король.png';
            else if (playerData.style === 'warrior') playerImage.src = baseUrl + 'male_warrior.png';
            else if (playerData.style === 'mage') playerImage.src = baseUrl + 'мужское изображение.png';
            else playerImage.src = baseUrl + 'охотник на самцов.png';
            
            playerName.textContent = playerData.style === 'royal' ? 'Король Артур' :
                                     playerData.style === 'warrior' ? 'Генерал' :
                                     playerData.style === 'mage' ? 'Архимаг' : 'Лесной страж';
        } else {
            if (playerData.style === 'royal') playerImage.src = baseUrl + 'female_royal.png';
            else if (playerData.style === 'warrior') playerImage.src = baseUrl + 'female_warrior.png';
            else if (playerData.style === 'mage') playerImage.src = baseUrl + 'female_mage.png';
            else playerImage.src = baseUrl + 'female_hunter.png';
            
            playerName.textContent = playerData.style === 'royal' ? 'Королева Элеонора' :
                                     playerData.style === 'warrior' ? 'Амазонка' :
                                     playerData.style === 'mage' ? 'Волшебница' : 'Лучница';
        }
        
        // ========== СОСТОЯНИЕ ==========
        const gameState = {
            economy: 50,
            science: 50,
            army: 50,
            authority: 50,
            foundItems: [false, false, false, false, false, false],
            questCompleted: [false, false, false, false, false, false],
            currentItem: null,
            dialogueStep: 0
        };
        
        // ========== РАЗВИЛКА ДИАЛОГОВ ==========
        const dialogues = [
            // Шаг 0 - Вступление
            {
                speaker: 'Аристарх',
                text: 'Десять лет... Я каждый день приходил сюда. Ждал. Молился, чтобы ты был жив. И ты здесь. Стоишь.'
            },
            // Шаг 1 - Трагедия
            {
                speaker: 'Аристарх',
                text: 'Твои родители... они не просто умерли. Их убили. Это были свои. Те, кому они доверяли.'
            },
            // Шаг 2 - Первый выбор (отношение к городу)
            {
                speaker: 'Аристарх',
                text: 'Теперь ты должен решить, что для тебя важнее — город или месть.',
                choices: [
                    { 
                        text: '«Я спасу город. Это мой долг.»',
                        effect: () => { gameState.authority += 5; gameState.economy += 3; },
                        response: 'Благородный ответ. Твой отец гордился бы тобой.'
                    },
                    { 
                        text: '«Мне нужна месть. Город подождёт.»',
                        effect: () => { gameState.authority -= 3; gameState.army += 5; },
                        response: 'Гнев ведёт тебя... Но помни, он может ослепить.'
                    },
                    { 
                        text: '«Я хочу узнать правду. Остальное неважно.»',
                        effect: () => { gameState.science += 5; gameState.authority += 2; },
                        response: 'Мудрое решение. Правда — ключ ко всему.'
                    }
                ]
            },
            // Шаг 3 - Второй выбор (как действовать)
            {
                speaker: 'Аристарх',
                text: 'В этом зале спрятаны шесть древних предметов. Они укажут путь. Как будешь искать?',
                choices: [
                    { 
                        text: '«Буду методично осматривать каждый угол.»',
                        effect: () => { gameState.science += 5; },
                        response: 'Терпение и труд всё перетрут.'
                    },
                    { 
                        text: '«Найму людей, пусть ищут за меня.»',
                        effect: () => { gameState.economy -= 5; gameState.authority -= 2; },
                        response: 'Деньги решают многое, но не всё.'
                    },
                    { 
                        text: '«Быстро обыщу всё сам.»',
                        effect: () => { gameState.army += 3; gameState.science -= 2; },
                        response: 'Спешка нужна только при ловле блох.'
                    }
                ]
            },
            // Шаг 4 - Напутствие
            {
                speaker: 'Аристарх',
                text: 'Ищи по всему залу. Трон, колонны, стол, шкаф, сундук, штору. Там ты найдёшь ответы. Удачи, Правитель.'
            }
        ];
        
        const dialogueArea = document.getElementById('dialogueArea');
        const dialogueText = document.getElementById('dialogueText');
        const dialogueSpeaker = document.getElementById('dialogueSpeaker');
        const dialogueChoices = document.getElementById('dialogueChoices');
        
        function showDialogue() {
            if (gameState.dialogueStep >= dialogues.length) {
                // Диалог окончен
                dialogueArea.style.display = 'none';
                
                // Показываем точки поиска
                for (let i = 0; i < 6; i++) {
                    document.getElementById(`hotspot${i}`).classList.add('active');
                }
                return;
            }
            
            const step = dialogues[gameState.dialogueStep];
            dialogueSpeaker.textContent = step.speaker;
            dialogueText.textContent = step.text;
            
            if (step.choices) {
                let choicesHtml = '';
                step.choices.forEach((choice, index) => {
                    choicesHtml += `<div class="choice-btn" onclick="makeChoice(${index})">${choice.text}</div>`;
                });
                dialogueChoices.innerHTML = choicesHtml;
            } else {
                dialogueChoices.innerHTML = `<div class="choice-btn" onclick="nextDialogue()">Далее →</div>`;
            }
        }
        
        window.nextDialogue = function() {
            gameState.dialogueStep++;
            showDialogue();
            playSound(sfxDialog);
            updateStats();
        };
        
        window.makeChoice = function(index) {
            const step = dialogues[gameState.dialogueStep];
            const choice = step.choices[index];
            
            // Применяем эффекты
            if (choice.effect) choice.effect();
            
            // Показываем ответ персонажа
            dialogueText.textContent = choice.response;
            dialogueChoices.innerHTML = `<div class="choice-btn" onclick="nextDialogue()">Далее →</div>`;
            
            updateStats();
            playSound(sfxDialog);
        };
        
        // ========== ПРЕДМЕТЫ ==========
        const items = [
            {
                name: 'Корона',
                icon: '👑',
                image: baseUrl + 'item_crown.png',
                desc: 'Старинная корона с рубинами. Внутри выгравировано имя.',
                bonus: { auth: 5, eco: 2 },
                pos: 'На троне'
            },
            {
                name: 'Меч',
                icon: '⚔️',
                image: baseUrl + 'item_sword.png',
                desc: 'Древний меч с рунами. Лезвие всё ещё остро.',
                bonus: { army: 5, auth: 2 },
                pos: 'За колонной'
            },
            {
                name: 'Кристалл',
                icon: '🔮',
                image: baseUrl + 'предмет_кристалл.png',
                desc: 'Магический кристалл, пульсирует тёплым светом.',
                bonus: { science: 5, auth: 2 },
                pos: 'В нише стены'
            },
            {
                name: 'Карта',
                icon: '🗺️',
                image: baseUrl + 'item_map.jpg',
                desc: 'Старая карта города. Некоторые места отмечены.',
                bonus: { eco: 5, science: 2 },
                pos: 'На столе'
            },
            {
                name: 'Сундук',
                icon: '📦',
                image: baseUrl + 'item_chest.png',
                desc: 'Небольшой сундук с монетами и свитками.',
                bonus: { eco: 5, army: 2 },
                pos: 'В углу'
            },
            {
                name: 'Кубок',
                icon: '🏆',
                image: baseUrl + 'item_crown.png',
                desc: 'Золотой кубок с гербом рода. Внутри послание.',
                bonus: { auth: 5, science: 2 },
                pos: 'За шторой'
            }
        ];
        
        const zoomModal = document.getElementById('zoomModal');
        const zoomImage = document.getElementById('zoomImage');
        const zoomDesc = document.getElementById('zoomDesc');
        const zoomBtn = document.getElementById('zoomBtn');
        
        window.zoomItem = function(index) {
            gameState.currentItem = index;
            const item = items[index];
            
            zoomImage.src = item.image;
            zoomDesc.innerHTML = `<strong>${item.name}</strong> (${item.pos})<br>${item.desc}`;
            zoomBtn.style.display = gameState.foundItems[index] ? 'none' : 'block';
            zoomModal.classList.add('active');
        };
        
        window.closeZoom = function() {
            zoomModal.classList.remove('active');
        };
        
        window.takeItem = function() {
            const index = gameState.currentItem;
            if (index === null || gameState.foundItems[index]) return;
            
            const item = items[index];
            
            // Применяем бонусы
            if (item.bonus.auth) gameState.authority += item.bonus.auth;
            if (item.bonus.eco) gameState.economy += item.bonus.eco;
            if (item.bonus.army) gameState.army += item.bonus.army;
            if (item.bonus.science) gameState.science += item.bonus.science;
            
            gameState.foundItems[index] = true;
            
            const itemIcon = document.getElementById(`item${index}`);
            itemIcon.innerHTML = `${item.icon}✅`;
            itemIcon.classList.add('found');
            
            zoomDesc.innerHTML = `<strong>${item.name}</strong><br>✅ Ты нашёл ${item.name}!<br>+${item.bonus.auth || 0} 👑, +${item.bonus.eco || 0} 💰, +${item.bonus.army || 0} ⚔️, +${item.bonus.science || 0} 📚`;
            zoomBtn.style.display = 'none';
            
            updateStats();
            playSound(sfxDialog);
            
            // Если все предметы собраны
            if (gameState.foundItems.every(v => v)) {
                setTimeout(() => {
                    alert('✨ Все предметы найдены! Теперь изучи их в верхней панели.');
                }, 500);
            }
        };
        
        // ========== ЗАДАНИЯ ПО ПРЕДМЕТАМ ==========
        const quests = [
            { text: 'Что написано на короне?', correct: 2 },
            { text: 'Какая надпись на мече?', correct: 1 },
            { text: 'Что видно внутри кристалла?', correct: 0 },
            { text: 'Что отмечено на карте?', correct: 1 },
            { text: 'Что в сундуке?', correct: 2 },
            { text: 'Что в кубке?', correct: 0 }
        ];
        
        const optionsList = [
            ['Имя отца', 'Дата убийства', 'Герб рода'],
            ['Имя врага', 'Руны силы', 'Клятва'],
            ['Лицо', 'Город', 'Символ'],
            ['Тронный зал', 'Убежище', 'Порт'],
            ['Золото', 'Свитки', 'И то, и другое'],
            ['Вино', 'Послание', 'Прах']
        ];
        
        window.openQuest = function(index) {
            if (!gameState.foundItems[index]) {
                alert('Сначала найди этот предмет в зале!');
                return;
            }
            if (gameState.questCompleted[index]) {
                alert('Ты уже изучил этот предмет!');
                return;
            }
            
            const quest = quests[index];
            const options = optionsList[index];
            const item = items[index];
            
            const modal = document.createElement('div');
            modal.className = 'zoom-modal active';
            modal.id = 'questModal';
            
            let optionsHtml = '';
            options.forEach((opt, i) => {
                optionsHtml += `<div class="zoom-btn" style="margin:5px;" onclick="answerQuest(${index}, ${i})">${opt}</div>`;
            });
            
            modal.innerHTML = `
                <div class="close-btn" onclick="closeQuestModal()">✖</div>
                <div class="zoom-content">
                    <h2 style="color: gold;">${item.name}</h2>
                    <p style="color:white; margin:20px;">${quest.text}</p>
                    ${optionsHtml}
                    <div id="questFeedback" style="color:gold; margin-top:20px;"></div>
                </div>
            `;
            document.body.appendChild(modal);
        };
        
        window.answerQuest = function(itemIndex, optionIndex) {
            const quest = quests[itemIndex];
            const feedback = document.getElementById('questFeedback');
            
            if (optionIndex === quest.correct) {
                gameState.science += 10;
                gameState.authority += 5;
                feedback.innerHTML = '✅ Верно! +10 Наука, +5 Авторитет';
            } else {
                gameState.science -= 5;
                gameState.authority -= 2;
                feedback.innerHTML = '❌ Неверно. Наука −5, Авторитет −2';
            }
            
            gameState.questCompleted[itemIndex] = true;
            updateStats();
            
            document.querySelectorAll('#questModal .zoom-btn').forEach(btn => {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.5';
            });
        };
        
        window.closeQuestModal = function() {
            const modal = document.getElementById('questModal');
            if (modal) modal.remove();
        };
        
        // ========== UI ==========
        function updateStats() {
            document.getElementById('statEconomy').textContent = gameState.economy;
            document.getElementById('statScience').textContent = gameState.science;
            document.getElementById('statArmy').textContent = gameState.army;
            document.getElementById('statAuthority').textContent = gameState.authority;
        }
        
        function playSound(audio) {
            if (soundEnabled) {
                audio.currentTime = 0;
                audio.play().catch(e => {});
            }
        }
        
        // ========== ЗВУК ==========
        const bgmThrone = document.getElementById('bgmThrone');
        const sfxDialog = document.getElementById('sfxDialog');
        let soundEnabled = true;
        
        window.addEventListener('load', function() {
            bgmThrone.volume = 0.3;
            bgmThrone.play().catch(e => {});
            showDialogue();
        });
        
        window.toggleSound = function() {
            soundEnabled = !soundEnabled;
            const toggle = document.getElementById('soundToggle');
            bgmThrone.volume = soundEnabled ? 0.3 : 0;
            toggle.innerHTML = soundEnabled ? '🔊' : '🔇';
        };
        
        updateStats();
    </script>
</body>
</html>
