<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - ТРОННЫЙ ЗАЛ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cinzel', serif;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 1400px;
            max-width: 100%;
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 30px;
            padding: 30px;
            border: 3px solid gold;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
            position: relative;
        }
        
        .throne-room {
            background-image: url('https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/bg_throne.jpg');
            background-size: cover;
            background-position: center;
            border: 3px solid gold;
            border-radius: 20px;
            padding: 40px;
            min-height: 700px;
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.7);
        }
        
        .throne-room::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            pointer-events: none;
        }
        
        /* ПАНЕЛЬ СТАТОВ */
        .stats-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 15px 25px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(5px);
            display: flex;
            gap: 30px;
            font-size: 1.2rem;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .economy { color: #ffd700; }
        .science { color: #00ffff; }
        .army { color: #ff4444; }
        .authority { color: gold; }
        
        /* ПЕРСОНАЖИ */
        .characters {
            position: relative;
            width: 100%;
            height: 500px;
            margin-top: 50px;
            z-index: 10;
        }
        
        .character-left {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 300px;
            text-align: center;
            animation: float 3s infinite;
        }
        
        .character-right {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 300px;
            text-align: center;
            animation: float 3s infinite;
        }
        
        .character-left img, .character-right img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        
        .character-name {
            color: gold;
            font-size: 1.3rem;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid gold;
            display: inline-block;
            margin-top: 10px;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* ОБЛАСТЬ ДИАЛОГА */
        .dialogue-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            z-index: 200;
        }
        
        .dialogue-box {
            background: rgba(0,0,0,0.85);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 20px;
            color: white;
            backdrop-filter: blur(10px);
            margin-bottom: 15px;
        }
        
        .dialogue-speaker {
            color: gold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-bottom: 2px solid gold;
            padding-bottom: 5px;
        }
        
        .dialogue-text {
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 60px;
        }
        
        .dialogue-choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        
        .choice-btn {
            background: #2a3a4a;
            border: 2px solid gold;
            border-radius: 15px;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            color: white;
        }
        
        .choice-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.02);
        }
        
        .next-btn {
            background: gold;
            color: black;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            margin-top: 10px;
        }
        
        /* ИНВЕНТАРЬ */
        .inventory {
            position: absolute;
            top: 100px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 15px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(5px);
            width: 250px;
        }
        
        .inventory h3 {
            color: gold;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .inventory-slot {
            background: rgba(0,0,0,0.5);
            border: 1px solid gold;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            min-height: 70px;
        }
        
        .inventory-slot:hover {
            background: rgba(255,215,0,0.3);
            transform: scale(1.05);
        }
        
        .inventory-slot.found {
            border-color: #00ff00;
            background: rgba(0,255,0,0.1);
        }
        
        /* ТОЧКИ ОСМОТРА */
        .examine-point {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,215,0,0.3);
            border: 2px solid gold;
            cursor: pointer;
            animation: pulse 2s infinite;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
            font-size: 1.5rem;
        }
        
        .examine-point:hover {
            background: rgba(255,215,0,0.7);
            transform: scale(1.1);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 10px gold; }
            50% { box-shadow: 0 0 30px gold; }
            100% { box-shadow: 0 0 10px gold; }
        }
        
        /* МОДАЛЬНОЕ ОКНО ПРИБЛИЖЕНИЯ */
        .zoom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .zoom-modal.active {
            display: flex;
        }
        
        .zoom-content {
            max-width: 800px;
            max-height: 80vh;
            border: 4px solid gold;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        
        .zoom-content img {
            width: 100%;
            height: auto;
        }
        
        .zoom-desc {
            background: rgba(0,0,0,0.8);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 20px;
            color: white;
            max-width: 600px;
            margin-top: 20px;
            text-align: center;
        }
        
        .zoom-btn {
            background: gold;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            margin-top: 15px;
        }
        
        .zoom-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: gold;
            border: 2px solid gold;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1100;
        }
        
        .close-btn:hover {
            background: gold;
            color: black;
        }
        
        /* КНОПКА ЗВУКА */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.8);
            border: 2px solid gold;
            color: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: gold;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid gold;
            padding: 8px 15px;
            border-radius: 30px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>
    
    <div class="game-container">
        <a href="index.html" class="back-link">← Назад</a>
        
        <div class="throne-room">
            <!-- Статы -->
            <div class="stats-panel">
                <div class="stat-item"><span class="economy">💰</span> <span id="statEconomy">50</span></div>
                <div class="stat-item"><span class="science">📚</span> <span id="statScience">50</span></div>
                <div class="stat-item"><span class="army">⚔️</span> <span id="statArmy">50</span></div>
                <div class="stat-item"><span class="authority">👑</span> <span id="statAuthority">50</span></div>
            </div>
            
            <!-- Инвентарь -->
            <div class="inventory">
                <h3>📦 СВИТКИ</h3>
                <div class="inventory-grid" id="inventoryGrid">
                    <div class="inventory-slot" id="slot0" onclick="openQuest(0)">❓</div>
                    <div class="inventory-slot" id="slot1" onclick="openQuest(1)">❓</div>
                    <div class="inventory-slot" id="slot2" onclick="openQuest(2)">❓</div>
                    <div class="inventory-slot" id="slot3" onclick="openQuest(3)">❓</div>
                    <div class="inventory-slot" id="slot4" onclick="openQuest(4)">❓</div>
                    <div class="inventory-slot" id="slot5" onclick="openQuest(5)">❓</div>
                </div>
            </div>
            
            <!-- Персонажи -->
            <div class="characters">
                <!-- Аристарх слева -->
                <div class="character-left">
                    <img src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/npc_elder.png" alt="Аристарх">
                    <div class="character-name">Старейшина Аристарх</div>
                </div>
                
                <!-- Игрок справа (загрузится из выбора) -->
                <div class="character-right" id="playerCharacter">
                    <img id="playerImage" src="" alt="Герой">
                    <div class="character-name" id="playerName">Правитель</div>
                </div>
            </div>
            
            <!-- Точки осмотра (предметы) -->
            <div class="examine-point" style="left: 300px; top: 300px;" onclick="zoomItem('throne')">👑</div>
            <div class="examine-point" style="left: 500px; top: 200px;" onclick="zoomItem('column')">🏛️</div>
            <div class="examine-point" style="left: 700px; top: 350px;" onclick="zoomItem('table')">📜</div>
            <div class="examine-point" style="left: 400px; top: 450px;" onclick="zoomItem('bookshelf')">📚</div>
            <div class="examine-point" style="left: 600px; top: 400px;" onclick="zoomItem('chest')">📦</div>
            <div class="examine-point" style="left: 800px; top: 250px;" onclick="zoomItem('curtain')">🎭</div>
            
            <!-- Диалоговая область -->
            <div class="dialogue-area" id="dialogueArea">
                <div class="dialogue-box" id="dialogueBox">
                    <div class="dialogue-speaker" id="dialogueSpeaker">Аристарх</div>
                    <div class="dialogue-text" id="dialogueText"></div>
                    <div class="dialogue-choices" id="dialogueChoices"></div>
                    <button class="next-btn" id="nextBtn" onclick="nextDialogue()" style="display: none;">Далее →</button>
                </div>
            </div>
            
            <!-- Модальное окно для приближения -->
            <div class="zoom-modal" id="zoomModal">
                <div class="close-btn" onclick="closeZoom()">✖</div>
                <div class="zoom-content" id="zoomContent"></div>
                <div class="zoom-desc" id="zoomDesc"></div>
                <button class="zoom-btn" id="zoomBtn" onclick="takeItem()">📜 Взять свиток</button>
            </div>
        </div>
    </div>

    <!-- АУДИО -->
    <audio id="bgmThrone" loop preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/bgm_throne.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxDialog" preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/sfx_dialog.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========== ЗАГРУЗКА ПЕРСОНАЖА ==========
        const playerData = JSON.parse(localStorage.getItem('player') || '{}');
        
        const playerImage = document.getElementById('playerImage');
        const playerName = document.getElementById('playerName');
        
        // Определяем картинку игрока
        if (playerData.gender === 'male') {
            if (playerData.style === 'royal') playerImage.src = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/мужской король.png';
            else if (playerData.style === 'warrior') playerImage.src = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/male_warrior.png';
            else if (playerData.style === 'mage') playerImage.src = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/мужское изображение.png';
            else playerImage.src = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/охотник на самцов.png';
            
            playerName.textContent = playerData.style === 'royal' ? 'Король Артур' :
                                     playerData.style === 'warrior' ? 'Генерал' :
                                     playerData.style === 'mage' ? 'Архимаг' : 'Лесной страж';
        } else {
            if (playerData.style === 'royal') playerImage.src = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/female_royal.png';
            else if (playerData.style === 'warrior') playerImage.src = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/female_warrior.png';
            else if (playerData.style === 'mage') playerImage.src = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/female_mage.png';
            else playerImage.src = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/female_hunter.png';
            
            playerName.textContent = playerData.style === 'royal' ? 'Королева Элеонора' :
                                     playerData.style === 'warrior' ? 'Амазонка' :
                                     playerData.style === 'mage' ? 'Волшебница' : 'Лучница';
        }
        
        // ========== СОСТОЯНИЕ ==========
        const gameState = {
            economy: 50,
            science: 50,
            army: 50,
            authority: 50,
            foundItems: [false, false, false, false, false, false],
            questCompleted: [false, false, false, false, false, false],
            currentItem: null,
            dialogueStep: 0,
            dialogueActive: true
        };
        
        // ========== ДИАЛОГИ ==========
        const dialogues = [
            { speaker: 'Аристарх', text: 'Десять лет... Я каждый день приходил сюда. Ждал. Молился, чтобы ты был жив.' },
            { speaker: 'Аристарх', text: 'Твои родители... они не просто умерли. Их убили. Это были свои. Те, кому они доверяли.' },
            { speaker: 'Аристарх', text: 'В этом зале спрятаны шесть древних свитков. Найди их — они укажут путь к правде.' },
            { speaker: 'Аристарх', text: 'Осмотри каждую часть зала. Трон, колонны, стол, шкаф, сундук, штору. Там ты найдёшь ответы.' },
            { speaker: 'Игрок', text: 'Я найду их. И узнаю, кто убил мою семью.' },
            { speaker: 'Аристарх', text: 'Да пребудет с тобой мудрость, Правитель.' }
        ];
        
        const dialogueDiv = document.getElementById('dialogueText');
        const speakerDiv = document.getElementById('dialogueSpeaker');
        const choicesDiv = document.getElementById('dialogueChoices');
        const nextBtn = document.getElementById('nextBtn');
        
        function showDialogue() {
            const step = gameState.dialogueStep;
            if (step < dialogues.length) {
                speakerDiv.textContent = dialogues[step].speaker;
                dialogueDiv.textContent = dialogues[step].text;
                choicesDiv.innerHTML = '';
                nextBtn.style.display = 'block';
            } else {
                // Диалог окончен
                dialogueDiv.textContent = 'Ищи свитки по всему залу. Они отмечены золотыми точками.';
                speakerDiv.textContent = 'Аристарх';
                nextBtn.style.display = 'none';
                gameState.dialogueActive = false;
            }
        }
        
        window.nextDialogue = function() {
            gameState.dialogueStep++;
            showDialogue();
            if (soundEnabled) {
                sfxDialog.currentTime = 0;
                sfxDialog.play().catch(e => {});
            }
        };
        
        // ========== ПРЕДМЕТЫ ==========
        const items = {
            throne: {
                name: 'Трон',
                image: 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/item_crown.png',
                desc: 'На троне лежит старинная корона. Под ней что-то блестит...',
                itemIndex: 0
            },
            column: {
                name: 'Колонна',
                image: 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/item_crystal.png',
                desc: 'В трещине колонны зажат магический кристалл. Внутри него виден свиток.',
                itemIndex: 1
            },
            table: {
                name: 'Стол',
                image: 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/item_map.jpg',
                desc: 'На столе разложена старая карта. Под ней лежит свиток.',
                itemIndex: 2
            },
            bookshelf: {
                name: 'Книжный шкаф',
                image: 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/item_scroll.png',
                desc: 'Между книг торчит край древнего свитка.',
                itemIndex: 3
            },
            chest: {
                name: 'Сундук',
                image: 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/item_chest.png',
                desc: 'Сундук приоткрыт. Внутри что-то шевелится... нет, это свиток.',
                itemIndex: 4
            },
            curtain: {
                name: 'Штора',
                image: 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/item_crown.png',
                desc: 'За тяжёлой бархатной шторой кто-то спрятал свёрток.',
                itemIndex: 5
            }
        };
        
        const zoomModal = document.getElementById('zoomModal');
        const zoomContent = document.getElementById('zoomContent');
        const zoomDesc = document.getElementById('zoomDesc');
        const zoomBtn = document.getElementById('zoomBtn');
        
        window.zoomItem = function(itemKey) {
            gameState.currentItem = itemKey;
            const item = items[itemKey];
            
            zoomContent.innerHTML = `<img src="${item.image}" alt="${item.name}" style="width: 100%;">`;
            zoomDesc.innerHTML = `<strong>${item.name}</strong><br>${item.desc}`;
            
            // Если предмет уже найден
            if (gameState.foundItems[item.itemIndex]) {
                zoomBtn.style.display = 'none';
            } else {
                zoomBtn.style.display = 'block';
            }
            
            zoomModal.classList.add('active');
        };
        
        window.closeZoom = function() {
            zoomModal.classList.remove('active');
        };
        
        window.takeItem = function() {
            if (!gameState.currentItem) return;
            
            const item = items[gameState.currentItem];
            const index = item.itemIndex;
            
            if (!gameState.foundItems[index]) {
                gameState.foundItems[index] = true;
                
                // Обновляем инвентарь
                const slot = document.getElementById(`slot${index}`);
                slot.innerHTML = '📜';
                slot.classList.add('found');
                
                // Сообщение
                zoomDesc.innerHTML = `<strong>${item.name}</strong><br>✅ Ты нашёл свиток ${index+1}! Он появился в инвентаре.`;
                zoomBtn.style.display = 'none';
                
                // Проверка, все ли найдены
                if (gameState.foundItems.every(v => v === true)) {
                    setTimeout(() => {
                        alert('Все свитки найдены! Открой их в инвентаре и выполни задания.');
                    }, 500);
                }
            }
        };
        
        // ========== ЗАДАНИЯ ==========
        const quests = [
            {
                text: '«Именно над этим вопросом задумывается Ю. Алешковский... Его позиция такова: различные обстоятельства оказывают сильное влияние на эмоциональное состояние человека.»',
                options: [
                    'Речевая (лексическая несочетаемость)',
                    'Грамматическая (ошибка в причастном обороте)',
                    'Речевая (неудачное употребление местоимений)'
                ],
                correct: 2,
                result: { sci: 10, auth: 5 }
            },
            {
                text: '«В заключение можно сделать вывод, что в детстве чувства ребёнка к отцу нельзя назвать осмысленными.»',
                options: [
                    'Речевая (лексическая несочетаемость)',
                    'Речевая избыточность',
                    'Орфографическая (ошибка в предлоге)'
                ],
                correct: 1,
                result: { sci: 10, auth: 5 }
            },
            {
                text: '«Множество важных вещей могут связывать человека с родиной, таких как семья, друзья и даже обычные рассказы...»',
                options: [
                    'Логическая + орфографическая',
                    'Этическая + логическая',
                    'Грамматическая (ОЧП)'
                ],
                correct: 1,
                result: { sci: 10, auth: 5 }
            },
            {
                text: '«...проявляет заботу к своим ученикам, даже в мелочах: спасает щенков, которых родители наказали утопить...»',
                options: [
                    'Грамматическая + пунктуационная',
                    'Одна грамматическая',
                    'Одна пунктуационная'
                ],
                correct: 0,
                result: { sci: 10, auth: 5 }
            },
            {
                text: '«Чтобы подтвердить эту мысль, приведу в пример историю Антона Макаренко...»',
                options: [
                    'Грамматическая (однородные члены)',
                    'Речевая (приведу в пример)',
                    'Грамматическая (деепричастный оборот)'
                ],
                correct: 1,
                result: { sci: 10, auth: 5 }
            },
            {
                text: '«Герои защищают свою родину и честь, а их поступки достойно уважения и признательности.»',
                options: [
                    'Речевая (паронимы)',
                    'Грамматическая (согласование)',
                    'Логическая + грамматическая'
                ],
                correct: 2,
                result: { sci: 10, auth: 5 }
            }
        ];
        
        let currentQuest = 0;
        
        window.openQuest = function(index) {
            if (!gameState.foundItems[index]) {
                alert('Сначала найди этот свиток в зале!');
                return;
            }
            
            if (gameState.questCompleted[index]) {
                alert('Это задание уже выполнено!');
                return;
            }
            
            currentQuest = index;
            const quest = quests[index];
            
            // Создаём модальное окно задания
            const questModal = document.createElement('div');
            questModal.className = 'zoom-modal active';
            questModal.id = 'questModal';
            
            let optionsHtml = '';
            quest.options.forEach((opt, i) => {
                optionsHtml += `<div class="choice-btn" onclick="answerQuest(${i})">${opt}</div>`;
            });
            
            questModal.innerHTML = `
                <div class="close-btn" onclick="closeQuestModal()">✖</div>
                <div class="zoom-content" style="background: rgba(0,0,0,0.9); padding: 30px; max-width: 600px;">
                    <h2 style="color: gold; margin-bottom: 20px;">Свиток ${index+1}</h2>
                    <p style="color: white; font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px;">${quest.text}</p>
                    <div style="display: flex; flex-direction: column; gap: 10px;">${optionsHtml}</div>
                    <div id="questFeedback" style="color: gold; margin-top: 20px; text-align: center;"></div>
                </div>
            `;
            
            document.body.appendChild(questModal);
        };
        
        window.answerQuest = function(optionIndex) {
            const quest = quests[currentQuest];
            const feedback = document.getElementById('questFeedback');
            
            if (optionIndex === quest.correct) {
                gameState.science += quest.result.sci;
                gameState.authority += quest.result.auth;
                feedback.innerHTML = '✅ Верно! +10 Наука, +5 Авторитет';
            } else {
                gameState.science -= 5;
                gameState.authority -= 2;
                feedback.innerHTML = '❌ Неверно. Наука −5, Авторитет −2';
            }
            
            gameState.questCompleted[currentQuest] = true;
            updateStats();
            
            // Блокируем кнопки
            document.querySelectorAll('#questModal .choice-btn').forEach(btn => {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.5';
            });
            
            // Проверка, все ли задания выполнены
            if (gameState.questCompleted.every(v => v === true)) {
                setTimeout(() => {
                    alert('Все задания выполнены! Теперь ты можешь отправиться в город.');
                }, 1000);
            }
        };
        
        window.closeQuestModal = function() {
            const modal = document.getElementById('questModal');
            if (modal) modal.remove();
        };
        
        // ========== UI ==========
        function updateStats() {
            document.getElementById('statEconomy').textContent = gameState.economy;
            document.getElementById('statScience').textContent = gameState.science;
            document.getElementById('statArmy').textContent = gameState.army;
            document.getElementById('statAuthority').textContent = gameState.authority;
        }
        
        // ========== ЗВУК ==========
        const bgmThrone = document.getElementById('bgmThrone');
        const sfxDialog = document.getElementById('sfxDialog');
        let soundEnabled = true;
        
        window.addEventListener('load', function() {
            bgmThrone.volume = 0.3;
            bgmThrone.play().catch(e => console.log('Автовоспроизведение заблокировано'));
            showDialogue();
        });
        
        window.toggleSound = function() {
            soundEnabled = !soundEnabled;
            const toggle = document.getElementById('soundToggle');
            
            if (soundEnabled) {
                bgmThrone.volume = 0.3;
                toggle.innerHTML = '🔊';
            } else {
                bgmThrone.volume = 0;
                toggle.innerHTML = '🔇';
            }
        };
        
        updateStats();
    </script>
</body>
</html>
