<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - ТРОННЫЙ ЗАЛ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cinzel', serif;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 1400px;
            max-width: 100%;
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 30px;
            padding: 20px;
            border: 3px solid gold;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
            position: relative;
        }
        
        .throne-room {
            background-image: url('https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/bg_throne.jpg');
            background-size: cover;
            background-position: center;
            border: 3px solid gold;
            border-radius: 20px;
            min-height: 800px;
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
        }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.7);
            border-bottom: 2px solid gold;
            border-radius: 20px 20px 0 0;
            backdrop-filter: blur(5px);
            z-index: 50;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            color: white;
            font-size: 1.2rem;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .economy { color: #ffd700; }
        .science { color: #00ffff; }
        .army { color: #ff4444; }
        .authority { color: gold; }
        
        .scrolls-bar {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid gold;
        }
        
        .scroll-icon {
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
            filter: grayscale(1);
        }
        
        .scroll-icon.found {
            opacity: 1;
            filter: none;
            animation: pulse 2s infinite;
        }
        
        .scroll-icon:hover {
            transform: scale(1.2);
        }
        
        /* ОСНОВНАЯ СЦЕНА */
        .scene {
            flex: 1;
            position: relative;
            min-height: 600px;
        }
        
        /* ПЕРСОНАЖИ */
        .character-left {
            position: absolute;
            left: 50px;
            bottom: 0;
            width: 350px;
            text-align: center;
            z-index: 30;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float 3s infinite;
        }
        
        .character-right {
            position: absolute;
            right: 50px;
            bottom: 0;
            width: 350px;
            text-align: center;
            z-index: 30;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float 3s infinite;
        }
        
        .character-left img, .character-right img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .character-name {
            color: gold;
            font-size: 1.3rem;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 40px;
            border: 2px solid gold;
            display: inline-block;
            margin-top: 10px;
            backdrop-filter: blur(5px);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        /* ТОЧКИ ОСМОТРА */
        .examine-point {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,215,0,0.3);
            border: 3px solid gold;
            cursor: pointer;
            animation: pulse 2s infinite;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
            font-size: 2rem;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        .examine-point:hover {
            background: rgba(255,215,0,0.7);
            transform: scale(1.1);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 10px gold; }
            50% { box-shadow: 0 0 30px gold; }
            100% { box-shadow: 0 0 10px gold; }
        }
        
        /* ДИАЛОГОВАЯ ОБЛАСТЬ */
        .dialogue-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            z-index: 100;
        }
        
        .dialogue-box {
            background: rgba(0,0,0,0.85);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 25px;
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .dialogue-speaker {
            color: gold;
            font-size: 1.3rem;
            margin-bottom: 10px;
            border-bottom: 2px solid gold;
            padding-bottom: 8px;
        }
        
        .dialogue-text {
            font-size: 1.2rem;
            line-height: 1.6;
            min-height: 80px;
        }
        
        .next-btn {
            background: gold;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            margin-top: 15px;
        }
        
        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        
        /* МОДАЛЬНОЕ ОКНО */
        .zoom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .zoom-modal.active {
            display: flex;
        }
        
        .zoom-content {
            max-width: 600px;
            background: rgba(0,0,0,0.8);
            border: 4px solid gold;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        
        .zoom-content img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .zoom-desc {
            color: white;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .zoom-btn {
            background: gold;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
        }
        
        .zoom-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        
        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(0,0,0,0.7);
            color: gold;
            border: 2px solid gold;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1100;
        }
        
        .close-btn:hover {
            background: gold;
            color: black;
        }
        
        /* КНОПКА ЗВУКА */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.8);
            border: 2px solid gold;
            color: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2000;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: gold;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid gold;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 2000;
            background: rgba(0,0,0,0.5);
        }
        
        .back-link:hover {
            background: gold;
            color: black;
        }
    </style>
</head>
<body>
    <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>
    
    <div class="game-container">
        <a href="index.html" class="back-link">← Назад</a>
        
        <div class="throne-room">
            <!-- Верхняя панель -->
            <div class="top-bar">
                <div class="stats">
                    <div class="stat-item"><span class="economy">💰</span> <span id="statEconomy">50</span></div>
                    <div class="stat-item"><span class="science">📚</span> <span id="statScience">50</span></div>
                    <div class="stat-item"><span class="army">⚔️</span> <span id="statArmy">50</span></div>
                    <div class="stat-item"><span class="authority">👑</span> <span id="statAuthority">50</span></div>
                </div>
                
                <!-- Свитки наверху -->
                <div class="scrolls-bar" id="scrollsBar">
                    <span class="scroll-icon" id="scroll0" onclick="openQuest(0)">📜❓</span>
                    <span class="scroll-icon" id="scroll1" onclick="openQuest(1)">📜❓</span>
                    <span class="scroll-icon" id="scroll2" onclick="openQuest(2)">📜❓</span>
                    <span class="scroll-icon" id="scroll3" onclick="openQuest(3)">📜❓</span>
                    <span class="scroll-icon" id="scroll4" onclick="openQuest(4)">📜❓</span>
                    <span class="scroll-icon" id="scroll5" onclick="openQuest(5)">📜❓</span>
                </div>
            </div>
            
            <!-- Сцена с персонажами -->
            <div class="scene">
                <!-- Аристарх слева -->
                <div class="character-left">
                    <img src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/npc_elder.png" alt="Аристарх">
                    <div class="character-name">Старейшина Аристарх</div>
                </div>
                
                <!-- Игрок справа -->
                <div class="character-right" id="playerCharacter">
                    <img id="playerImage" src="" alt="Герой">
                    <div class="character-name" id="playerName">Правитель</div>
                </div>
                
                <!-- Точки осмотра -->
                <div class="examine-point" style="left: 250px; top: 200px;" onclick="zoomItem('throne')">👑</div>
                <div class="examine-point" style="left: 500px; top: 150px;" onclick="zoomItem('column')">🏛️</div>
                <div class="examine-point" style="left: 750px; top: 250px;" onclick="zoomItem('table')">📜</div>
                <div class="examine-point" style="left: 350px; top: 350px;" onclick="zoomItem('bookshelf')">📚</div>
                <div class="examine-point" style="left: 600px; top: 300px;" onclick="zoomItem('chest')">📦</div>
                <div class="examine-point" style="left: 850px; top: 180px;" onclick="zoomItem('curtain')">🎭</div>
            </div>
            
            <!-- Диалоговая область -->
            <div class="dialogue-area" id="dialogueArea">
                <div class="dialogue-box">
                    <div class="dialogue-speaker" id="dialogueSpeaker">Аристарх</div>
                    <div class="dialogue-text" id="dialogueText"></div>
                    <button class="next-btn" id="nextBtn" onclick="nextDialogue()">Далее →</button>
                </div>
            </div>
            
            <!-- Модальное окно -->
            <div class="zoom-modal" id="zoomModal">
                <div class="close-btn" onclick="closeZoom()">✖</div>
                <div class="zoom-content" id="zoomContent">
                    <img id="zoomImage" src="" alt="">
                    <div class="zoom-desc" id="zoomDesc"></div>
                    <button class="zoom-btn" id="zoomBtn" onclick="takeItem()">📜 Взять свиток</button>
                </div>
            </div>
        </div>
    </div>

    <!-- АУДИО -->
    <audio id="bgmThrone" loop preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/bgm_throne.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxDialog" preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/sfx_dialog.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========== ЗАГРУЗКА ПЕРСОНАЖА ==========
        const playerData = JSON.parse(localStorage.getItem('player') || '{}');
        
        const playerImage = document.getElementById('playerImage');
        const playerName = document.getElementById('playerName');
        
        // Определяем картинку игрока
        const baseUrl = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/';
        
        if (playerData.gender === 'male') {
            if (playerData.style === 'royal') playerImage.src = baseUrl + 'мужской король.png';
            else if (playerData.style === 'warrior') playerImage.src = baseUrl + 'male_warrior.png';
            else if (playerData.style === 'mage') playerImage.src = baseUrl + 'мужское изображение.png';
            else playerImage.src = baseUrl + 'охотник на самцов.png';
            
            playerName.textContent = playerData.style === 'royal' ? 'Король Артур' :
                                     playerData.style === 'warrior' ? 'Генерал' :
                                     playerData.style === 'mage' ? 'Архимаг' : 'Лесной страж';
        } else {
            if (playerData.style === 'royal') playerImage.src = baseUrl + 'female_royal.png';
            else if (playerData.style === 'warrior') playerImage.src = baseUrl + 'female_warrior.png';
            else if (playerData.style === 'mage') playerImage.src = baseUrl + 'female_mage.png';
            else playerImage.src = baseUrl + 'female_hunter.png';
            
            playerName.textContent = playerData.style === 'royal' ? 'Королева Элеонора' :
                                     playerData.style === 'warrior' ? 'Амазонка' :
                                     playerData.style === 'mage' ? 'Волшебница' : 'Лучница';
        }
        
        // ========== СОСТОЯНИЕ ==========
        const gameState = {
            economy: 50,
            science: 50,
            army: 50,
            authority: 50,
            foundItems: [false, false, false, false, false, false],
            questCompleted: [false, false, false, false, false, false],
            currentItem: null,
            dialogueStep: 0
        };
        
        // ========== ДИАЛОГИ ==========
        const dialogues = [
            { speaker: 'Аристарх', text: 'Десять лет... Я каждый день приходил сюда. Ждал. Молился, чтобы ты был жив. И ты здесь. Стоишь.' },
            { speaker: 'Аристарх', text: 'Твои родители... они не просто умерли. Их убили. Это были свои. Те, кому они доверяли.' },
            { speaker: 'Аристарх', text: 'В этом зале спрятаны шесть древних свитков. Найди их — они укажут путь к правде.' },
            { speaker: 'Аристарх', text: 'Осмотри каждую часть зала. Трон, колонны, стол, шкаф, сундук, штору. Там ты найдёшь ответы.' }
        ];
        
        const dialogueText = document.getElementById('dialogueText');
        const dialogueSpeaker = document.getElementById('dialogueSpeaker');
        const nextBtn = document.getElementById('nextBtn');
        
        function showDialogue() {
            if (gameState.dialogueStep < dialogues.length) {
                dialogueSpeaker.textContent = dialogues[gameState.dialogueStep].speaker;
                dialogueText.textContent = dialogues[gameState.dialogueStep].text;
            } else {
                dialogueSpeaker.textContent = 'Аристарх';
                dialogueText.textContent = 'Ищи свитки по всему залу. Они отмечены золотыми точками.';
                nextBtn.style.display = 'none';
            }
        }
        
        window.nextDialogue = function() {
            gameState.dialogueStep++;
            showDialogue();
            if (soundEnabled) {
                sfxDialog.currentTime = 0;
                sfxDialog.play().catch(e => {});
            }
        };
        
        // ========== ПРЕДМЕТЫ ==========
        const items = {
            throne: {
                name: 'Трон',
                image: baseUrl + 'item_crown.png',
                desc: 'На троне лежит старинная корона. Под ней что-то блестит... Это свиток!',
                itemIndex: 0
            },
            column: {
                name: 'Колонна',
                image: baseUrl + 'предмет_кристалл.png',
                desc: 'В трещине колонны зажат магический кристалл. Внутри него виден свиток.',
                itemIndex: 1
            },
            table: {
                name: 'Стол',
                image: baseUrl + 'item_map.jpg',
                desc: 'На столе разложена старая карта. Под ней лежит свиток.',
                itemIndex: 2
            },
            bookshelf: {
                name: 'Книжный шкаф',
                image: baseUrl + 'item_scroll.png',
                desc: 'Между книг торчит край древнего свитка.',
                itemIndex: 3
            },
            chest: {
                name: 'Сундук',
                image: baseUrl + 'item_chest.png',
                desc: 'Сундук приоткрыт. Внутри что-то блестит... это свиток!',
                itemIndex: 4
            },
            curtain: {
                name: 'Штора',
                image: baseUrl + 'item_crown.png',
                desc: 'За тяжёлой бархатной шторой кто-то спрятал свёрток.',
                itemIndex: 5
            }
        };
        
        const zoomModal = document.getElementById('zoomModal');
        const zoomImage = document.getElementById('zoomImage');
        const zoomDesc = document.getElementById('zoomDesc');
        const zoomBtn = document.getElementById('zoomBtn');
        
        window.zoomItem = function(itemKey) {
            gameState.currentItem = itemKey;
            const item = items[itemKey];
            
            zoomImage.src = item.image;
            zoomDesc.innerHTML = `<strong>${item.name}</strong><br>${item.desc}`;
            
            zoomBtn.style.display = gameState.foundItems[item.itemIndex] ? 'none' : 'block';
            zoomModal.classList.add('active');
        };
        
        window.closeZoom = function() {
            zoomModal.classList.remove('active');
        };
        
        window.takeItem = function() {
            if (!gameState.currentItem) return;
            
            const item = items[gameState.currentItem];
            const index = item.itemIndex;
            
            if (!gameState.foundItems[index]) {
                gameState.foundItems[index] = true;
                
                const scrollIcon = document.getElementById(`scroll${index}`);
                scrollIcon.innerHTML = '📜✅';
                scrollIcon.classList.add('found');
                
                zoomDesc.innerHTML = `<strong>${item.name}</strong><br>✅ Ты нашёл свиток ${index+1}!`;
                zoomBtn.style.display = 'none';
                
                if (gameState.foundItems.every(v => v === true)) {
                    setTimeout(() => {
                        alert('Все свитки найдены! Открой их в верхней панели и выполни задания.');
                    }, 500);
                }
            }
        };
        
        // ========== ЗАДАНИЯ ==========
        const quests = [
            {
                text: '«Именно над этим вопросом задумывается Ю. Алешковский... различные обстоятельства оказывают сильное влияние на эмоциональное состояние человека.»',
                options: [
                    'Речевая (лексическая несочетаемость)',
                    'Грамматическая (ошибка в причастном обороте)',
                    'Речевая (неудачное употребление местоимений)'
                ],
                correct: 2
            },
            {
                text: '«В заключение можно сделать вывод, что в детстве чувства ребёнка к отцу нельзя назвать осмысленными.»',
                options: [
                    'Речевая (лексическая несочетаемость)',
                    'Речевая избыточность',
                    'Орфографическая (ошибка в предлоге)'
                ],
                correct: 1
            },
            {
                text: '«Множество важных вещей могут связывать человека с родиной, таких как семья, друзья и даже обычные рассказы...»',
                options: [
                    'Логическая + орфографическая',
                    'Этическая + логическая',
                    'Грамматическая (ОЧП)'
                ],
                correct: 1
            },
            {
                text: '«...проявляет заботу к своим ученикам, даже в мелочах: спасает щенков, которых родители наказали утопить...»',
                options: [
                    'Грамматическая + пунктуационная',
                    'Одна грамматическая',
                    'Одна пунктуационная'
                ],
                correct: 0
            },
            {
                text: '«Чтобы подтвердить эту мысль, приведу в пример историю Антона Макаренко...»',
                options: [
                    'Грамматическая (однородные члены)',
                    'Речевая (приведу в пример)',
                    'Грамматическая (деепричастный оборот)'
                ],
                correct: 1
            },
            {
                text: '«Герои защищают свою родину и честь, а их поступки достойно уважения и признательности.»',
                options: [
                    'Речевая (паронимы)',
                    'Грамматическая (согласование)',
                    'Логическая + грамматическая'
                ],
                correct: 2
            }
        ];
        
        let currentQuest = 0;
        
        window.openQuest = function(index) {
            if (!gameState.foundItems[index]) {
                alert('Сначала найди этот свиток в зале!');
                return;
            }
            
            if (gameState.questCompleted[index]) {
                alert('Это задание уже выполнено!');
                return;
            }
            
            currentQuest = index;
            const quest = quests[index];
            
            const questModal = document.createElement('div');
            questModal.className = 'zoom-modal active';
            questModal.id = 'questModal';
            
            let optionsHtml = '';
            quest.options.forEach((opt, i) => {
                optionsHtml += `<div class="zoom-btn" style="margin:5px; width:100%;" onclick="answerQuest(${i})">${opt}</div>`;
            });
            
            questModal.innerHTML = `
                <div class="close-btn" onclick="closeQuestModal()">✖</div>
                <div class="zoom-content">
                    <h2 style="color: gold; margin-bottom: 20px;">Свиток ${index+1}</h2>
                    <p style="color: white; font-size: 1.1rem; margin-bottom: 20px;">${quest.text}</p>
                    ${optionsHtml}
                    <div id="questFeedback" style="color: gold; margin-top: 20px;"></div>
                </div>
            `;
            
            document.body.appendChild(questModal);
        };
        
        window.answerQuest = function(optionIndex) {
            const quest = quests[currentQuest];
            const feedback = document.getElementById('questFeedback');
            
            if (optionIndex === quest.correct) {
                gameState.science += 10;
                gameState.authority += 5;
                feedback.innerHTML = '✅ Верно! +10 Наука, +5 Авторитет';
            } else {
                gameState.science -= 5;
                gameState.authority -= 2;
                feedback.innerHTML = '❌ Неверно. Наука −5, Авторитет −2';
            }
            
            gameState.questCompleted[currentQuest] = true;
            updateStats();
            
            document.querySelectorAll('#questModal .zoom-btn').forEach(btn => {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.5';
            });
        };
        
        window.closeQuestModal = function() {
            const modal = document.getElementById('questModal');
            if (modal) modal.remove();
        };
        
        // ========== UI ==========
        function updateStats() {
            document.getElementById('statEconomy').textContent = gameState.economy;
            document.getElementById('statScience').textContent = gameState.science;
            document.getElementById('statArmy').textContent = gameState.army;
            document.getElementById('statAuthority').textContent = gameState.authority;
        }
        
        // ========== ЗВУК ==========
        const bgmThrone = document.getElementById('bgmThrone');
        const sfxDialog = document.getElementById('sfxDialog');
        let soundEnabled = true;
        
        window.addEventListener('load', function() {
            bgmThrone.volume = 0.3;
            bgmThrone.play().catch(e => console.log('Автовоспроизведение заблокировано'));
            showDialogue();
        });
        
        window.toggleSound = function() {
            soundEnabled = !soundEnabled;
            const toggle = document.getElementById('soundToggle');
            
            if (soundEnabled) {
                bgmThrone.volume = 0.3;
                toggle.innerHTML = '🔊';
            } else {
                bgmThrone.volume = 0;
                toggle.innerHTML = '🔇';
            }
        };
        
        updateStats();
    </script>
</body>
</html>
