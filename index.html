<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'MedievalSharp', cursive; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid gold;
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        #resources {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid gold;
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(5px);
            display: flex;
            gap: 30px;
        }
        #dialog {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            background: rgba(0,0,0,0.8);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 20px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(5px);
            display: none;
        }
        #dialog-npc {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid gold;
            padding-bottom: 10px;
        }
        #dialog-choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .choice-btn {
            background: #2a3a4a;
            border: 2px solid gold;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }
        .choice-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.05);
        }
        #quest-progress {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 10px 20px;
            color: white;
            z-index: 100;
        }
        .control-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid gold;
            border-radius: 10px;
            padding: 5px 10px;
            color: #aaa;
            font-size: 0.8rem;
            z-index: 100;
        }
        .resource {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .gold { color: #ffd700; }
        .blue { color: #00ffff; }
        .red { color: #ff4444; }
    </style>
</head>
<body>
    <div id="info">
        <h2 style="color: gold; margin: 0;">🏰 ЦИТАДЕЛЬ РЕШЕНИЙ</h2>
    </div>
    
    <div id="resources">
        <div class="resource"><span class="gold">💰</span> <span id="ecoVal">50</span></div>
        <div class="resource"><span class="blue">📚</span> <span id="sciVal">50</span></div>
        <div class="resource"><span class="red">⚔️</span> <span id="armVal">50</span></div>
    </div>
    
    <div id="quest-progress">
        <span>📜 Заданий: <span id="completedCount">0/6</span></span>
    </div>
    
    <div id="dialog">
        <div id="dialog-npc">
            <div id="npc-avatar" style="font-size: 3rem;">🧙</div>
            <div>
                <div id="npc-name" style="color: gold; font-size: 1.3rem;">Старейшина</div>
                <div id="npc-title" style="color: #b8a07c;">Хранитель знаний</div>
            </div>
        </div>
        <div id="dialog-text"></div>
        <div id="dialog-choices"></div>
    </div>
    
    <div class="control-hint">WASD - движение | Подойди к NPC чтобы поговорить</div>

    <!-- Подключение Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.126.0/examples/jsm/controls/OrbitControls.js';
        
        // ============ СОСТОЯНИЕ ИГРЫ ============
        const gameState = {
            economy: 50,
            science: 50,
            army: 50,
            completedQuests: [],
            currentLocation: 0,
            inDialog: false,
            currentNPC: null,
            
            locations: [
                { name: 'Тронный зал', color: 0xaa8c5e, pos: new THREE.Vector3(0, 0, 0), npc: '🧙', npcName: 'Старейшина', quest: 0 },
                { name: 'Городские ворота', color: 0x8b7355, pos: new THREE.Vector3(15, 0, 15), npc: '🛡️', npcName: 'Капитан', quest: 1 },
                { name: 'Порт', color: 0x4a6c8f, pos: new THREE.Vector3(-15, 0, 15), npc: '🧳', npcName: 'Купец', quest: 2 },
                { name: 'Библиотека', color: 0x5d6d7e, pos: new THREE.Vector3(15, 0, -15), npc: '📖', npcName: 'Библиотекарь', quest: 3 },
                { name: 'Казармы', color: 0x8b4c39, pos: new THREE.Vector3(-15, 0, -15), npc: '🪖', npcName: 'Командир', quest: 4 },
                { name: 'Храм', color: 0x6a5d7a, pos: new THREE.Vector3(0, 0, 20), npc: '🙏', npcName: 'Жрец', quest: 5 }
            ],
            
            quests: [
                {
                    text: 'Писарь написал указ: "Жители города! Завтра собрание на центральнай площади."',
                    choices: [
                        { text: 'Исправить ошибку', eco: 5, sci: 10, army: -5 },
                        { text: 'Оставить как есть', eco: -5, sci: -5, army: 10 },
                        { text: 'Казнить писаря', eco: -10, sci: 5, army: 15 }
                    ]
                },
                {
                    text: 'Письмо королю: "Уважаемый король! Предлогаем мир. Наши армии могуг стать союзниками."',
                    choices: [
                        { text: 'Исправить "предлогаем"', eco: -10, sci: 20, army: 0 },
                        { text: 'Исправить "могуг"', eco: -5, sci: 15, army: -5 },
                        { text: 'Отправить как есть', eco: 10, sci: -15, army: -5 }
                    ]
                },
                {
                    text: 'Договор: "Оплата в течении трех дней."',
                    choices: [
                        { text: 'Исправить предлог', eco: -5, sci: 15, army: 0 },
                        { text: 'Подписать', eco: 20, sci: -15, army: -5 },
                        { text: 'Проверить всё', eco: -15, sci: 20, army: 5 }
                    ]
                },
                {
                    text: 'Рукопись: "Князь Олег основал город в 1800 году."',
                    choices: [
                        { text: 'Исправить дату', eco: -5, sci: 15, army: -5 },
                        { text: 'Оставить', eco: 5, sci: -20, army: 5 },
                        { text: 'Исследовать', eco: -10, sci: 25, army: -10 }
                    ]
                },
                {
                    text: 'Донесение: "Враг собираеться напасть. Тысяча салдат."',
                    choices: [
                        { text: 'Исправить "собираеться"', eco: -5, sci: 10, army: 5 },
                        { text: 'Исправить "салдат"', eco: -10, sci: 5, army: 15 },
                        { text: 'Исправить оба', eco: -20, sci: 20, army: 10 }
                    ]
                },
                {
                    text: 'Пророчество: "Кто с мечем придет, тот от меча погибнет."',
                    choices: [
                        { text: 'Исправить "мечем"', eco: -5, sci: 15, army: 10 },
                        { text: 'Оставить', eco: 10, sci: -10, army: 15 },
                        { text: 'Своё пророчество', eco: 10, sci: 20, army: -5 }
                    ]
                }
            ]
        };
        
        // ============ ТРЕХМЕРНАЯ СЦЕНА ============
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Голубое небо
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        // Земля
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3d5a3d });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Дорожки между локациями
        const gridHelper = new THREE.GridHelper(50, 20, 0xffaa00, 0xaa8c5e);
        scene.add(gridHelper);
        
        // ============ ПЕРСОНАЖ ИГРОКА ============
        const playerGeometry = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 8);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.castShadow = true;
        player.receiveShadow = true;
        player.position.y = 0.75;
        scene.add(player);
        
        // Корона для игрока
        const crownGeometry = new THREE.ConeGeometry(0.4, 0.3, 8);
        const crownMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700 });
        const crown = new THREE.Mesh(crownGeometry, crownMaterial);
        crown.position.y = 1.0;
        player.add(crown);
        
        // ============ ЛОКАЦИИ И NPC ============
        const locations = [];
        const npcs = [];
        
        gameState.locations.forEach((loc, index) => {
            // Платформа локации
            const platformGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.3, 16);
            const platformMat = new THREE.MeshStandardMaterial({ color: loc.color });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.set(loc.pos.x, 0.15, loc.pos.z);
            platform.receiveShadow = true;
            platform.castShadow = true;
            scene.add(platform);
            locations.push(platform);
            
            // Столб с огоньком (маяк локации)
            const pillarGeo = new THREE.CylinderGeometry(0.2, 0.2, 2, 8);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0xaa8c5e });
            const pillar = new THREE.Mesh(pillarGeo, pillarMat);
            pillar.position.set(loc.pos.x, 1, loc.pos.z);
            pillar.castShadow = true;
            scene.add(pillar);
            
            // Огонек на столбе
            const lightGeo = new THREE.SphereGeometry(0.3);
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 });
            const light = new THREE.Mesh(lightGeo, lightMat);
            light.position.set(loc.pos.x, 2.2, loc.pos.z);
            scene.add(light);
            
            // NPC (простой кубик с эмодзи в текстуре - упрощенно)
            const npcGeo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
            const npcMat = new THREE.MeshStandardMaterial({ color: 0xaa8c5e });
            const npc = new THREE.Mesh(npcGeo, npcMat);
            npc.position.set(loc.pos.x + 0.5, 0.6, loc.pos.z);
            npc.castShadow = true;
            npc.userData = { type: 'npc', locIndex: index };
            scene.add(npc);
            npcs.push(npc);
            
            // Сфера над NPC (индикатор)
            const npcLightGeo = new THREE.SphereGeometry(0.2);
            const npcLightMat = new THREE.MeshStandardMaterial({ color: gameState.completedQuests.includes(index) ? 0x00ff00 : 0xffaa00 });
            const npcLight = new THREE.Mesh(npcLightGeo, npcLightMat);
            npcLight.position.set(loc.pos.x + 0.5, 1.5, loc.pos.z);
            npc.add(npcLight);
        });
        
        // Деревья для красоты
        for (let i = 0; i < 20; i++) {
            const treePos = new THREE.Vector3(
                (Math.random() - 0.5) * 40,
                0,
                (Math.random() - 0.5) * 40
            );
            // Проверяем, не близко ли к локациям
            let tooClose = false;
            gameState.locations.forEach(loc => {
                if (treePos.distanceTo(loc.pos) < 3) tooClose = true;
            });
            if (!tooClose) {
                const treeGeo = new THREE.ConeGeometry(0.5, 2, 6);
                const treeMat = new THREE.MeshStandardMaterial({ color: 0x2d5a2d });
                const tree = new THREE.Mesh(treeGeo, treeMat);
                tree.position.set(treePos.x, 1, treePos.z);
                tree.castShadow = true;
                tree.receiveShadow = true;
                scene.add(tree);
                
                const trunkGeo = new THREE.CylinderGeometry(0.2, 0.2, 1, 6);
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.set(treePos.x, 0.5, treePos.z);
                trunk.castShadow = true;
                scene.add(trunk);
            }
        }
        
        // ============ УПРАВЛЕНИЕ ============
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        
        function updatePlayer() {
            if (gameState.inDialog) return;
            
            const speed = 0.1;
            const oldPos = player.position.clone();
            
            if (keys['KeyW']) player.position.z -= speed;
            if (keys['KeyS']) player.position.z += speed;
            if (keys['KeyA']) player.position.x -= speed;
            if (keys['KeyD']) player.position.x += speed;
            
            // Ограничение движения (не выходим за карту)
            player.position.x = Math.max(-20, Math.min(20, player.position.x));
            player.position.z = Math.max(-20, Math.min(20, player.position.z));
            
            // Камера следует за игроком
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 8;
            camera.position.y = 5;
            camera.lookAt(player.position);
            
            // Проверка столкновения с NPC
            npcs.forEach(npc => {
                const dist = player.position.distanceTo(npc.position);
                if (dist < 1.5 && !gameState.inDialog) {
                    const locIndex = npc.userData.locIndex;
                    if (!gameState.completedQuests.includes(locIndex)) {
                        showDialog(locIndex);
                    }
                }
            });
        }
        
        // ============ ДИАЛОГИ ============
        function showDialog(locIndex) {
            const loc = gameState.locations[locIndex];
            const quest = gameState.quests[loc.quest];
            
            gameState.inDialog = true;
            gameState.currentNPC = locIndex;
            
            document.getElementById('npc-avatar').innerHTML = loc.npc;
            document.getElementById('npc-name').innerHTML = loc.npcName;
            document.getElementById('dialog-text').innerHTML = quest.text;
            
            let choicesHtml = '';
            quest.choices.forEach((choice, index) => {
                choicesHtml += `
                    <div class="choice-btn" onclick="makeChoice(${locIndex}, ${index})">
                        ${choice.text}
                    </div>
                `;
            });
            
            document.getElementById('dialog-choices').innerHTML = choicesHtml;
            document.getElementById('dialog').style.display = 'block';
        }
        
        window.makeChoice = function(locIndex, choiceIndex) {
            const quest = gameState.quests[gameState.locations[locIndex].quest];
            const choice = quest.choices[choiceIndex];
            
            // Изменяем ресурсы
            gameState.economy = Math.min(100, Math.max(0, gameState.economy + choice.eco));
            gameState.science = Math.min(100, Math.max(0, gameState.science + choice.sci));
            gameState.army = Math.min(100, Math.max(0, gameState.army + choice.army));
            
            // Отмечаем задание выполненным
            if (!gameState.completedQuests.includes(locIndex)) {
                gameState.completedQuests.push(locIndex);
            }
            
            // Обновляем интерфейс
            updateUI();
            
            // Закрываем диалог
            gameState.inDialog = false;
            document.getElementById('dialog').style.display = 'none';
            
            // Проверяем финал
            if (gameState.completedQuests.length >= 6) {
                showEnding();
            }
        };
        
        function updateUI() {
            document.getElementById('ecoVal').innerHTML = gameState.economy;
            document.getElementById('sciVal').innerHTML = gameState.science;
            document.getElementById('armVal').innerHTML = gameState.army;
            document.getElementById('completedCount').innerHTML = `${gameState.completedQuests.length}/6`;
        }
        
        function showEnding() {
            let title, text;
            
            if (gameState.economy >= gameState.science && gameState.economy >= gameState.army) {
                title = '💰 ЭКОНОМИСТ';
                text = 'Ты построил великую торговую империю! Город процветает.';
            } else if (gameState.science > gameState.economy && gameState.science >= gameState.army) {
                title = '📚 УЧЕНЫЙ';
                text = 'Академия магии открыта! Знания правят миром.';
            } else {
                title = '⚔️ ВОИН';
                text = 'Враг разбит! Твоя армия непобедима.';
            }
            
            alert(`ИГРА ЗАВЕРШЕНА!\n${title}\n💰 ${gameState.economy} | 📚 ${gameState.science} | ⚔️ ${gameState.army}`);
            
            // Перезапуск
            if (confirm('Сыграть заново?')) {
                gameState.economy = 50;
                gameState.science = 50;
                gameState.army = 50;
                gameState.completedQuests = [];
                updateUI();
            }
        }
        
        // ============ АНИМАЦИЯ ============
        function animate() {
            requestAnimationFrame(animate);
            
            updatePlayer();
            
            // Вращаем огоньки над NPC
            npcs.forEach((npc, index) => {
                const light = npc.children[0];
                light.rotation.y += 0.02;
                
                // Меняем цвет в зависимости от выполнения
                light.material.color.setHex(gameState.completedQuests.includes(index) ? 0x00ff00 : 0xffaa00);
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // ============ ОБРАБОТКА РАЗМЕРА ОКНА ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Стартовый диалог
        setTimeout(() => {
            showDialog(0);
        }, 1000);
    </script>
</body>
</html>
