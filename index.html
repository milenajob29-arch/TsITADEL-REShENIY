<!DOCTYPE html>
<html>
<head>
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: #1a2a3a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .game { width: 1000px; background: #2a3a4a; padding: 20px; border-radius: 30px; border: 5px solid gold; }
        
        .panel {
            display: flex;
            justify-content: space-between;
            background: #1a2a3a;
            padding: 15px;
            border-radius: 50px;
            border: 2px solid gold;
            margin-bottom: 20px;
            color: white;
        }
        
        .resources { display: flex; gap: 20px; }
        .resource { display: flex; align-items: center; gap: 5px; }
        .gold { color: gold; }
        .blue { color: cyan; }
        .red { color: #ff6b6b; }
        
        .map {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .location {
            background: #1a2a3a;
            border: 2px solid #b8860b;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }
        
        .location:hover { border-color: gold; transform: scale(1.02); }
        .location.active { border-color: gold; background: #2a3a4a; }
        .location.completed { border-color: #00ff00; }
        
        .location-icon { font-size: 3rem; margin-bottom: 10px; }
        
        .scene {
            background: #1a2a3a;
            border: 3px solid gold;
            border-radius: 20px;
            padding: 30px;
            min-height: 300px;
            margin-bottom: 20px;
            color: white;
        }
        
        .npc { font-size: 4rem; text-align: center; margin-bottom: 20px; }
        
        .dialog {
            background: #0a1a2a;
            border-left: 5px solid gold;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2rem;
            line-height: 1.6;
        }
        
        .choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .choice-btn {
            background: #2a3a4a;
            border: 2px solid gold;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .choice-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.05);
        }
        
        .start-screen {
            text-align: center;
            padding: 50px;
        }
        
        .start-screen h1 {
            color: gold;
            font-size: 4rem;
            margin-bottom: 30px;
        }
        
        .btn {
            background: gold;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            margin: 10px;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="game" id="game"></div>

    <script>
        const gameState = {
            stage: 'start',
            economy: 50,
            science: 50,
            army: 50,
            currentLocation: 0,
            completedQuests: [],
            inQuest: false,
            
            locations: [
                { id: 0, name: 'Тронный зал', icon: '👑', npc: '🧙', npcName: 'Старейшина' },
                { id: 1, name: 'Ворота', icon: '🏰', npc: '🛡️', npcName: 'Капитан' },
                { id: 2, name: 'Порт', icon: '⚓', npc: '🧳', npcName: 'Купец' },
                { id: 3, name: 'Библиотека', icon: '📚', npc: '📖', npcName: 'Библиотекарь' },
                { id: 4, name: 'Казармы', icon: '⚔️', npc: '🪖', npcName: 'Командир' },
                { id: 5, name: 'Храм', icon: '⛪', npc: '🙏', npcName: 'Жрец' }
            ],
            
            quests: [
                {
                    text: 'Писарь написал указ: "Жители города! Завтра собрание на центральнай площади."',
                    choices: [
                        { text: 'Исправить ошибку', eco: 5, sci: 10, army: -5 },
                        { text: 'Оставить', eco: -5, sci: -5, army: 10 },
                        { text: 'Казнить', eco: -10, sci: 5, army: 15 }
                    ]
                },
                {
                    text: 'Письмо: "Уважаемый король! Предлогаем мир. Наши армии могуг стать союзниками."',
                    choices: [
                        { text: 'Исправить "предлогаем"', eco: -10, sci: 20, army: 0 },
                        { text: 'Исправить "могуг"', eco: -5, sci: 15, army: -5 },
                        { text: 'Отправить', eco: 10, sci: -15, army: -5 }
                    ]
                },
                {
                    text: 'Договор: "Оплата в течении трех дней."',
                    choices: [
                        { text: 'Исправить', eco: -5, sci: 15, army: 0 },
                        { text: 'Подписать', eco: 20, sci: -15, army: -5 },
                        { text: 'Проверить', eco: -15, sci: 20, army: 5 }
                    ]
                },
                {
                    text: 'Рукопись: "Князь Олег основал город в 1800 году."',
                    choices: [
                        { text: 'Исправить дату', eco: -5, sci: 15, army: -5 },
                        { text: 'Оставить', eco: 5, sci: -20, army: 5 },
                        { text: 'Исследовать', eco: -10, sci: 25, army: -10 }
                    ]
                },
                {
                    text: 'Донесение: "Враг собираеться напасть. Тысяча салдат."',
                    choices: [
                        { text: 'Собирается', eco: -5, sci: 10, army: 5 },
                        { text: 'Солдат', eco: -10, sci: 5, army: 15 },
                        { text: 'Оба', eco: -20, sci: 20, army: 10 }
                    ]
                },
                {
                    text: 'Пророчество: "Кто с мечем придет..."',
                    choices: [
                        { text: 'Исправить', eco: -5, sci: 15, army: 10 },
                        { text: 'Оставить', eco: 10, sci: -10, army: 15 },
                        { text: 'Своё', eco: 10, sci: 20, army: -5 }
                    ]
                }
            ]
        };
        
        function render() {
            const game = document.getElementById('game');
            
            if (gameState.stage === 'start') {
                game.innerHTML = `
                    <div class="start-screen">
                        <h1>🏰 ЦИТАДЕЛЬ РЕШЕНИЙ</h1>
                        <p style="color: white; font-size: 1.2rem; margin-bottom: 40px;">
                            Ты - последний наследник. Город в руинах.<br>
                            Посети 6 мест и помоги жителям.<br>
                            Каждый выбор влияет на ресурсы.
                        </p>
                        <button class="btn" onclick="startGame()">СТАТЬ ПРАВИТЕЛЕМ</button>
                    </div>
                `;
            } 
            else if (gameState.stage === 'playing') {
                let mapHtml = '';
                for (let i = 0; i < gameState.locations.length; i++) {
                    const loc = gameState.locations[i];
                    const completed = gameState.completedQuests.includes(i);
                    mapHtml += `
                        <div class="location ${gameState.currentLocation === i ? 'active' : ''} ${completed ? 'completed' : ''}"
                             onclick="selectLocation(${i})">
                            <div class="location-icon">${loc.icon}</div>
                            <div>${loc.name}</div>
                            ${completed ? '<div style="color: #00ff00;">✓</div>' : ''}
                        </div>
                    `;
                }
                
                let sceneHtml = '';
                const currentLoc = gameState.locations[gameState.currentLocation];
                const isCompleted = gameState.completedQuests.includes(gameState.currentLocation);
                
                if (gameState.inQuest) {
                    const quest = gameState.quests[gameState.currentLocation];
                    let choicesHtml = '';
                    quest.choices.forEach((c, i) => {
                        choicesHtml += `<div class="choice-btn" onclick="makeChoice(${i})">${c.text}</div>`;
                    });
                    
                    sceneHtml = `
                        <div class="npc">${currentLoc.npc}</div>
                        <div class="dialog">${quest.text}</div>
                        <div class="choices">${choicesHtml}</div>
                    `;
                } else {
                    sceneHtml = `
                        <div class="npc">${currentLoc.npc}</div>
                        <div style="text-align: center; font-size: 1.3rem; margin: 30px;">${currentLoc.npcName}</div>
                        ${!isCompleted ? 
                            '<button class="btn" style="display: block; margin: 0 auto;" onclick="startQuest()">НАЧАТЬ ЗАДАНИЕ</button>' : 
                            '<div style="text-align: center; color: #00ff00;">✓ Задание выполнено</div>'}
                    `;
                }
                
                game.innerHTML = `
                    <div class="panel">
                        <div style="color: gold; font-size: 1.5rem;">🏰 ЦИТАДЕЛЬ</div>
                        <div class="resources">
                            <div class="resource"><span class="gold">💰</span> ${gameState.economy}</div>
                            <div class="resource"><span class="blue">📚</span> ${gameState.science}</div>
                            <div class="resource"><span class="red">⚔️</span> ${gameState.army}</div>
                        </div>
                    </div>
                    
                    <div class="map">${mapHtml}</div>
                    
                    <div class="scene">${sceneHtml}</div>
                    
                    <div style="display: flex; justify-content: space-between; color: white;">
                        <span>📜 Заданий: ${gameState.completedQuests.length}/6</span>
                        <span style="color: #b8a07c;">Кликни на карту чтобы переместиться</span>
                    </div>
                `;
            }
            else if (gameState.stage === 'ending') {
                let title, text;
                if (gameState.economy >= gameState.science && gameState.economy >= gameState.army) {
                    title = '💰 ЭКОНОМИСТ';
                    text = 'Ты построил торговую империю! Город процветает.';
                } else if (gameState.science > gameState.economy && gameState.science >= gameState.army) {
                    title = '📚 УЧЕНЫЙ';
                    text = 'Академия магии открыта! Знания правят миром.';
                } else {
                    title = '⚔️ ВОИН';
                    text = 'Враг разбит! Твоя армия непобедима.';
                }
                
                game.innerHTML = `
                    <div class="start-screen">
                        <h1>${title}</h1>
                        <p style="color: white; font-size: 1.3rem; margin: 30px;">${text}</p>
                        <div style="display: flex; gap: 40px; justify-content: center; margin: 30px;">
                            <span class="gold">💰 ${gameState.economy}</span>
                            <span class="blue">📚 ${gameState.science}</span>
                            <span class="red">⚔️ ${gameState.army}</span>
                        </div>
                        <button class="btn" onclick="restartGame()">СЫГРАТЬ ЗАНОВО</button>
                    </div>
                `;
            }
        }
        
        window.startGame = function() {
            gameState.stage = 'playing';
            render();
        };
        
        window.selectLocation = function(id) {
            gameState.currentLocation = id;
            gameState.inQuest = false;
            render();
        };
        
        window.startQuest = function() {
            if (!gameState.completedQuests.includes(gameState.currentLocation)) {
                gameState.inQuest = true;
                render();
            }
        };
        
        window.makeChoice = function(choiceIndex) {
            const quest = gameState.quests[gameState.currentLocation];
            const choice = quest.choices[choiceIndex];
            
            gameState.economy = Math.min(100, Math.max(0, gameState.economy + choice.eco));
            gameState.science = Math.min(100, Math.max(0, gameState.science + choice.sci));
            gameState.army = Math.min(100, Math.max(0, gameState.army + choice.army));
            
            if (!gameState.completedQuests.includes(gameState.currentLocation)) {
                gameState.completedQuests.push(gameState.currentLocation);
            }
            
            gameState.inQuest = false;
            
            if (gameState.completedQuests.length >= 6) {
                gameState.stage = 'ending';
            }
            
            render();
        };
        
        window.restartGame = function() {
            gameState.stage = 'start';
            gameState.economy = 50;
            gameState.science = 50;
            gameState.army = 50;
            gameState.completedQuests = [];
            gameState.currentLocation = 0;
            gameState.inQuest = false;
            render();
        };
        
        render();
    </script>
</body>
</html>
