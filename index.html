<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - СОЗДАНИЕ ПЕРСОНАЖА</title>
    <style>
        /* Стили остаются без изменений — они у тебя уже есть */
        /* Я не буду их дублировать, чтобы не загромождать ответ */
        /* Оставь свои стили как есть */
    </style>
</head>
<body>
    <!-- Весь HTML остается без изменений -->
    
    <script>
        // СОСТОЯНИЕ ИГРОКА
        const player = {
            gender: null,
            style: 'royal',
            imageUrl: null
        };
        
        // БАЗОВАЯ ССЫЛКА
        const baseUrl = 'https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/';
        
        // ⚠️ ВАЖНО: проверь, что имена файлов совпадают с теми, что в папке images
        const imageUrls = {
            male: {
                royal: baseUrl + 'мужской король.png',
                warrior: baseUrl + 'male_warrior.png',
                mage: baseUrl + 'мужское изображение.png',
                hunter: baseUrl + 'охотник на самцов.png'
            },
            female: {
                royal: baseUrl + 'female_royal.png',
                warrior: baseUrl + 'female_warrior.png',
                mage: baseUrl + 'female_mage.png',
                hunter: baseUrl + 'female_hunter.png'
            }
        };
        
        // Запасные эмодзи
        const emojiMap = {
            male: {
                royal: '⚔️👑',
                warrior: '🛡️⚔️',
                mage: '🔮⚔️',
                hunter: '🏹⚔️'
            },
            female: {
                royal: '👸👑',
                warrior: '🛡️👸',
                mage: '🔮👸',
                hunter: '🏹👸'
            }
        };
        
        // ОПИСАНИЯ ПЕРСОНАЖЕЙ
        const descriptions = {
            male: {
                royal: { name: 'Король Артур', desc: 'Величественный правитель в золотых доспехах' },
                warrior: { name: 'Генерал', desc: 'Закаленный в боях воин' },
                mage: { name: 'Архимаг', desc: 'Повелитель магии и стали' },
                hunter: { name: 'Лесной страж', desc: 'Защитник диких земель' }
            },
            female: {
                royal: { name: 'Королева Элеонора', desc: 'Мудрая правительница' },
                warrior: { name: 'Амазонка', desc: 'Непобедимая воительница' },
                mage: { name: 'Волшебница', desc: 'Хранительница древних знаний' },
                hunter: { name: 'Лучница', desc: 'Меткая и бесстрашная' }
            }
        };
        
        // АУДИО
        const bgmMenu = document.getElementById('bgmMenu');
        const bgmCreation = document.getElementById('bgmCreation');
        let soundEnabled = true;
        
        window.addEventListener('load', function() {
            bgmMenu.volume = 0.3;
            bgmMenu.play().catch(e => console.log('Автовоспроизведение заблокировано'));
        });
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const toggle = document.getElementById('soundToggle');
            
            if (soundEnabled) {
                bgmMenu.volume = 0.3;
                bgmCreation.volume = 0.3;
                toggle.innerHTML = '🔊';
                toggle.style.background = 'rgba(0,0,0,0.7)';
            } else {
                bgmMenu.volume = 0;
                bgmCreation.volume = 0;
                toggle.innerHTML = '🔇';
                toggle.style.background = 'rgba(255,0,0,0.3)';
            }
        }
        
        function showCreation() {
            document.getElementById('splashScreen').style.opacity = '0';
            
            bgmMenu.pause();
            bgmCreation.volume = 0.3;
            bgmCreation.play().catch(e => console.log('Не удалось воспроизвести'));
            
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
                document.getElementById('gameContainer').style.display = 'block';
            }, 1000);
        }
        
        function selectGender(gender) {
            player.gender = gender;
            
            document.getElementById('genderMale').classList.remove('selected');
            document.getElementById('genderFemale').classList.remove('selected');
            document.getElementById('gender' + gender.charAt(0).toUpperCase() + gender.slice(1)).classList.add('selected');
            
            updatePreview();
            checkSelection();
        }
        
        function selectStyle(style) {
            player.style = style;
            
            document.querySelectorAll('.style-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            updatePreview();
        }
        
        function updatePreview() {
            if (!player.gender) return;
            
            const imageUrl = imageUrls[player.gender][player.style];
            const desc = descriptions[player.gender][player.style];
            
            const imgElement = document.getElementById('characterImage');
            const loadingText = document.getElementById('loadingText');
            
            imgElement.style.display = 'none';
            loadingText.style.display = 'block';
            loadingText.innerHTML = '✨ Загрузка...';
            
            imgElement.src = imageUrl;
            
            imgElement.onload = function() {
                imgElement.style.display = 'block';
                loadingText.style.display = 'none';
                player.imageUrl = imageUrl;
            };
            
            imgElement.onerror = function() {
                console.log('Ошибка загрузки:', imageUrl);
                loadingText.innerHTML = '🖼️ ' + emojiMap[player.gender][player.style];
                player.imageUrl = null;
            };
            
            document.getElementById('previewName').innerHTML = desc.name;
            document.getElementById('previewDesc').innerHTML = desc.desc;
        }
        
        function checkSelection() {
            if (player.gender) {
                document.getElementById('continueBtn').disabled = false;
            }
        }
        
        function continueToThroneRoom() {
            const playerData = {
                gender: player.gender,
                style: player.style,
                imageUrl: player.imageUrl,
                emoji: player.imageUrl ? null : emojiMap[player.gender][player.style]
            };
            localStorage.setItem('player', JSON.stringify(playerData));
            
            window.location.href = 'throne-room.html';
        }
    </script>
</body>
</html>
