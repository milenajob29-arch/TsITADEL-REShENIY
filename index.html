<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #16213e;
            border-radius: 20px;
            padding: 25px;
            border: 2px solid gold;
        }
        
        h1 {
            text-align: center;
            color: gold;
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px gold;
        }
        
        /* СТАРТОВЫЙ ЭКРАН */
        .start-screen {
            text-align: center;
            padding: 50px 20px;
            background: #0f3460;
            border-radius: 15px;
            border: 2px solid gold;
        }
        
        .start-screen h2 {
            color: gold;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .start-screen p {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        
        .start-btn {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 20px 50px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid white;
        }
        
        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px gold;
        }
        
        /* ДАШБОРД */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            background: #0f3460;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid gold;
        }
        
        .resource {
            text-align: center;
        }
        
        .resource h3 {
            color: gold;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            width: 100%;
            height: 25px;
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 1px solid gold;
        }
        
        .progress-fill {
            height: 100%;
            width: 50%;
            transition: width 0.5s;
        }
        
        .eco-fill { background: linear-gradient(90deg, gold, orange); }
        .sci-fill { background: linear-gradient(90deg, cyan, blue); }
        .army-fill { background: linear-gradient(90deg, red, darkred); }
        
        .resource-value {
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        
        /* ПЕРСОНАЖ */
        .character-box {
            display: flex;
            gap: 20px;
            background: #0f3460;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid gold;
            margin-bottom: 20px;
        }
        
        .character-avatar {
            width: 100px;
            height: 100px;
            background: #1a1a2e;
            border-radius: 50%;
            border: 3px solid gold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
        }
        
        .character-text {
            flex: 1;
            color: white;
        }
        
        .character-name {
            color: gold;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .character-speech {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid gold;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        
        /* ИНФО */
        .info-bar {
            display: flex;
            justify-content: space-between;
            background: #0f3460;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid gold;
            margin-bottom: 20px;
        }
        
        .location {
            color: gold;
            font-size: 1.2rem;
        }
        
        .step {
            background: gold;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        /* ЗАДАНИЕ */
        .quest-box {
            background: #0f3460;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid gold;
            margin-bottom: 20px;
        }
        
        .quest-title {
            color: gold;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        
        .quest-text {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .error-text {
            background: #1a1a2e;
            color: #ffaa00;
            font-family: monospace;
            font-size: 1.3rem;
            padding: 20px;
            border-radius: 10px;
            border: 2px dashed gold;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* КНОПКИ */
        .choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .choice-btn {
            background: #1a1a2e;
            border: 2px solid gold;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        
        .choice-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }
        
        .choice-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .choice-title {
            color: gold;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .modifiers {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .mod {
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        .mod.plus { background: rgba(0, 255, 0, 0.2); color: lightgreen; border: 1px solid green; }
        .mod.minus { background: rgba(255, 0, 0, 0.2); color: pink; border: 1px solid red; }
        
        /* ОБРАТНАЯ СВЯЗЬ */
        .feedback {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid gold;
            color: white;
            font-size: 1.1rem;
        }
        
        /* КНОПКА ДАЛЕЕ */
        .next-btn {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            display: block;
            margin: 20px auto 0;
            border: 2px solid white;
        }
        
        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px gold;
        }
        
        .next-btn.hidden {
            display: none;
        }
        
        /* ФИНАЛ */
        .ending-screen {
            text-align: center;
            background: #0f3460;
            padding: 40px;
            border-radius: 15px;
            border: 3px solid gold;
        }
        
        .ending-screen h2 {
            color: gold;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .ending-screen p {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>⚔️ ЦИТАДЕЛЬ РЕШЕНИЙ ⚔️</h1>
        <div id="gameArea"></div>
    </div>

    <script>
        // ДАННЫЕ ИГРЫ
        const gameData = {
            economy: 50,
            science: 50,
            army: 50,
            currentQuest: 0,
            elderStep: 0,
            
            // Речи старейшины
            elderSpeeches: [
                "Приветствую тебя, молодой правитель! Я - старейшина Аристарх, хранитель знаний этого города.",
                "Наш великий город на грани гибели. Казна пуста, армия деморализована, библиотеки сожжены.",
                "У нас осталось 10 испытаний. Каждый твой выбор будет влиять на три ресурса: Экономику, Науку и Армию.",
                "Смотри внимательно на модификаторы под кнопками. Например: Экономика +5, Наука -10.",
                "Если ресурс упадет до 0 - город погибнет. Если поднимешь до 100 - получишь силу.",
                "А теперь... Город ждет своего Правителя! Да пребудет с тобой мудрость!"
            ],
            
            // Задания
            quests: [
                {
                    location: "Тронный зал",
                    title: "Указ правителя",
                    text: "Писарь принес указ для городской площади. Но допустил ошибки. Как поступишь?",
                    error: "«Жители города! Завтра состоится собрание на центральнай площади.»",
                    choices: [
                        { 
                            icon: "📝", 
                            title: "Исправить", 
                            eco: 5, sci: 10, army: -5,
                            feedback: "Правильно: центральнай → центральной"
                        },
                        { 
                            icon: "🤷", 
                            title: "Оставить", 
                            eco: -5, sci: -5, army: 10,
                            feedback: "Народ посмеялся над ошибкой"
                        },
                        { 
                            icon: "⚔️", 
                            title: "Казнить", 
                            eco: -10, sci: 5, army: 15,
                            feedback: "Все боятся ошибаться"
                        }
                    ]
                },
                {
                    location: "Городские ворота",
                    title: "Послание королю",
                    text: "Нужно отправить письмо соседнему королю. Как поступишь?",
                    error: "«Уважаемый король! Предлогаем мир. Наши армии могуг стать союзниками.»",
                    choices: [
                        { 
                            icon: "✏️", 
                            title: "Предлогаем", 
                            eco: -10, sci: 20, army: 0,
                            feedback: "Правильно: предлагаем (лаг/лож)"
                        },
                        { 
                            icon: "🔤", 
                            title: "Могуг", 
                            eco: -5, sci: 15, army: -5,
                            feedback: "Правильно: могут (спряжение)"
                        },
                        { 
                            icon: "📨", 
                            title: "Отправить", 
                            eco: 10, sci: -15, army: -5,
                            feedback: "Король обиделся на ошибки"
                        }
                    ]
                },
                {
                    location: "Лагерь разведчиков",
                    title: "Донесение",
                    text: "Разведчики принесли шифровку. В ней ошибки.",
                    error: "«Враг собираеться напасть. У них тысяча салдат.»",
                    choices: [
                        { 
                            icon: "🔍", 
                            title: "Собирается", 
                            eco: -5, sci: 10, army: 5,
                            feedback: "Правильно: собирается (без Ь)"
                        },
                        { 
                            icon: "🛡️", 
                            title: "Солдат", 
                            eco: -10, sci: 5, army: 15,
                            feedback: "Правильно: солдат"
                        },
                        { 
                            icon: "🔮", 
                            title: "Оба", 
                            eco: -20, sci: 20, army: 10,
                            feedback: "Все ошибки исправлены!"
                        }
                    ]
                }
            ]
        };
        
        // ОТОБРАЖЕНИЕ СТАРТА
        function showStart() {
            document.getElementById('gameArea').innerHTML = `
                <div class="start-screen">
                    <h2>👑 Добро пожаловать, Правитель!</h2>
                    <p>Старый князь мертв. Город в руинах.<br>
                    Ты - последний наследник.<br>
                    10 испытаний ждут тебя.</p>
                    <button class="start-btn" onclick="startGame()">СТАТЬ ПРАВИТЕЛЕМ</button>
                </div>
            `;
        }
        
        // СТАРТ ИГРЫ
        function startGame() {
            gameData.elderStep = 0;
            showElder();
        }
        
        // ПОКАЗ СТАРЕЙШИНЫ
        function showElder() {
            const area = document.getElementById('gameArea');
            
            if (gameData.elderStep < gameData.elderSpeeches.length) {
                area.innerHTML = `
                    <div class="character-box">
                        <div class="character-avatar">🧙</div>
                        <div class="character-text">
                            <div class="character-name">Старейшина Аристарх</div>
                            <div class="character-speech">${gameData.elderSpeeches[gameData.elderStep]}</div>
                            <button class="next-btn" onclick="nextElder()" style="margin-top: 20px;">
                                ${gameData.elderStep === gameData.elderSpeeches.length - 1 ? 'Начать правление →' : 'Далее →'}
                            </button>
                        </div>
                    </div>
                `;
            }
        }
        
        // СЛЕДУЮЩАЯ РЕЧЬ СТАРЕЙШИНЫ
        function nextElder() {
            gameData.elderStep++;
            
            if (gameData.elderStep < gameData.elderSpeeches.length) {
                showElder();
            } else {
                gameData.currentQuest = 0;
                showQuest();
            }
        }
        
        // ПОКАЗ ЗАДАНИЯ
        function showQuest() {
            const quest = gameData.quests[gameData.currentQuest];
            
            if (!quest) {
                showEnding();
                return;
            }
            
            // Создаем кнопки выбора
            let choicesHtml = '';
            for (let i = 0; i < quest.choices.length; i++) {
                const c = quest.choices[i];
                choicesHtml += `
                    <div class="choice-btn" onclick="makeChoice(${i})">
                        <div class="choice-icon">${c.icon}</div>
                        <div class="choice-title">${c.title}</div>
                        <div class="modifiers">
                            ${c.eco !== 0 ? `<span class="mod ${c.eco > 0 ? 'plus' : 'minus'}">💰${c.eco > 0 ? '+' : ''}${c.eco}</span>` : ''}
                            ${c.sci !== 0 ? `<span class="mod ${c.sci > 0 ? 'plus' : 'minus'}">📚${c.sci > 0 ? '+' : ''}${c.sci}</span>` : ''}
                            ${c.army !== 0 ? `<span class="mod ${c.army > 0 ? 'plus' : 'minus'}">⚔️${c.army > 0 ? '+' : ''}${c.army}</span>` : ''}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('gameArea').innerHTML = `
                <!-- ДАШБОРД -->
                <div class="dashboard">
                    <div class="resource">
                        <h3>💰 ЭКОНОМИКА</h3>
                        <div class="progress-bar"><div class="progress-fill eco-fill" id="ecoFill" style="width: ${gameData.economy}%"></div></div>
                        <div class="resource-value" id="ecoValue">${gameData.economy}</div>
                    </div>
                    <div class="resource">
                        <h3>📚 НАУКА</h3>
                        <div class="progress-bar"><div class="progress-fill sci-fill" id="sciFill" style="width: ${gameData.science}%"></div></div>
                        <div class="resource-value" id="sciValue">${gameData.science}</div>
                    </div>
                    <div class="resource">
                        <h3>⚔️ АРМИЯ</h3>
                        <div class="progress-bar"><div class="progress-fill army-fill" id="armFill" style="width: ${gameData.army}%"></div></div>
                        <div class="resource-value" id="armValue">${gameData.army}</div>
                    </div>
                </div>
                
                <!-- ПЕРСОНАЖ -->
                <div class="character-box">
                    <div class="character-avatar">👑</div>
                    <div class="character-text">
                        <div class="character-name">Правитель Артур</div>
                        <div class="character-speech" id="charSpeech">Что будем делать?</div>
                    </div>
                </div>
                
                <!-- ИНФО -->
                <div class="info-bar">
                    <span class="location">📍 ${quest.location}</span>
                    <span class="step">${gameData.currentQuest + 1} / ${gameData.quests.length}</span>
                </div>
                
                <!-- ЗАДАНИЕ -->
                <div class="quest-box">
                    <div class="quest-title">${quest.title}</div>
                    <div class="quest-text">${quest.text}</div>
                    <div class="error-text">${quest.error}</div>
                    
                    <div class="choices" id="choicesArea">
                        ${choicesHtml}
                    </div>
                    
                    <div class="feedback" id="feedback">Выбери вариант...</div>
                    
                    <button class="next-btn hidden" id="nextBtn" onclick="nextQuest()">ПРОДОЛЖИТЬ →</button>
                </div>
            `;
        }
        
        // СДЕЛАТЬ ВЫБОР
        function makeChoice(index) {
            const quest = gameData.quests[gameData.currentQuest];
            const choice = quest.choices[index];
            
            // Меняем ресурсы
            gameData.economy = Math.min(100, Math.max(0, gameData.economy + choice.eco));
            gameData.science = Math.min(100, Math.max(0, gameData.science + choice.sci));
            gameData.army = Math.min(100, Math.max(0, gameData.army + choice.army));
            
            // Обновляем дашборд
            document.getElementById('ecoFill').style.width = gameData.economy + '%';
            document.getElementById('sciFill').style.width = gameData.science + '%';
            document.getElementById('armFill').style.width = gameData.army + '%';
            document.getElementById('ecoValue').innerText = gameData.economy;
            document.getElementById('sciValue').innerText = gameData.science;
            document.getElementById('armValue').innerText = gameData.army;
            
            // Показываем обратную связь
            document.getElementById('feedback').innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="font-size: 2rem;">${choice.icon}</span>
                    <span>${choice.feedback}</span>
                </div>
            `;
            
            // Меняем речь персонажа
            document.getElementById('charSpeech').innerText = `Я выбрал: ${choice.title}`;
            
            // Показываем кнопку "ПРОДОЛЖИТЬ"
            document.getElementById('nextBtn').classList.remove('hidden');
            
            // Блокируем кнопки выбора
            const buttons = document.querySelectorAll('.choice-btn');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].style.pointerEvents = 'none';
                buttons[i].style.opacity = '0.5';
            }
        }
        
        // СЛЕДУЮЩЕЕ ЗАДАНИЕ
        function nextQuest() {
            gameData.currentQuest++;
            
            if (gameData.currentQuest < gameData.quests.length) {
                showQuest();
            } else {
                showEnding();
            }
        }
        
        // ПОКАЗ ФИНАЛА
        function showEnding() {
            let title = '', text = '';
            
            if (gameData.economy >= gameData.science && gameData.economy >= gameData.army) {
                title = '💰 ЭКОНОМИСТ';
                text = 'Ты построил торговую империю! Город утопает в золоте.';
            } else if (gameData.science > gameData.economy && gameData.science >= gameData.army) {
                title = '📚 УЧЕНЫЙ';
                text = 'Великая академия открыта! Знания правят миром.';
            } else {
                title = '⚔️ ВОИН';
                text = 'Враг разбит! Твоя армия непобедима.';
            }
            
            document.getElementById('gameArea').innerHTML = `
                <div class="ending-screen">
                    <h2>${title}</h2>
                    <p>${text}</p>
                    <p>💰 Экономика: ${gameData.economy} | 📚 Наука: ${gameData.science} | ⚔️ Армия: ${gameData.army}</p>
                    <button class="restart-btn" onclick="restartGame()">СЫГРАТЬ ЗАНОВО</button>
                </div>
            `;
        }
        
        // РЕСТАРТ
        function restartGame() {
            gameData.economy = 50;
            gameData.science = 50;
            gameData.army = 50;
            gameData.currentQuest = 0;
            gameData.elderStep = 0;
            showStart();
        }
        
        // ЗАПУСК
        showStart();
    </script>
</body>
</html>
