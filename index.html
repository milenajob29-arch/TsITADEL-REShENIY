<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - ТРОННЫЙ ЗАЛ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Cinzel', serif;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 1400px;
            max-width: 100%;
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 30px;
            padding: 30px;
            border: 3px solid gold;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
        }
        
        .throne-room {
            background-image: url('https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/bg_throne.jpg');
            background-size: cover;
            background-position: center;
            border: 3px solid gold;
            border-radius: 20px;
            padding: 30px;
            min-height: 600px;
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }
        
        .throne-room::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            pointer-events: none;
        }
        
        .character-show {
            display: flex;
            align-items: center;
            gap: 40px;
            margin: 50px 0;
            position: relative;
            z-index: 2;
        }
        
        .hero-preview {
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            border: 4px solid gold;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 50px gold;
        }
        
        .hero-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .dialog-box {
            flex: 1;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 25px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .npc-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid gold;
            padding-bottom: 15px;
        }
        
        .npc-avatar {
            width: 70px;
            height: 70px;
            background: #2a3a4a;
            border-radius: 50%;
            border: 3px solid gold;
            overflow: hidden;
        }
        
        .npc-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .npc-name {
            color: gold;
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        .npc-title {
            color: #b8a07c;
            font-size: 1rem;
        }
        
        .dialog-text {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
            min-height: 150px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid gold;
        }
        
        .message {
            opacity: 0;
            animation: fadeInMessage 0.5s forwards;
            margin: 10px 0;
        }
        
        @keyframes fadeInMessage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn {
            background: gold;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            transition: 0.3s;
            display: inline-block;
        }
        
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px gold;
        }
        
        .btn.hidden {
            display: none;
        }
        
        .text-center {
            text-align: center;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: gold;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid gold;
            padding: 8px 15px;
            border-radius: 30px;
            transition: 0.3s;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        
        .back-link:hover {
            background: gold;
            color: black;
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid gold;
            color: gold;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2000;
            transition: 0.3s;
        }
        
        .sound-toggle:hover {
            background: gold;
            color: black;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>
    
    <div class="game-container">
        <a href="index.html" class="back-link">← Назад</a>
        
        <div class="throne-room">
            <div class="character-show">
                <!-- Твой персонаж -->
                <div class="hero-preview" id="heroPreview">
                    <img src="" alt="Герой" id="heroImage" style="display: none;">
                    <div id="heroEmoji" style="font-size: 5rem;">⚔️👑</div>
                </div>
                
                <!-- Диалог с Аристархом -->
                <div class="dialog-box">
                    <div class="npc-info">
                        <div class="npc-avatar">
                            <img src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/images/npc_elder.png" alt="Аристарх">
                        </div>
                        <div>
                            <div class="npc-name">Старейшина Аристарх</div>
                            <div class="npc-title">Хранитель знаний</div>
                        </div>
                    </div>
                    
                    <div class="dialog-text" id="dialogText">
                        <!-- Сюда будут подставляться сообщения -->
                    </div>
                    
                    <div class="button-container">
                        <button class="btn" id="nextBtn" onclick="nextMessage()">ДАЛЕЕ →</button>
                        <button class="btn hidden" id="startBtn" onclick="goToMap()">НАЧАТЬ ПУТЬ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- АУДИО -->
    <audio id="bgmThrone" loop preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/bgm_throne.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxDialog" preload="auto">
        <source src="https://milenajob29-arch.github.io/TsITADEL-REShENIY/sounds/sfx_dialog.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Получаем данные персонажа из localStorage
        const playerData = JSON.parse(localStorage.getItem('player') || '{}');
        
        // Загружаем картинку персонажа
        const heroImage = document.getElementById('heroImage');
        const heroEmoji = document.getElementById('heroEmoji');
        
        if (playerData.imageUrl) {
            heroImage.src = playerData.imageUrl;
            heroImage.style.display = 'block';
            heroEmoji.style.display = 'none';
        } else {
            heroEmoji.innerHTML = playerData.emoji || '⚔️👑';
        }
        
        // Массив сообщений советника
        const messages = [
            "Приветствую тебя, Правитель! Наконец-то ты вернулся...",
            "Я ждал этого дня 10 лет. Твои родители были убиты не случайно.",
            "В этом зале спрятаны 6 древних артефактов. Они укажут путь к правде.",
            "Найди их все — и ты узнаешь имена заговорщиков.",
            "Но будь осторожен: в городе есть те, кто хочет помешать тебе.",
            "Готов ли ты принять вызов и спасти Цитадель?"
        ];
        
        let currentIndex = 0;
        const dialogText = document.getElementById('dialogText');
        const nextBtn = document.getElementById('nextBtn');
        const startBtn = document.getElementById('startBtn');
        
        // Показываем первое сообщение
        showMessage(messages[0]);
        
        function showMessage(text) {
            dialogText.innerHTML = `<div class="message">${text}</div>`;
        }
        
        function nextMessage() {
            // Звук появления диалога
            if (soundEnabled) {
                sfxDialog.currentTime = 0;
                sfxDialog.play().catch(e => console.log('Не удалось воспроизвести звук'));
            }
            
            currentIndex++;
            
            if (currentIndex < messages.length) {
                showMessage(messages[currentIndex]);
            } else {
                // Все сообщения показаны
                nextBtn.classList.add('hidden');
                startBtn.classList.remove('hidden');
                showMessage("Твой путь начинается, Правитель! Да пребудет с тобой мудрость!");
            }
        }
        
        function goToMap() {
            window.location.href = 'city-map.html';
        }
        
        // АУДИО
        const bgmThrone = document.getElementById('bgmThrone');
        const sfxDialog = document.getElementById('sfxDialog');
        let soundEnabled = true;
        
        window.addEventListener('load', function() {
            bgmThrone.volume = 0.3;
            bgmThrone.play().catch(e => console.log('Автовоспроизведение заблокировано'));
        });
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const toggle = document.getElementById('soundToggle');
            
            if (soundEnabled) {
                bgmThrone.volume = 0.3;
                toggle.innerHTML = '🔊';
                toggle.style.background = 'rgba(0,0,0,0.7)';
            } else {
                bgmThrone.volume = 0;
                toggle.innerHTML = '🔇';
                toggle.style.background = 'rgba(255,0,0,0.3)';
            }
        }
    </script>
</body>
</html>
