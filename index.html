<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .game {
            width: 1200px;
            max-width: 100%;
            background: #1e2a3a;
            border-radius: 30px;
            padding: 20px;
            border: 5px solid #b8860b;
        }
        
        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a3a4a;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid gold;
            margin-bottom: 20px;
        }
        
        .title {
            color: gold;
            font-size: 2rem;
            font-weight: bold;
        }
        
        .resources {
            display: flex;
            gap: 20px;
        }
        
        .resource {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a2a3a;
            padding: 5px 15px;
            border-radius: 30px;
            border: 2px solid gold;
            color: white;
        }
        
        /* Карта */
        .map {
            background: #2a3a4a;
            border-radius: 20px;
            padding: 20px;
            border: 3px solid gold;
            margin-bottom: 20px;
        }
        
        .map h2 {
            color: gold;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .map-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .map-cell {
            background: #1a2a3a;
            border: 2px solid #b8860b;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        
        .map-cell:hover {
            border-color: gold;
            transform: scale(1.02);
        }
        
        .map-cell.active {
            border-color: gold;
            background: #2a3a4a;
        }
        
        .map-cell.completed {
            border-color: #00ff00;
        }
        
        /* Игровая область */
        .scene {
            background: #1a2a3a;
            border: 3px solid gold;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 400px;
        }
        
        /* Кнопки */
        .btn {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            transition: 0.3s;
            display: inline-block;
            margin: 10px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px gold;
        }
        
        .btn.hidden {
            display: none;
        }
        
        /* Диалоги */
        .dialog {
            background: rgba(0,0,0,0.7);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin: 20px 0;
        }
        
        .character {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .avatar {
            width: 60px;
            height: 60px;
            background: #2a3a4a;
            border-radius: 50%;
            border: 3px solid gold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .name {
            color: gold;
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        /* Фоны локаций */
        .bg-throne { background: linear-gradient(145deg, #5a4a3a, #2a1a0a); }
        .bg-gates { background: linear-gradient(145deg, #6a5a4a, #3a2a1a); }
        .bg-port { background: linear-gradient(145deg, #2a5a7a, #1a3a5a); }
        .bg-library { background: linear-gradient(145deg, #3a4a5a, #1a2a3a); }
        .bg-barracks { background: linear-gradient(145deg, #5a3a2a, #3a1a0a); }
        .bg-temple { background: linear-gradient(145deg, #5a5a7a, #2a2a4a); }
        
        /* Прогресс */
        .progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a3a4a;
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid gold;
            color: white;
        }
        
        .bar {
            width: 300px;
            height: 10px;
            background: #1a2a3a;
            border-radius: 10px;
            border: 1px solid gold;
            overflow: hidden;
        }
        
        .fill {
            height: 100%;
            width: 0%;
            background: gold;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="game" id="game"></div>

    <script>
        // СОСТОЯНИЕ ИГРЫ
        const gameState = {
            stage: 'start', // start, intro, playing, ending
            economy: 50,
            science: 50,
            army: 50,
            currentLocation: 0,
            completedQuests: [],
            locations: [
                { id: 0, name: 'Тронный зал', icon: '👑', bg: 'bg-throne', npc: '🧙', npcName: 'Старейшина', quest: 0 },
                { id: 1, name: 'Городские ворота', icon: '🏰', bg: 'bg-gates', npc: '🛡️', npcName: 'Капитан', quest: 1 },
                { id: 2, name: 'Порт', icon: '⚓', bg: 'bg-port', npc: '🧳', npcName: 'Купец', quest: 2 },
                { id: 3, name: 'Библиотека', icon: '📚', bg: 'bg-library', npc: '📖', npcName: 'Библиотекарь', quest: 3 },
                { id: 4, name: 'Казармы', icon: '⚔️', bg: 'bg-barracks', npc: '🪖', npcName: 'Командир', quest: 4 },
                { id: 5, name: 'Храм', icon: '⛪', bg: 'bg-temple', npc: '🙏', npcName: 'Жрец', quest: 5 }
            ],
            quests: [
                {
                    id: 0,
                    text: 'Писарь написал указ: "Жители города! Завтра собрание на центральнай площади."',
                    choices: [
                        { text: 'Исправить ошибку', eco: 5, sci: 10, army: -5 },
                        { text: 'Оставить как есть', eco: -5, sci: -5, army: 10 },
                        { text: 'Казнить писаря', eco: -10, sci: 5, army: 15 }
                    ]
                },
                {
                    id: 1,
                    text: 'Письмо королю: "Уважаемый король! Предлогаем мир. Наши армии могуг стать союзниками."',
                    choices: [
                        { text: 'Исправить "предлогаем"', eco: -10, sci: 20, army: 0 },
                        { text: 'Исправить "могуг"', eco: -5, sci: 15, army: -5 },
                        { text: 'Отправить как есть', eco: 10, sci: -15, army: -5 }
                    ]
                },
                {
                    id: 2,
                    text: 'Договор: "Оплата в течении трех дней."',
                    choices: [
                        { text: 'Исправить предлог', eco: -5, sci: 15, army: 0 },
                        { text: 'Подписать', eco: 20, sci: -15, army: -5 },
                        { text: 'Проверить всё', eco: -15, sci: 20, army: 5 }
                    ]
                },
                {
                    id: 3,
                    text: 'Рукопись: "Князь Олег основал город в 1800 году."',
                    choices: [
                        { text: 'Исправить дату', eco: -5, sci: 15, army: -5 },
                        { text: 'Оставить', eco: 5, sci: -20, army: 5 },
                        { text: 'Исследовать', eco: -10, sci: 25, army: -10 }
                    ]
                },
                {
                    id: 4,
                    text: 'Донесение: "Враг собираеться напасть. Тысяча салдат."',
                    choices: [
                        { text: 'Исправить "собираеться"', eco: -5, sci: 10, army: 5 },
                        { text: 'Исправить "салдат"', eco: -10, sci: 5, army: 15 },
                        { text: 'Исправить оба', eco: -20, sci: 20, army: 10 }
                    ]
                },
                {
                    id: 5,
                    text: 'Пророчество: "Кто с мечем придет, тот от меча погибнет."',
                    choices: [
                        { text: 'Исправить "мечем"', eco: -5, sci: 15, army: 10 },
                        { text: 'Оставить', eco: 10, sci: -10, army: 15 },
                        { text: 'Своё пророчество', eco: 10, sci: 20, army: -5 }
                    ]
                }
            ]
        };
        
        // ОСНОВНАЯ ФУНКЦИЯ ОТРИСОВКИ
        function render() {
            const game = document.getElementById('game');
            
            if (gameState.stage === 'start') {
                // НАЧАЛЬНЫЙ ЭКРАН
                game.innerHTML = `
                    <div style="text-align: center; padding: 100px 20px;">
                        <h1 style="color: gold; font-size: 4rem; margin-bottom: 30px;">🏰 ЦИТАДЕЛЬ РЕШЕНИЙ</h1>
                        <p style="color: white; font-size: 1.3rem; margin-bottom: 50px;">Ты - последний наследник древнего рода. Город в руинах. Сможешь ли ты спасти Цитадель?</p>
                        <button class="btn" onclick="startGame()">СТАТЬ ПРАВИТЕЛЕМ</button>
                    </div>
                `;
            } else if (gameState.stage === 'intro') {
                // ВСТРЕЧА СО СТАРЕЙШИНОЙ
                game.innerHTML = `
                    <div class="top-bar">
                        <div class="title">🏰 ЦИТАДЕЛЬ РЕШЕНИЙ</div>
                        <div class="resources">
                            <div class="resource"><span>💰</span> <span id="eco">${gameState.economy}</span></div>
                            <div class="resource"><span>📚</span> <span id="sci">${gameState.science}</span></div>
                            <div class="resource"><span>⚔️</span> <span id="arm">${gameState.army}</span></div>
                        </div>
                    </div>
                    
                    <div class="scene bg-throne" style="display: flex; align-items: center; justify-content: center; min-height: 500px;">
                        <div style="text-align: center;">
                            <div style="font-size: 5rem; margin-bottom: 20px;">🧙</div>
                            <div class="dialog" style="max-width: 600px; margin: 0 auto;">
                                <p style="font-size: 1.2rem; line-height: 1.8; margin-bottom: 30px;">
                                    Приветствую, молодой правитель! Я - старейшина Аристарх.<br><br>
                                    Наш город на грани гибели. Три ресурса решают всё: Экономика, Наука и Армия.<br><br>
                                    Тебе предстоит посетить 6 мест в городе и выполнить задания. Каждый выбор влияет на ресурсы.<br><br>
                                    В правом верхнем углу карта - нажимай на локации и перемещайся.<br><br>
                                    Готов начать свой путь?
                                </p>
                                <button class="btn" onclick="startPlaying()">НАЧАТЬ ПУТЬ</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (gameState.stage === 'playing') {
                // ИГРОВОЙ ЭКРАН
                renderGameScreen();
            } else if (gameState.stage === 'ending') {
                // ФИНАЛЬНЫЙ ЭКРАН
                let title, emoji, text;
                
                if (gameState.economy >= gameState.science && gameState.economy >= gameState.army) {
                    title = '💰 ЭКОНОМИСТ';
                    emoji = '🏭💰🏦';
                    text = 'Ты построил великую торговую империю! Город утопает в золоте. Купцы со всего мира прибывают в твой порт.';
                } else if (gameState.science > gameState.economy && gameState.science >= gameState.army) {
                    title = '📚 УЧЕНЫЙ';
                    emoji = '🔮📚🔬';
                    text = 'Великая академия магии открыта! Ученые со всего света едут к тебе. Знания правят миром.';
                } else {
                    title = '⚔️ ВОИН';
                    emoji = '⚔️🏰🛡️';
                    text = 'Враг разбит! Твоя армия непобедима. Ты создал самую мощную империю!';
                }
                
                game.innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h1 style="color: gold; font-size: 3rem; margin-bottom: 30px;">${title}</h1>
                        <div style="font-size: 6rem; margin-bottom: 30px;">${emoji}</div>
                        <p style="color: white; font-size: 1.3rem; margin-bottom: 30px;">${text}</p>
                        <div style="display: flex; gap: 40px; justify-content: center; margin-bottom: 40px;">
                            <span style="color: gold; font-size: 2rem;">💰 ${gameState.economy}</span>
                            <span style="color: cyan; font-size: 2rem;">📚 ${gameState.science}</span>
                            <span style="color: red; font-size: 2rem;">⚔️ ${gameState.army}</span>
                        </div>
                        <button class="btn" onclick="restartGame()">СЫГРАТЬ ЗАНОВО</button>
                    </div>
                `;
            }
        }
        
        // ОТРИСОВКА ИГРОВОГО ЭКРАНА
        function renderGameScreen() {
            const loc = gameState.locations[gameState.currentLocation];
            const isCompleted = gameState.completedQuests.includes(gameState.currentLocation);
            const quest = gameState.quests[loc.quest];
            
            // Карта
            let mapHtml = '';
            for (let i = 0; i < gameState.locations.length; i++) {
                const l = gameState.locations[i];
                const completed = gameState.completedQuests.includes(i);
                mapHtml += `
                    <div class="map-cell ${gameState.currentLocation === i ? 'active' : ''} ${completed ? 'completed' : ''}" 
                         onclick="selectLocation(${i})">
                        <div style="font-size: 2rem;">${l.icon}</div>
                        <div>${l.name}</div>
                        ${completed ? '<div style="color: #00ff00;">✓</div>' : ''}
                    </div>
                `;
            }
            
            let content = '';
            
            if (gameState.currentQuest) {
                // ПОКАЗ ЗАДАНИЯ
                content = `
                    <div class="scene ${loc.bg}">
                        <div class="dialog">
                            <div class="character">
                                <div class="avatar">${loc.npc}</div>
                                <div>
                                    <div class="name">${loc.npcName}</div>
                                    <div style="color: #b8a07c;">${loc.name}</div>
                                </div>
                            </div>
                            <p style="font-size: 1.2rem; margin: 20px 0;">${quest.text}</p>
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px;">
                                ${quest.choices.map((c, index) => `
                                    <div class="btn" onclick="makeChoice(${index})" style="margin: 0;">${c.text}</div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (isCompleted) {
                // ЛОКАЦИЯ УЖЕ ВЫПОЛНЕНА
                content = `
                    <div class="scene ${loc.bg}">
                        <div class="dialog" style="text-align: center;">
                            <div style="font-size: 4rem; margin-bottom: 20px;">${loc.npc}</div>
                            <p style="font-size: 1.2rem;">Спасибо за помощь, Правитель! Благодаря тебе здесь стало лучше.</p>
                        </div>
                    </div>
                `;
            } else {
                // ЛОКАЦИЯ С ЗАДАНИЕМ
                content = `
                    <div class="scene ${loc.bg}">
                        <div class="dialog" style="text-align: center;">
                            <div style="font-size: 4rem; margin-bottom: 20px;">${loc.npc}</div>
                            <p style="font-size: 1.2rem; margin-bottom: 30px;">${loc.npcName} ждёт твоего решения...</p>
                            <button class="btn" onclick="startQuest()">НАЧАТЬ ЗАДАНИЕ</button>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('game').innerHTML = `
                <div class="top-bar">
                    <div class="title">🏰 ЦИТАДЕЛЬ РЕШЕНИЙ</div>
                    <div class="resources">
                        <div class="resource"><span>💰</span> <span id="eco">${gameState.economy}</span></div>
                        <div class="resource"><span>📚</span> <span id="sci">${gameState.science}</span></div>
                        <div class="resource"><span>⚔️</span> <span id="arm">${gameState.army}</span></div>
                    </div>
                </div>
                
                <div class="map">
                    <h2>🗺️ КАРТА ГОРОДА</h2>
                    <div class="map-grid">
                        ${mapHtml}
                    </div>
                </div>
                
                ${content}
                
                <div class="progress">
                    <span>Заданий выполнено: ${gameState.completedQuests.length} / 6</span>
                    <div class="bar"><div class="fill" style="width: ${(gameState.completedQuests.length / 6) * 100}%"></div></div>
                </div>
            `;
        }
        
        // ФУНКЦИИ ИГРЫ
        function startGame() {
            gameState.stage = 'intro';
            render();
        }
        
        function startPlaying() {
            gameState.stage = 'playing';
            gameState.currentLocation = 0;
            gameState.currentQuest = false;
            render();
        }
        
        function selectLocation(id) {
            gameState.currentLocation = id;
            gameState.currentQuest = false;
            renderGameScreen();
        }
        
        function startQuest() {
            gameState.currentQuest = true;
            renderGameScreen();
        }
        
        function makeChoice(choiceIndex) {
            const loc = gameState.locations[gameState.currentLocation];
            const quest = gameState.quests[loc.quest];
            const choice = quest.choices[choiceIndex];
            
            // Изменяем ресурсы
            gameState.economy = Math.min(100, Math.max(0, gameState.economy + choice.eco));
            gameState.science = Math.min(100, Math.max(0, gameState.science + choice.sci));
            gameState.army = Math.min(100, Math.max(0, gameState.army + choice.army));
            
            // Отмечаем задание выполненным
            if (!gameState.completedQuests.includes(gameState.currentLocation)) {
                gameState.completedQuests.push(gameState.currentLocation);
            }
            
            gameState.currentQuest = false;
            
            // Проверяем финал
            if (gameState.completedQuests.length >= 6) {
                gameState.stage = 'ending';
            }
            
            render();
        }
        
        function restartGame() {
            gameState.stage = 'start';
            gameState.economy = 50;
            gameState.science = 50;
            gameState.army = 50;
            gameState.completedQuests = [];
            gameState.currentLocation = 0;
            gameState.currentQuest = false;
            render();
        }
        
        // ЗАПУСК
        render();
    </script>
</body>
</html>
