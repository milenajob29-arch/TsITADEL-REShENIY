<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - КАРТА ГОРОДА</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'MedievalSharp', cursive, sans-serif;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .game-container {
            width: 1300px;
            max-width: 100%;
            background: #1e2a3a;
            border-radius: 30px;
            padding: 20px;
            border: 5px solid #b8860b;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }
        
        /* Верхняя панель */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #2a3a4a;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid gold;
        }
        
        .title {
            font-size: 2.2rem;
            color: gold;
            text-shadow: 0 0 20px orange;
            letter-spacing: 3px;
        }
        
        .resources {
            display: flex;
            gap: 25px;
        }
        
        .resource {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a2a3a;
            padding: 8px 20px;
            border-radius: 30px;
            border: 2px solid gold;
        }
        
        .resource-icon {
            font-size: 1.8rem;
        }
        
        .resource-value {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        #ecoValue { color: #ffd700; }
        #sciValue { color: #00ffff; }
        #armyValue { color: #ff4444; }
        
        /* Карта города */
        .city-map {
            background: #2a3a4a;
            border-radius: 20px;
            padding: 20px;
            border: 3px solid gold;
            margin-bottom: 20px;
        }
        
        .map-title {
            color: gold;
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid gold;
            padding-bottom: 10px;
        }
        
        .map-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .map-cell {
            background: #1a2a3a;
            border: 3px solid #b8860b;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .map-cell:hover {
            transform: scale(1.02);
            border-color: gold;
            box-shadow: 0 0 30px gold;
        }
        
        .map-cell.active {
            border-color: gold;
            background: #2a3a4a;
            box-shadow: 0 0 30px gold;
        }
        
        .map-cell.completed {
            border-color: #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }
        
        .location-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .location-name {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .location-npc {
            font-size: 2rem;
            margin-top: 10px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .completed-mark {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            color: #00ff00;
        }
        
        /* Игровая область */
        .game-area {
            background: #1a2a3a;
            border-radius: 20px;
            border: 3px solid gold;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .location-scene {
            height: 350px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        
        /* Фоны локаций */
        .bg-throne { background: linear-gradient(145deg, #5a4a3a, #2a1a0a); }
        .bg-gates { background: linear-gradient(145deg, #6a5a4a, #3a2a1a); }
        .bg-port { background: linear-gradient(145deg, #2a5a7a, #1a3a5a); }
        .bg-library { background: linear-gradient(145deg, #3a4a5a, #1a2a3a); }
        .bg-barracks { background: linear-gradient(145deg, #5a3a2a, #3a1a0a); }
        .bg-temple { background: linear-gradient(145deg, #5a5a7a, #2a2a4a); }
        
        /* Персонажи */
        .character-hero {
            width: 80px;
            height: 80px;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            border: 3px solid gold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            position: absolute;
            bottom: 20px;
            left: 30%;
            transform: translateX(-50%);
            animation: heroFloat 2s infinite;
            cursor: pointer;
            z-index: 10;
        }
        
        .character-npc {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border: 3px solid gold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            position: absolute;
            bottom: 30px;
            right: 30%;
            transform: translateX(50%);
            animation: npcFloat 2.5s infinite;
            cursor: pointer;
            z-index: 10;
        }
        
        @keyframes heroFloat {
            0%, 100% { bottom: 20px; }
            50% { bottom: 30px; }
        }
        
        @keyframes npcFloat {
            0%, 100% { bottom: 30px; }
            50% { bottom: 40px; }
        }
        
        .character-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: gold;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            white-space: nowrap;
            border: 1px solid gold;
        }
        
        /* Диалоговое окно */
        .dialog-box {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 25px;
            margin: 20px;
            color: white;
            backdrop-filter: blur(5px);
        }
        
        .dialog-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid gold;
            padding-bottom: 15px;
        }
        
        .npc-portrait {
            width: 60px;
            height: 60px;
            background: #2a3a4a;
            border-radius: 50%;
            border: 3px solid gold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
        }
        
        .npc-info {
            flex: 1;
        }
        
        .npc-name {
            color: gold;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .npc-title {
            color: #b8a07c;
            font-size: 1rem;
        }
        
        .dialog-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            background: #1a2a3a;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid gold;
        }
        
        .error-highlight {
            background: #2a1a1a;
            color: #ffaa00;
            font-family: monospace;
            font-size: 1.3rem;
            padding: 15px;
            border-radius: 10px;
            border: 2px dashed gold;
            margin: 15px 0;
            text-align: center;
        }
        
        .choices-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .choice-card {
            background: #1a2a3a;
            border: 2px solid #b8860b;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        
        .choice-card:hover {
            transform: translateY(-5px);
            border-color: gold;
            box-shadow: 0 5px 20px gold;
        }
        
        .choice-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .choice-title {
            color: gold;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .choice-effects {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .effect {
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        .effect.positive {
            background: rgba(0, 255, 0, 0.2);
            color: #aaffaa;
            border: 1px solid #00ff00;
        }
        
        .effect.negative {
            background: rgba(255, 0, 0, 0.2);
            color: #ffaaaa;
            border: 1px solid #ff0000;
        }
        
        /* Кнопка задания */
        .quest-button {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            border: 2px solid white;
            transition: 0.3s;
        }
        
        .quest-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        
        /* Нижняя панель */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a3a4a;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid gold;
        }
        
        .quest-counter {
            color: white;
            font-size: 1.2rem;
        }
        
        .counter-number {
            color: gold;
            font-weight: bold;
            font-size: 1.5rem;
            margin-left: 10px;
        }
        
        .progress-bar {
            width: 300px;
            height: 15px;
            background: #1a2a3a;
            border-radius: 15px;
            border: 2px solid gold;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, gold, orange);
            transition: width 0.5s;
        }
        
        /* Финальный экран */
        .ending-screen {
            text-align: center;
            background: #1a2a3a;
            border: 5px solid gold;
            border-radius: 30px;
            padding: 50px;
            margin: 20px 0;
        }
        
        .ending-title {
            font-size: 3.5rem;
            color: gold;
            margin-bottom: 30px;
            text-shadow: 0 0 30px gold;
        }
        
        .ending-image {
            font-size: 8rem;
            margin: 30px;
        }
        
        .ending-text {
            color: white;
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .ending-resources {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px;
            font-size: 1.5rem;
        }
        
        .restart-button {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            border: 3px solid white;
            transition: 0.3s;
        }
        
        .restart-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px gold;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Верхняя панель -->
        <div class="header">
            <div class="title">🏰 ЦИТАДЕЛЬ РЕШЕНИЙ</div>
            <div class="resources">
                <div class="resource">
                    <span class="resource-icon">💰</span>
                    <span class="resource-value" id="ecoValue">50</span>
                </div>
                <div class="resource">
                    <span class="resource-icon">📚</span>
                    <span class="resource-value" id="sciValue">50</span>
                </div>
                <div class="resource">
                    <span class="resource-icon">⚔️</span>
                    <span class="resource-value" id="armyValue">50</span>
                </div>
            </div>
        </div>
        
        <!-- Карта города -->
        <div class="city-map">
            <div class="map-title">🗺️ КАРТА ГОРОДА</div>
            <div class="map-grid" id="mapGrid"></div>
        </div>
        
        <!-- Игровая область -->
        <div class="game-area" id="gameArea"></div>
        
        <!-- Нижняя панель -->
        <div class="footer">
            <div class="quest-counter">
                Заданий выполнено: <span class="counter-number" id="completedCount">0/10</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
    </div>

        // ИНИЦИАЛИЗАЦИЯ
        function initGame() {
            renderMap();
            selectLocation(0);
            updateResources();
            updateProgress();
        }
        
        // ОТРИСОВКА КАРТЫ
        function renderMap() {
            const mapGrid = document.getElementById('mapGrid');
            let html = '';
            
            for (let i = 0; i < gameState.locations.length; i++) {
                const loc = gameState.locations[i];
                const isCompleted = gameState.completedQuests.includes(i);
                const isActive = gameState.currentLocation === i;
                
                html += `
                    <div class="map-cell ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" 
                         onclick="selectLocation(${i})">
                        <div class="location-icon">${loc.icon}</div>
                        <div class="location-name">${loc.name}</div>
                        <div class="location-npc">${loc.npc}</div>
                        ${isCompleted ? '<div class="completed-mark">✓</div>' : ''}
                    </div>
                `;
            }
            
            mapGrid.innerHTML = html;
        }
        
        // ВЫБОР ЛОКАЦИИ
        function selectLocation(locationId) {
            gameState.currentLocation = locationId;
            renderMap();
            renderLocationScene();
        }
        
        // ОТРИСОВКА СЦЕНЫ ЛОКАЦИИ
        function renderLocationScene() {
            const loc = gameState.locations[gameState.currentLocation];
            const quest = gameState.quests.find(q => q.locationId === gameState.currentLocation);
            const isCompleted = gameState.completedQuests.includes(gameState.currentLocation);
            
            let sceneHtml = `
                <div class="location-scene ${loc.bg}">
                    <div class="character-hero" onclick="startQuest()" title="Нажми чтобы действовать">
                        👑
                        <div class="character-label">Правитель</div>
                    </div>
                    <div class="character-npc" onclick="startQuest()" title="Поговорить">
                        ${loc.npc}
                        <div class="character-label">${loc.npcName}</div>
                    </div>
                </div>
            `;
            
            if (isCompleted) {
                sceneHtml += `
                    <div class="dialog-box">
                        <div class="dialog-header">
                            <div class="npc-portrait">${loc.npc}</div>
                            <div class="npc-info">
                                <div class="npc-name">${loc.npcName}</div>
                                <div class="npc-title">${loc.npcTitle}</div>
                            </div>
                        </div>
                        <div class="dialog-text">
                            Спасибо за помощь, Правитель! Благодаря тебе город стал лучше.
                        </div>
                    </div>
                `;
            } else if (quest) {
                sceneHtml += `
                    <div class="dialog-box">
                        <div class="dialog-header">
                            <div class="npc-portrait">${loc.npc}</div>
                            <div class="npc-info">
                                <div class="npc-name">${loc.npcName}</div>
                                <div class="npc-title">${loc.npcTitle}</div>
                            </div>
                        </div>
                        <div class="dialog-text">
                            ${quest.dialog[0]}<br><br>
                            ${quest.dialog[1] || ''}
                        </div>
                        <button class="quest-button" onclick="startQuest()">
                            📜 Начать задание
                        </button>
                    </div>
                `;
            }
            
            document.getElementById('gameArea').innerHTML = sceneHtml;
        }
        
        // НАЧАТЬ ЗАДАНИЕ
        function startQuest() {
            const loc = gameState.locations[gameState.currentLocation];
            const quest = gameState.quests.find(q => q.locationId === gameState.currentLocation);
            
            if (!quest || gameState.completedQuests.includes(gameState.currentLocation)) {
                return;
            }
            
            let choicesHtml = '';
            for (let i = 0; i < quest.choices.length; i++) {
                const c = quest.choices[i];
                choicesHtml += `
                    <div class="choice-card" onclick="makeChoice(${i})">
                        <div class="choice-icon">${c.icon}</div>
                        <div class="choice-title">${c.text}</div>
                        <div class="choice-effects">
                            ${c.eco !== 0 ? `<span class="effect ${c.eco > 0 ? 'positive' : 'negative'}">💰${c.eco > 0 ? '+' : ''}${c.eco}</span>` : ''}
                            ${c.sci !== 0 ? `<span class="effect ${c.sci > 0 ? 'positive' : 'negative'}">📚${c.sci > 0 ? '+' : ''}${c.sci}</span>` : ''}
                            ${c.army !== 0 ? `<span class="effect ${c.army > 0 ? 'positive' : 'negative'}">⚔️${c.army > 0 ? '+' : ''}${c.army}</span>` : ''}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('gameArea').innerHTML = `
                <div class="location-scene ${loc.bg}">
                    <div class="character-hero">👑</div>
                    <div class="character-npc">${loc.npc}</div>
                </div>
                <div class="dialog-box">
                    <div class="dialog-header">
                        <div class="npc-portrait">${loc.npc}</div>
                        <div class="npc-info">
                            <div class="npc-name">${loc.npcName}</div>
                            <div class="npc-title">${loc.npcTitle}</div>
                        </div>
                    </div>
                    <div class="dialog-text">
                        ${quest.dialog[0]}<br><br>
                        ${quest.dialog[1] || ''}<br><br>
                        <div class="error-highlight">${quest.error}</div>
                    </div>
                    <div class="choices-grid">
                        ${choicesHtml}
                    </div>
                </div>
            `;
        }
        
        // СДЕЛАТЬ ВЫБОР
        function makeChoice(choiceIndex) {
            const loc = gameState.locations[gameState.currentLocation];
            const quest = gameState.quests.find(q => q.locationId === gameState.currentLocation);
            const choice = quest.choices[choiceIndex];
            
            // Изменяем ресурсы
            gameState.economy = Math.min(100, Math.max(0, gameState.economy + choice.eco));
            gameState.science = Math.min(100, Math.max(0, gameState.science + choice.sci));
            gameState.army = Math.min(100, Math.max(0, gameState.army + choice.army));
            
            // Отмечаем задание выполненным
            if (!gameState.completedQuests.includes(gameState.currentLocation)) {
                gameState.completedQuests.push(gameState.currentLocation);
            }
            
            // Обновляем интерфейс
            updateResources();
            updateProgress();
            renderMap();
            
            // Показываем результат
            document.getElementById('gameArea').innerHTML = `
                <div class="location-scene ${loc.bg}">
                    <div class="character-hero">👑</div>
                    <div class="character-npc">${loc.npc}</div>
                </div>
                <div class="dialog-box">
                    <div class="dialog-header">
                        <div class="npc-portrait">${loc.npc}</div>
                        <div class="npc-info">
                            <div class="npc-name">${loc.npcName}</div>
                            <div class="npc-title">${loc.npcTitle}</div>
                        </div>
                    </div>
                    <div class="dialog-text" style="text-align: center;">
                        ${choice.reply}
                        <br><br>
                        <span style="color: gold;">✨ Задание выполнено! ✨</span>
                    </div>
                    <button class="quest-button" onclick="selectLocation(gameState.currentLocation)">
                        ➡️ Вернуться
                    </button>
                </div>
            `;
            
            // Проверяем финал
            if (gameState.completedQuests.length >= gameState.totalQuests) {
                setTimeout(showEnding, 1000);
            }
        }
        
        // ОБНОВЛЕНИЕ РЕСУРСОВ
        function updateResources() {
            document.getElementById('ecoValue').innerText = gameState.economy;
            document.getElementById('sciValue').innerText = gameState.science;
            document.getElementById('armyValue').innerText = gameState.army;
        }
        
        // ОБНОВЛЕНИЕ ПРОГРЕССА
        function updateProgress() {
            const count = gameState.completedQuests.length;
            document.getElementById('completedCount').innerText = `${count}/${gameState.totalQuests}`;
            document.getElementById('progressFill').style.width = `${(count / gameState.totalQuests) * 100}%`;
        }
