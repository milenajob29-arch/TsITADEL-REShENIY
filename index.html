<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - ИГРА</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'MedievalSharp', cursive, Arial;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        /* ОСНОВНОЙ КОНТЕЙНЕР ИГРЫ */
        .game-wrapper {
            width: 1200px;
            max-width: 100%;
            background: linear-gradient(145deg, #1e2a3a 0%, #0f1a24 100%);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,215,0,0.2);
            border: 2px solid #aa8c5e;
            position: relative;
        }
        
        /* ДЕКОРАТИВНЫЙ УЗОР ПО КРАЯМ */
        .game-wrapper::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(170, 140, 94, 0.3);
            border-radius: 20px;
            pointer-events: none;
        }
        
        /* ЗАГОЛОВОК С ГЕРБОМ */
        .game-header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .game-header h1 {
            font-size: 3rem;
            background: linear-gradient(180deg, #f5e6b3 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.7), 0 0 20px #ffd700;
            letter-spacing: 4px;
            font-weight: bold;
            position: relative;
            display: inline-block;
            padding: 0 60px;
        }
        
        .game-header h1::before, .game-header h1::after {
            content: "⚔️";
            font-size: 2rem;
            position: absolute;
            top: 10px;
            color: #d4af37;
            text-shadow: 0 0 10px gold;
        }
        
        .game-header h1::before { left: 0; }
        .game-header h1::after { right: 0; content: "🛡️"; }
        
        .game-header p {
            color: #b8a07c;
            font-style: italic;
            letter-spacing: 2px;
            margin-top: 5px;
        }
        
        /* ДАШБОРД РЕСУРСОВ */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        
        .resource-card {
            background: linear-gradient(145deg, #2a3745 0%, #1a2530 100%);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #aa8c5e;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .resource-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        
        .resource-card:hover::after {
            opacity: 1;
        }
        
        .resource-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            color: #f5e6b3;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #5a4a3a;
            padding-bottom: 10px;
        }
        
        .resource-icon {
            font-size: 2rem;
        }
        
        .progress-container {
            width: 100%;
            height: 25px;
            background: #1a1f2a;
            border-radius: 15px;
            border: 2px solid #3a3f4a;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .progress-fill {
            height: 100%;
            width: 50%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 15px;
            position: relative;
            background-size: 30px 30px;
            background-image: linear-gradient(
                45deg,
                rgba(255,255,255,0.2) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255,255,255,0.2) 50%,
                rgba(255,255,255,0.2) 75%,
                transparent 75%,
                transparent
            );
            animation: moveStripes 1s linear infinite;
        }
        
        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 30px 0; }
        }
        
        .economy-fill { background: linear-gradient(90deg, #ffd700, #ffaa00); }
        .science-fill { background: linear-gradient(90deg, #00ffff, #0088ff); }
        .army-fill { background: linear-gradient(90deg, #ff4444, #cc0000); }
        
        .resource-value {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            color: #f5e6b3;
            text-shadow: 0 0 15px currentColor;
            letter-spacing: 2px;
        }
        
        .economy-value { color: #ffd700; }
        .science-value { color: #00ffff; }
        .army-value { color: #ff4444; }
        
        /* ОБЛАСТЬ С ПЕРСОНАЖЕМ */
        .character-area {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #5a4a3a;
            min-height: 180px;
        }
        
        .character-portrait {
            width: 150px;
            height: 150px;
            background: linear-gradient(145deg, #3a4a5a 0%, #1a2a3a 100%);
            border-radius: 50%;
            border: 4px solid #d4af37;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 30px #ffd700;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
            animation: glow 3s infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 30px #ffd700; }
            50% { box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 50px #ffaa00; }
        }
        
        .character-portrait::after {
            content: "";
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .character-info {
            flex: 1;
            color: #f0e6d2;
            padding: 10px;
            position: relative;
        }
        
        .character-name {
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            border-bottom: 1px solid #5a4a3a;
            padding-bottom: 5px;
        }
        
        .character-title {
            font-size: 1.2rem;
            color: #b8a07c;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .character-speech {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 15px;
            border-left: 5px solid #d4af37;
            position: relative;
            font-size: 1.1rem;
            line-height: 1.6;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .character-speech::before {
            content: "❝";
            font-size: 3rem;
            position: absolute;
            top: -10px;
            left: 5px;
            color: rgba(212, 175, 55, 0.3);
            font-family: serif;
        }
        
        /* КАРТА/ЛОКАЦИЯ */
        .location-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            background: #1a2530;
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid #5a4a3a;
            width: fit-content;
        }
        
        .location-icon {
            font-size: 1.3rem;
        }
        
        .location-name {
            color: #d4af37;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .location-step {
            background: #d4af37;
            color: #1a1a2e;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            margin-left: 10px;
        }
        
        /* КОНТЕЙНЕР ЗАДАНИЯ */
        .quest-container {
            background: linear-gradient(145deg, #2a3a4a 0%, #1a2a3a 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 2px solid #aa8c5e;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .quest-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }
        
        .quest-title {
            font-size: 1.8rem;
            color: #f5e6b3;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quest-text {
            font-size: 1.2rem;
            color: #e0d6c0;
            margin-bottom: 20px;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed #aa8c5e;
        }
        
        .error-text {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            color: #ffaa00;
            background: rgba(30, 20, 10, 0.9);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #b8860b;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
            position: relative;
        }
        
        .error-text::before {
            content: "⚠️";
            position: absolute;
            top: -15px;
            left: 20px;
            font-size: 2rem;
            background: #1a2a3a;
            padding: 5px 10px;
            border-radius: 50%;
            border: 2px solid #b8860b;
        }
        
        /* КНОПКИ ВЫБОРА */
        .choices-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .choice-card {
            background: linear-gradient(145deg, #2a3745 0%, #1e2a36 100%);
            border: 2px solid #5a4a3a;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        
        .choice-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
            transition: left 0.5s;
        }
        
        .choice-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }
        
        .choice-card:hover::before {
            left: 100%;
        }
        
        .choice-card:active {
            transform: translateY(2px);
        }
        
        .choice-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .choice-title {
            font-size: 1.3rem;
            color: #d4af37;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .choice-desc {
            color: #b8a07c;
            font-size: 0.9rem;
            margin-bottom: 15px;
            min-height: 40px;
        }
        
        .choice-modifiers {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            border-top: 1px solid #5a4a3a;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .modifier {
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .modifier-positive {
            background: rgba(0, 255, 0, 0.2);
            color: #a5d6a5;
            border: 1px solid #00aa00;
        }
        
        .modifier-negative {
            background: rgba(255, 0, 0, 0.2);
            color: #ffaaaa;
            border: 1px solid #aa0000;
        }
        
        /* ОБЛАСТЬ ОБРАТНОЙ СВЯЗИ */
        .feedback-area {
            min-height: 70px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            border-left: 5px solid #d4af37;
            font-size: 1.1rem;
            color: #f0e6d2;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.5s;
        }
        
        .feedback-icon {
            font-size: 2rem;
            min-width: 50px;
            text-align: center;
        }
        
        .feedback-success { border-left-color: #00ff00; background: rgba(0, 255, 0, 0.1); }
        .feedback-error { border-left-color: #ff4444; background: rgba(255, 0, 0, 0.1); }
        .feedback-warning { border-left-color: #ffaa00; background: rgba(255, 165, 0, 0.1); }
        
        /* КНОПКА ДАЛЕЕ */
        .next-btn {
            background: linear-gradient(145deg, #d4af37 0%, #b8860b 100%);
            color: #1a1a2e;
            border: none;
            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 20px auto 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid #f5e6b3;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 30px #ffd700;
            position: relative;
            overflow: hidden;
        }
        
        .next-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transition: left 0.5s;
        }
        
        .next-btn:hover::before {
            left: 100%;
        }
        
        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 50px #ffaa00;
        }
        
        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* АНИМАЦИИ */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .bounce {
            animation: bounce 1s infinite;
        }
        
        .hidden {
            display: none;
        }
        
        /* ФИНАЛЬНЫЙ ЭКРАН */
        .ending-screen {
            text-align: center;
            padding: 40px;
            background: linear-gradient(145deg, #1a2a3a 0%, #0a1a2a 100%);
            border-radius: 20px;
            border: 3px solid #d4af37;
            margin-top: 20px;
        }
        
        .ending-screen h2 {
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 20px;
            text-shadow: 0 0 30px gold;
        }
        
        .ending-screen img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 3px solid #aa8c5e;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }
        
        .ending-screen p {
            font-size: 1.3rem;
            color: #f0e6d2;
            line-height: 1.8;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
        }
        
        .restart-btn {
            background: #d4af37;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid #f5e6b3;
            transition: all 0.3s;
        }
        
        .restart-btn:hover {
            background: #f5e6b3;
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        
        /* АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .choices-grid { grid-template-columns: 1fr; }
            .character-area { flex-direction: column; align-items: center; }
            .game-header h1 { font-size: 2rem; }
        }
        
        /* СЧЁТЧИК ХОДОВ */
        .turn-counter {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #5a4a3a;
        }
        
        .turn-text {
            color: #b8a07c;
            font-size: 1.1rem;
        }
        
        .turn-number {
            background: #d4af37;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        /* ИНВЕНТАРЬ/ДОСТИЖЕНИЯ */
        .inventory {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .achievement {
            width: 40px;
            height: 40px;
            background: #2a3a4a;
            border: 2px solid #5a4a3a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            color: #b8a07c;
            transition: all 0.3s;
        }
        
        .achievement-earned {
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 15px gold;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- ШАПКА С ТИТУЛОМ -->
        <div class="game-header">
            <h1>ЦИТАДЕЛЬ РЕШЕНИЙ</h1>
            <p>Хроники молодого правителя</p>
        </div>
        
        <!-- ОСНОВНОЙ ИГРОВОЙ КОНТЕЙНЕР -->
        <div id="gameContent">
            <!-- СЮДА БУДЕТ ПОДГРУЖАТЬСЯ ИГРА -->
        </div>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКИ ИГРЫ
        // ==========================================
        const CONFIG = {
            startValues: { economy: 50, science: 50, army: 50 },
            names: { economy: "Экономика", science: "Наука", army: "Армия" },
            difficultyMultiplier: 1.0
        };
        
        // ==========================================
        // ДАННЫЕ ИГРЫ
        // ==========================================
        const GAME = {
            resources: { economy: 50, science: 50, army: 50 },
            currentEvent: 0,
            choiceMade: false,
            history: [],
            
            // ПЕРСОНАЖ
            character: {
                name: "Артур",
                title: "Молодой Правитель",
                level: 1,
                experience: 0,
                inventory: []
            },
            
            // ЛОКАЦИИ (10 земель)
            locations: [
                { name: "Тронный зал", icon: "👑", step: 1 },
                { name: "Городские ворота", icon: "🏰", step: 2 },
                { name: "Торговая площадь", icon: "🏪", step: 3 },
                { name: "Библиотека", icon: "📚", step: 4 },
                { name: "Казармы", icon: "⚔️", step: 5 },
                { name: "Порт", icon: "⚓", step: 6 },
                { name: "Храм", icon: "⛪", step: 7 },
                { name: "Университет", icon: "🎓", step: 8 },
                { name: "Крепостная стена", icon: "🏯", step: 9 },
                { name: "Замковый холм", icon: "🏔️", step: 10 }
            ],
            
            // СОБЫТИЯ (10 заданий)
            events: [
                {
                    location: 0,
                    title: "Указ правителя",
                    quest: "Писарь принес указ для городской площади. Но допустил ошибки. Как поступишь?",
                    errorText: "\"Жители города! Завтра состоится собрание на центральнай площади. Явка обязательна для всех горожан.\"",
                    choices: [
                        {
                            icon: "📝",
                            title: "Исправить ошибки",
                            desc: "Найди ошибки и накажи писаря",
                            modifiers: { economy: 5, science: 10, army: -5 },
                            feedback: "Ты нашел ошибки в словах 'центральнай' (правильно: центральной) и проверил 'горожан' (ошибки нет!)",
                            correctAnswer: "центральнай → центральной"
                        },
                        {
                            icon: "🤷",
                            title: "Оставить как есть",
                            desc: "Не тратить время на исправление",
                            modifiers: { economy: -5, science: -5, army: 10 },
                            feedback: "Народ посмеялся над безграмотным указом. Авторитет упал.",
                            correctAnswer: "Ошибка осталась: центральнай"
                        },
