<!DOCTYPE html>
<html>
<head>
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: white;
            font-family: Arial;
            text-align: center;
        }
        h1 {
            color: gold;
            font-size: 3rem;
        }
        .btn {
            background: gold;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        .game-box {
            max-width: 800px;
            margin: 50px auto;
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid gold;
        }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>🏰 ЦИТАДЕЛЬ РЕШЕНИЙ</h1>
        <p style="font-size: 1.2rem;">Добро пожаловать, Правитель!</p>
        <p>Город ждет твоих решений.</p>
        <button class="btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    </div>

    <script>
        function startGame() {
            alert('Игра запущена! Переходим к следующему этапу.');
            document.querySelector('.game-box').innerHTML = `
                <h2 style="color: gold;">✅ ИГРА РАБОТАЕТ!</h2>
                <p>Ты видишь это сообщение - значит код работает.</p>
                <p>Теперь будем добавлять 3D и управление.</p>
                <button class="btn" onclick="location.reload()">НАЗАД</button>
            `;
        }
    </script>
</body>
</html>
