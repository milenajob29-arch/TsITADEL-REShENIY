<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цитадель Решений - Образовательный квест</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        /* Дашборд */
        .dashboard {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid gold;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .resource {
            text-align: center;
        }
        
        .resource-title {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px currentColor;
        }
        
        .economy .resource-title { color: #ffd700; }
        .science .resource-title { color: #00ffff; }
        .army .resource-title { color: #ff4444; }
        
        .progress-bar {
            width: 100%;
            height: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .progress-fill {
            height: 100%;
            width: 50%;
            transition: width 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 15px;
        }
        
        .economy .progress-fill { background: linear-gradient(90deg, #ffd700, #ffaa00); }
        .science .progress-fill { background: linear-gradient(90deg, #00ffff, #0088ff); }
        .army .progress-fill { background: linear-gradient(90deg, #ff4444, #ff0000); }
        
        .resource-value {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
        }
        
        .warning-icon {
            display: inline-block;
            margin-left: 5px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        
        /* Игровая область */
        .game-area {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        .situation {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.6;
            text-align: center;
            font-style: italic;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid gold;
        }
        
        .error-text {
            color: #ffaa00;
            font-family: monospace;
            font-size: 1.3rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px dashed #ffaa00;
        }
        
        .choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .choice-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 20px 15px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .choice-btn:hover:not(:disabled) {
            background: rgba(255, 215, 0, 0.2);
            border-color: gold;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        .choice-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .choice-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: gold;
        }
        
        .choice-modifiers {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .choice-modifiers span {
            display: inline-block;
            margin: 0 5px;
        }
        
        .modifier-positive { color: #00ff00; }
        .modifier-negative { color: #ff4444; }
        
        .feedback-area {
            min-height: 50px;
            margin-top: 20px;
            text-align: center;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        
        .feedback-success {
            color: #00ff00;
            animation: fadeIn 0.5s;
        }
        
        .feedback-error {
            color: #ff4444;
            animation: shake 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .next-btn {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 20px auto 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .next-btn:hover:not(:disabled) {
            background: #ffaa00;
            transform: scale(1.05);
            box-shadow: 0 0 20px gold;
        }
        
        .next-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .restart-btn {
            background: transparent;
            color: white;
            border: 1px solid gold;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .restart-btn:hover {
            background: gold;
            color: #1a1a2e;
        }
        
        .hidden {
            display: none;
        }
        
        .ending-screen {
            text-align: center;
            color: white;
            padding: 30px;
        }
        
        .ending-screen h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px gold;
        }
        
        .ending-screen img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 3px solid gold;
        }
        
        .ending-screen p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        /* Админ-панель (скрыта по умолчанию) */
        .admin-panel {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid gold;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            color: white;
        }
        
        .admin-panel h3 {
            color: gold;
            margin-bottom: 15px;
        }
        
        .admin-panel input, .admin-panel textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background: #333;
            border: 1px solid gold;
            color: white;
            border-radius: 5px;
        }
        
        .admin-panel button {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .admin-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: gold;
            border: 1px solid gold;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <button class="admin-toggle" onclick="toggleAdminPanel()">⚙️ Админ-панель</button>
    
    <div class="game-container" id="gameContainer">
        <!-- Дашборд -->
        <div class="dashboard" id="dashboard">
            <div class="resource economy">
                <div class="resource-title">💰 ЭКОНОМИКА</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="economyFill" style="width: 50%"></div>
                </div>
                <div class="resource-value" id="economyValue">50</div>
            </div>
            <div class="resource science">
                <div class="resource-title">📚 НАУКА</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="scienceFill" style="width: 50%"></div>
                </div>
                <div class="resource-value" id="scienceValue">50</div>
            </div>
            <div class="resource army">
                <div class="resource-title">⚔️ АРМИЯ</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="armyFill" style="width: 50%"></div>
                </div>
                <div class="resource-value" id="armyValue">50</div>
            </div>
        </div>
        
        <!-- Игровая область -->
        <div class="game-area" id="gameArea">
            <!-- Сюда будет подгружаться текущий слайд -->
        </div>
        
        <!-- Админ-панель (скрыта) -->
        <div class="admin-panel hidden" id="adminPanel">
            <h3>⚙️ НАСТРОЙКИ ИГРЫ (РЕДАКТОР)</h3>
            
            <h4>Стартовые значения</h4>
            <label>Экономика (0-100):</label>
            <input type="number" id="startEconomy" value="50" min="0" max="100">
            <label>Наука (0-100):</label>
            <input type="number" id="startScience" value="50" min="0" max="100">
            <label>Армия (0-100):</label>
            <input type="number" id="startArmy" value="50" min="0" max="100">
            
            <h4>Названия характеристик</h4>
            <label>Экономика:</label>
            <input type="text" id="nameEconomy" value="Экономика">
            <label>Наука:</label>
            <input type="text" id="nameScience" value="Наука">
            <label>Армия:</label>
            <input type="text" id="nameArmy" value="Армия">
            
            <h4>Коэффициенты сложности</h4>
            <label>Множитель изменений (0.5 - 2.0):</label>
            <input type="number" id="difficultyMultiplier" value="1.0" min="0.5" max="2.0" step="0.1">
            
            <h4>Тексты концовок</h4>
            <label>Концовка Экономиста:</label>
            <textarea id="endingEconomyText" rows="2">Ты построил торговую империю! Корабли со всего мира прибывают в твой порт. Город утопает в золоте и роскоши.</textarea>
            <label>Концовка Ученого:</label>
            <textarea id="endingScienceText" rows="2">Великая академия магии открыта! Ученые со всего света едут к тебе. Знания стали главной силой города.</textarea>
            <label>Концовка Воина:</label>
            <textarea id="endingArmyText" rows="2">Враг разбит! Твоя армия непобедима. Никто не посмеет угрожать Цитадели. Слава Императору!</textarea>
            
            <button onclick="applySettings()">Применить настройки</button>
            <button onclick="resetToDefault()">Сброс</button>
            <button onclick="toggleAdminPanel()">Закрыть</button>
        </div>
    </div>
