<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИТАДЕЛЬ РЕШЕНИЙ - RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            font-family: 'Segoe UI', 'MedievalSharp', cursive, sans-serif;
        }
        
        .game-wrapper {
            width: 1200px;
            max-width: 100%;
            background: #1e2a3a;
            border-radius: 30px;
            padding: 20px;
            border: 4px solid #b8860b;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #2a3a4a;
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid gold;
        }
        
        .game-title {
            font-size: 2rem;
            color: gold;
            text-shadow: 0 0 10px orange;
            letter-spacing: 3px;
        }
        
        .resources-panel {
            display: flex;
            gap: 30px;
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a2a3a;
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid gold;
        }
        
        .resource-icon {
            font-size: 1.5rem;
        }
        
        .resource-value {
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        #ecoValue { color: #ffd700; }
        #sciValue { color: #00ffff; }
        #armyValue { color: #ff4444; }
        
        /* ОСНОВНОЙ ЭКРАН */
        .game-screen {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        /* КАРТА/ЛОКАЦИИ */
        .map-container {
            width: 300px;
            background: #2a3a4a;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid gold;
        }
        
        .map-title {
            color: gold;
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid gold;
            padding-bottom: 5px;
        }
        
        .location-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .location-card {
            background: #1a2a3a;
            border: 2px solid #b8860b;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .location-card:hover {
            transform: scale(1.05);
            border-color: gold;
            box-shadow: 0 0 20px gold;
        }
        
        .location-card.active {
            border-color: gold;
            background: #2a3a4a;
            box-shadow: 0 0 20px gold;
        }
        
        .location-icon {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        
        .location-name {
            color: white;
            font-size: 0.9rem;
        }
        
        /* ИГРОВОЕ ПОЛЕ */
        .game-area {
            flex: 1;
            background: #1a2a3a;
            border-radius: 20px;
            border: 2px solid gold;
            overflow: hidden;
            position: relative;
        }
        
        /* ФОН ЛОКАЦИИ */
        .location-background {
            width: 100%;
            height: 350px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: background-image 0.5s;
        }
        
        /* ПЕРСОНАЖ */
        .character {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            filter: drop-shadow(0 0 20px gold);
            cursor: pointer;
            transition: 0.3s;
            animation: float 2s infinite;
        }
        
        .character:hover {
            transform: translateX(-50%) scale(1.1);
        }
        
        @keyframes float {
            0%, 100% { bottom: 20px; }
            50% { bottom: 30px; }
        }
        
        /* ДИАЛОГОВОЕ ОКНО */
        .dialog-box {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 20px;
            margin: 20px;
            color: white;
            position: relative;
            backdrop-filter: blur(5px);
        }
        
        .dialog-npc {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .npc-avatar {
            width: 60px;
            height: 60px;
            background: #2a3a4a;
            border-radius: 50%;
            border: 2px solid gold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }
        
        .npc-name {
            color: gold;
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        .dialog-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            padding-left: 75px;
        }
        
        /* КНОПКИ В ДИАЛОГЕ */
        .dialog-choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .dialog-choice {
            background: #1a2a3a;
            border: 2px solid #b8860b;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        
        .dialog-choice:hover {
            transform: translateY(-5px);
            border-color: gold;
            box-shadow: 0 5px 20px gold;
        }
        
        .choice-title {
            color: gold;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .choice-effects {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        
        .effect {
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .effect.positive { background: rgba(0,255,0,0.2); color: lightgreen; }
        .effect.negative { background: rgba(255,0,0,0.2); color: pink; }
        
        /* NPC НА КАРТЕ */
        .npc-on-map {
            position: absolute;
            bottom: 120px;
            right: 50px;
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            border: 2px solid gold;
            animation: npcPulse 2s infinite;
        }
        
        @keyframes npcPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-panel {
            background: #2a3a4a;
            border-radius: 15px;
            padding: 15px;
            border: 2px solid gold;
            margin-top: 20px;
        }
        
        .quest-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        
        .quest-name {
            color: gold;
            font-size: 1.2rem;
        }
        
        .progress-bar {
            width: 300px;
            height: 10px;
            background: #1a2a3a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid gold;
        }
        
        .progress-fill {
            height: 100%;
            width: 10%;
            background: gold;
            transition: width 0.3s;
        }
        
        /* АНИМАЦИИ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s;
        }
        
        /* ДОСТИЖЕНИЯ */
        .achievement-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: gold;
            color: #1a1a2e;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 0 30px gold;
            display: none;
            z-index: 1000;
        }
        
        /* ФОНЫ ЛОКАЦИЙ (эмодзи-версия для простоты) */
        .bg-throne { background: linear-gradient(145deg, #5a4a3a, #2a1a0a); }
        .bg-gates { background: linear-gradient(145deg, #6a5a4a, #3a2a1a); }
        .bg-port { background: linear-gradient(145deg, #2a5a7a, #1a3a5a); }
        .bg-library { background: linear-gradient(145deg, #3a4a5a, #1a2a3a); }
        .bg-barracks { background: linear-gradient(145deg, #5a3a2a, #3a1a0a); }
        .bg-temple { background: linear-gradient(145deg, #5a5a7a, #2a2a4a); }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="game-title">⚔️ ЦИТАДЕЛЬ РЕШЕНИЙ ⚔️</div>
            <div class="resources-panel">
                <div class="resource-item">
                    <span class="resource-icon">💰</span>
                    <span class="resource-value" id="ecoValue">50</span>
                </div>
                <div class="resource-item">
                    <span class="resource-icon">📚</span>
                    <span class="resource-value" id="sciValue">50</span>
                </div>
                <div class="resource-item">
                    <span class="resource-icon">⚔️</span>
                    <span class="resource-value" id="armyValue">50</span>
                </div>
            </div>
        </div>
        
        <!-- Основной экран -->
        <div class="game-screen">
            <!-- Карта локаций -->
            <div class="map-container">
                <div class="map-title">🗺️ КАРТА ЗЕМЕЛЬ</div>
                <div class="location-grid" id="locationGrid">
                    <!-- Заполняется JavaScript -->
                </div>
            </div>
            
            <!-- Игровая область -->
            <div class="game-area" id="gameArea">
                <!-- Заполняется JavaScript -->
            </div>
        </div>
        
        <!-- Нижняя панель -->
        <div class="bottom-panel">
            <div class="quest-info">
                <span class="quest-name" id="questName">Поговори со старейшиной</span>
                <span id="questProgress">1/10</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="questProgressBar" style="width: 10%"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="achievement-popup" id="achievementPopup">✨ Достижение разблокировано!</div>

    <script>
        // ДАННЫЕ ИГРЫ
        const gameState = {
            economy: 50,
            science: 50,
            army: 50,
            currentLocation: 0,
            currentQuest: 0,
            completedQuests: 0,
            characterPosition: 0,
            dialogActive: false,
            
            // Локации
            locations: [
                { id: 0, name: "Тронный зал", icon: "👑", bg: "bg-throne", npc: "🧙", npcName: "Старейшина Аристарх" },
                { id: 1, name: "Городские ворота", icon: "🏰", bg: "bg-gates", npc: "🛡️", npcName: "Капитан стражи" },
                { id: 2, name: "Порт", icon: "⚓", bg: "bg-port", npc: "⚓", npcName: "Купец" },
                { id: 3, name: "Библиотека", icon: "📚", bg: "bg-library", npc: "🧙‍♂️", npcName: "Библиотекарь" },
                { id: 4, name: "Казармы", icon: "⚔️", bg: "bg-barracks", npc: "🪖", npcName: "Командир" },
                { id: 5, name: "Храм", icon: "⛪", bg: "bg-temple", npc: "🙏", npcName: "Жрец" }
            ],
            
            // Задания
            quests: [
                {
                    location: 0,
                    title: "Указ правителя",
                    dialog: [
                        "Приветствую, Правитель! У нас проблема. Писарь написал указ с ошибками. Что будем делать?",
                        "Вот этот указ: «Жители города! Завтра собрание на центральнай площади.»",
                        "Как поступим?"
                    ],
                    error: "«Жители города! Завтра собрание на центральнай площади.»",
                    choices: [
                        { 
                            text: "Исправить ошибки", 
                            eco: 5, sci: 10, army: -5,
                            reply: "Мудрое решение! Ошибка в слове «центральнай» - правильно «центральной»."
                        },
                        { 
                            text: "Оставить как есть", 
                            eco: -5, sci: -5, army: 10,
                            reply: "Народ будет смеяться над безграмотностью..."
                        },
                        { 
                            text: "Казнить писаря", 
                            eco: -10, sci: 5, army: 15,
                            reply: "Жестоко, но эффективно. Все будут бояться ошибок."
                        }
                    ]
                },
                {
                    location: 1,
                    title: "Послание королю",
                    dialog: [
                        "Правитель! Нужно отправить письмо соседнему королю. Там ошибки.",
                        "«Уважаемый король! Предлогаем мир. Наши армии могуг стать союзниками.»",
                        "Как исправим?"
                    ],
                    error: "«Уважаемый король! Предлогаем мир. Наши армии могуг стать союзниками.»",
                    choices: [
                        { 
                            text: "Исправить предлогаем", 
                            eco: -10, sci: 20, army: 0,
                            reply: "Правильно: ПРЕДЛАГАЕМ (корень -лаг-/-лож-)"
                        },
                        { 
                            text: "Исправить могуг", 
                            eco: -5, sci: 15, army: -5,
                            reply: "Правильно: МОГУТ (3 лицо, мн.ч.)"
                        },
                        { 
                            text: "Отправить как есть", 
                            eco: 10, sci: -15, army: -5,
                            reply: "Король обидится на ошибки..."
                        }
                    ]
                },
                {
                    location: 2,
                    title: "Торговый договор",
                    dialog: [
                        "Купцы принесли договор. Там ошибка в важном месте.",
                        "«Оплата должна быть произведена в течении трех дней.»",
                        "Что скажешь?"
                    ],
                    error: "«Оплата должна быть произведена в течении трех дней.»",
                    choices: [
                        { 
                            text: "Исправить предлог", 
                            eco: -5, sci: 15, army: 0,
                            reply: "Правильно: В ТЕЧЕНИЕ (предлог времени)"
                        },
                        { 
                            text: "Подписать", 
                            eco: 20, sci: -15, army: -5,
                            reply: "Потом будут суды из-за ошибки..."
                        },
                        { 
                            text: "Проверить всё", 
                            eco: -15, sci: 20, army: 5,
                            reply: "Договор идеален! Торговля процветает."
                        }
                    ]
                }
            ]
        };
        
        // ИНИЦИАЛИЗАЦИЯ
        function initGame() {
            renderLocationGrid();
            moveToLocation(0);
            updateResources();
        }
        
        // ОТОБРАЗИТЬ СЕТКУ ЛОКАЦИЙ
        function renderLocationGrid() {
            const grid = document.getElementById('locationGrid');
            let html = '';
            
            for (let i = 0; i < gameState.locations.length; i++) {
                const loc = gameState.locations[i];
                html += `
                    <div class="location-card ${gameState.currentLocation === i ? 'active' : ''}" 
                         onclick="moveToLocation(${i})">
                        <div class="location-icon">${loc.icon}</div>
                        <div class="location-name">${loc.name}</div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }
        
        // ПЕРЕМЕЩЕНИЕ В ЛОКАЦИЮ
        function moveToLocation(locationId) {
            gameState.currentLocation = locationId;
            gameState.dialogActive = false;
            
            // Обновляем активную локацию на карте
            renderLocationGrid();
            
            const loc = gameState.locations[locationId];
            
            // Ищем задание для этой локации
            const quest = gameState.quests.find(q => q.location === locationId);
            
            // Отображаем локацию
            const area = document.getElementById('gameArea');
            area.innerHTML = `
                <div class="location-background ${loc.bg}" style="height: 400px; position: relative;">
                    <div class="character" onclick="interactWithNPC()" title="Нажми на персонажа">
                        👑
                    </div>
                    <div class="npc-on-map" onclick="interactWithNPC()" title="Нажми чтобы поговорить">
                        ${loc.npc}
                    </div>
                </div>
                <div class="dialog-box fade-in" id="dialogBox">
                    <div class="dialog-npc">
                        <div class="npc-avatar">${loc.npc}</div>
                        <div class="npc-name">${loc.npcName}</div>
                    </div>
                    <div class="dialog-text" id="dialogText">
                        ${quest ? 'Нажми на меня, чтобы получить задание!' : 'Здесь пока нет заданий...'}
                    </div>
                    <div class="dialog-choices" id="dialogChoices">
                        ${quest ? '<div class="dialog-choice" onclick="startQuest()">📜 Взять задание</div>' : ''}
                    </div>
                </div>
            `;
            
            // Обновляем информацию о квесте
            document.getElementById('questName').innerText = quest ? quest.title : 'Отдых';
            document.getElementById('questProgress').innerText = `${gameState.completedQuests + 1}/10`;
            document.getElementById('questProgressBar').style.width = `${(gameState.completedQuests / 10) * 100}%`;
        }
        
        // ВЗАИМОДЕЙСТВИЕ С NPC
        function interactWithNPC() {
            if (gameState.dialogActive) return;
            
            const loc = gameState.locations[gameState.currentLocation];
            const quest = gameState.quests.find(q => q.location === gameState.currentLocation);
            
            if (!quest) {
                document.getElementById('dialogText').innerText = 'У меня пока нет для тебя заданий. Поговори с другими жителями.';
                return;
            }
            
            gameState.dialogActive = true;
            
            let dialogHtml = '';
            for (let i = 0; i < quest.dialog.length; i++) {
                dialogHtml += `<p>${quest.dialog[i]}</p>`;
            }
            
            // Создаем кнопки выбора
            let choicesHtml = '';
            for (let i = 0; i < quest.choices.length; i++) {
                const c = quest.choices[i];
                choicesHtml += `
                    <div class="dialog-choice" onclick="makeChoice(${i})">
                        <div class="choice-title">${c.text}</div>
                        <div class="choice-effects">
                            ${c.eco !== 0 ? `<span class="effect ${c.eco > 0 ? 'positive' : 'negative'}">💰${c.eco > 0 ? '+' : ''}${c.eco}</span>` : ''}
                            ${c.sci !== 0 ? `<span class="effect ${c.sci > 0 ? 'positive' : 'negative'}">📚${c.sci > 0 ? '+' : ''}${c.sci}</span>` : ''}
                            ${c.army !== 0 ? `<span class="effect ${c.army > 0 ? 'positive' : 'negative'}">⚔️${c.army > 0 ? '+' : ''}${c.army}</span>` : ''}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('dialogBox').innerHTML = `
                <div class="dialog-npc">
                    <div class="npc-avatar">${loc.npc}</div>
                    <div class="npc-name">${loc.npcName}</div>
                </div>
                <div class="dialog-text" id="dialogText">
                    ${dialogHtml}
                    <div style="background: #1a2a3a; padding: 15px; border-radius: 10px; margin-top: 15px; color: #ffaa00; text-align: center; font-family: monospace;">
                        ${quest.error}
                    </div>
                </div>
                <div class="dialog-choices" id="dialogChoices">
                    ${choicesHtml}
                </div>
            `;
        }
        
        // СДЕЛАТЬ ВЫБОР
        function makeChoice(choiceIndex) {
            const quest = gameState.quests.find(q => q.location === gameState.currentLocation);
            const choice = quest.choices[choiceIndex];
            const loc = gameState.locations[gameState.currentLocation];
            
            // Меняем ресурсы
            gameState.economy = Math.min(100, Math.max(0, gameState.economy + choice.eco));
            gameState.science = Math.min(100, Math.max(0, gameState.science + choice.sci));
            gameState.army = Math.min(100, Math.max(0, gameState.army + choice.army));
            
            // Обновляем отображение ресурсов
            document.getElementById('ecoValue').innerText = gameState.economy;
            document.getElementById('sciValue').innerText = gameState.science;
            document.getElementById('armyValue').innerText = gameState.army;
            
            // Показываем ответ NPC
            document.getElementById('dialogBox').innerHTML = `
                <div class="dialog-npc">
                    <div class="npc-avatar">${loc.npc}</div>
                    <div class="npc-name">${loc.npcName}</div>
                </div>
                <div class="dialog-text" id="dialogText">
                    ${choice.reply}
                </div>
                <div class="dialog-choices">
                    <div class="dialog-choice" onclick="completeQuest()">➡️ Завершить разговор</div>
                </div>
            `;
            
            // Показываем достижение
            showAchievement('Задание выполнено! +10 опыта');
            
            // Отмечаем задание выполненным
            gameState.completedQuests++;
            
            // Удаляем выполненное задание
            const index = gameState.quests.findIndex(q => q.location === gameState.currentLocation);
            if (index !== -1) {
                gameState.quests.splice(index, 1);
            }
            
            // Обновляем прогресс
            document.getElementById('questProgress').innerText = `${gameState.completedQuests}/10`;
            document.getElementById('questProgressBar').style.width = `${(gameState.completedQuests / 10) * 100}%`;
            
            // Проверяем финал
            if (gameState.completedQuests >= 10) {
                showEnding();
            }
        }
        
        // ЗАВЕРШИТЬ РАЗГОВОР
        function completeQuest() {
            gameState.dialogActive = false;
            moveToLocation(gameState.currentLocation);
        }
        
        // НАЧАТЬ ЗАДАНИЕ
        function startQuest() {
            interactWithNPC();
        }
        
        // ПОКАЗАТЬ ДОСТИЖЕНИЕ
        function showAchievement(text) {
            const popup = document.getElementById('achievementPopup');
            popup.style.display = 'block';
            popup.innerText = '✨ ' + text;
            
            setTimeout(() => {
                popup.style.display = 'none';
            }, 2000);
        }
        
        // ПОКАЗАТЬ ФИНАЛ
        function showEnding() {
            let title = '', text = '';
            
            if (gameState.economy >= gameState.science && gameState.economy >= gameState.army) {
                title = '💰 ЭКОНОМИСТ';
                text = 'Ты построил великую торговую империю! Корабли со всего мира прибывают в твой порт.';
            } else if (gameState.science > gameState.economy && gameState.science >= gameState.army) {
                title = '📚 УЧЕНЫЙ';
                text = 'Академия магии открыта! Ученые со всего света едут к тебе за знаниями.';
            } else {
                title = '⚔️ ВОИН';
                text = 'Враг разбит! Твоя армия непобедима. Никто не посмеет угрожать Цитадели.';
            }
            
            const area = document.getElementById('gameArea');
            area.innerHTML = `
                <div style="text-align: center; padding: 50px; background: #1a2a3a;">
                    <h1 style="color: gold; font-size: 3rem; margin-bottom: 30px;">${title}</h1>
                    <p style="color: white; font-size: 1.3rem; margin-bottom: 30px;">${text}</p>
                    <p style="color: white; font-size: 1.2rem;">💰 ${gameState.economy} | 📚 ${gameState.science} | ⚔️ ${gameState.army}</p>
                    <button class="dialog-choice" style="margin-top: 30px; padding: 15px 40px;" onclick="restartGame()">СЫГРАТЬ ЗАНОВО</button>
                </div>
            `;
        }
        
        // ПЕРЕЗАПУСК
        function restartGame() {
            gameState.economy = 50;
            gameState.science = 50;
            gameState.army = 50;
            gameState.currentLocation = 0;
            gameState.completedQuests = 0;
            gameState.quests = [
                { location: 0, title: "Указ правителя", dialog: ["Приветствую, Правитель! У нас проблема. Писарь написал указ с ошибками. Что будем делать?", "Вот этот указ: «Жители города! Завтра собрание на центральнай площади.»", "Как поступим?"], error: "«Жители города! Завтра собрание на центральнай площади.»", choices: [{ text: "Исправить ошибки", eco: 5, sci: 10, army: -5, reply: "Мудрое решение! Ошибка в слове «центральнай» - правильно «центральной»." }, { text: "Оставить как есть", eco: -5, sci: -5, army: 10, reply: "Народ будет смеяться над безграмотностью..." }, { text: "Казнить писаря", eco: -10, sci: 5, army: 15, reply: "Жестоко, но эффективно. Все будут бояться ошибок." }] },
                { location: 1, title: "Послание королю", dialog: ["Правитель! Нужно отправить письмо соседнему королю. Там ошибки.", "«Уважаемый король! Предлогаем мир. Наши армии могуг стать союзниками.»", "Как исправим?"], error: "«Уважаемый король! Предлогаем мир. Наши армии могуг стать союзниками.»", choices: [{ text: "Исправить предлогаем", eco: -10, sci: 20, army: 0, reply: "Правильно: ПРЕДЛАГАЕМ (корень -лаг-/-лож-)" }, { text: "Исправить могуг", eco: -5, sci: 15, army: -5, reply: "Правильно: МОГУТ (3 лицо, мн.ч.)" }, { text: "Отправить как есть", eco: 10, sci: -15, army: -5, reply: "Король обидится на ошибки..." }] },
                { location: 2, title: "Торговый договор", dialog: ["Купцы принесли договор. Там ошибка в важном месте.", "«Оплата должна быть произведена в течении трех дней.»", "Что скажешь?"], error: "«Оплата должна быть произведена в течении трех дней.»", choices: [{ text: "Исправить предлог", eco: -5, sci: 15, army: 0, reply: "Правильно: В ТЕЧЕНИЕ (предлог времени)" }, { text: "Подписать", eco: 20, sci: -15, army: -5, reply: "Потом будут суды из-за ошибки..." }, { text: "Проверить всё", eco: -15, sci: 20, army: 5, reply: "Договор идеален! Торговля процветает." }] }
            ];
            
            initGame();
        }
        
        // ЗАПУСК
        window.onload = initGame;
    </script>
</body>
</html>
